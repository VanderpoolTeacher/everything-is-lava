// ── DESTROYED CITY SKY (Level 4) ──
function drawDestroyedCitySky() {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#1a0505');
  skyGrad.addColorStop(0.4, '#3d1111');
  skyGrad.addColorStop(1, '#5a1a0a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);
  // Ash particles
  for (let i = 0; i < 20; i++) {
    const hash = (i * 7919 + Math.floor(frameCount * 0.3)) & 0xFFFF;
    const ax = hash % W;
    const ay = (hash * 3 + frameCount * 0.5) % H;
    ctx.fillStyle = `rgba(180, 160, 140, ${0.2 + (hash % 30) / 100})`;
    ctx.fillRect(ax, ay, 2, 2);
  }
}

// ── RUINS LAYER (Level 4 parallax) ──
function drawRuinsLayer(ruins, parallaxSpeed, brightness, isNear) {
  const offset = scrollOffset * parallaxSpeed;
  const baseY = GROUND_Y; // background uses flat baseline
  for (let i = 0; i < ruins.length; i++) {
    const r = ruins[i];
    const sx = ((r.x - offset) % (W + 600) + W + 600) % (W + 600) - 300;
    if (sx + r.w < -50 || sx > W + 50) continue;

    const bri = Math.floor(brightness * 40);
    const rb = 30 + bri;
    const gb = 15 + bri;
    const bb = 10 + bri;
    ctx.fillStyle = `rgb(${rb},${gb},${bb})`;

    if (r.jagged) {
      // Jagged broken roofline
      ctx.beginPath();
      ctx.moveTo(sx, baseY);
      ctx.lineTo(sx, baseY - r.h);
      // Jagged top edge
      const jaggedW = r.w;
      const segments = 3 + (i % 3);
      for (let j = 1; j <= segments; j++) {
        const jx = sx + (jaggedW * j / segments);
        const jy = baseY - r.h + ((j % 2 === 0) ? 8 + (i % 5) * 3 : -4 - (i % 4) * 2);
        ctx.lineTo(jx, jy);
      }
      ctx.lineTo(sx + r.w, baseY - r.h * 0.6);
      ctx.lineTo(sx + r.w, baseY);
      ctx.closePath();
      ctx.fill();
    } else {
      // Simple crumbled rectangle
      ctx.fillRect(sx, baseY - r.h, r.w, r.h);
    }

    // Mid buildings with glow: flickering orange windows
    if (r.hasGlow) {
      const flicker = 0.3 + 0.4 * Math.sin(frameCount * 0.04 + r.glowPhase);
      ctx.fillStyle = `rgba(255, 120, 30, ${flicker})`;
      const winW = 4, winH = 5;
      for (let wy = baseY - r.h + 8; wy < baseY - 6; wy += 12) {
        for (let wx = sx + 4; wx < sx + r.w - 6; wx += 10) {
          if (((wx * 13 + wy * 7) & 7) < 3) {
            ctx.fillRect(wx, wy, winW, winH);
          }
        }
      }
    }

    // Near layer: occasional ember particles (drawn inline, no allocation)
    if (isNear && (i % 3 === 0)) {
      const et = frameCount * 0.02 + i * 2.3;
      const ex = sx + r.w * 0.5 + Math.sin(et * 1.3) * 6;
      const ey = baseY - r.h - 5 - ((frameCount + i * 47) % 30);
      const ea = 0.4 + 0.3 * Math.sin(et * 2);
      ctx.fillStyle = `rgba(255, 80, 20, ${ea})`;
      ctx.fillRect(ex, ey, 2, 2);
    }
  }
}

function drawNeoTokyoSky() {
  // ── VOLCANO IMAGE AS FULL BACKGROUND ──
  if (volcanoReady) {
    // Fill entire canvas with the volcano image
    // Use "cover" scaling — fill both dimensions, crop overflow
    const imgAspect = volcanoImg.width / volcanoImg.height;
    const canvasAspect = W / H;
    let drawW, drawH;

    if (canvasAspect > imgAspect) {
      // Canvas is wider than image — fit to width
      drawW = W;
      drawH = W / imgAspect;
    } else {
      // Canvas is taller — fit to height
      drawH = H;
      drawW = H * imgAspect;
    }

    // Very slow parallax shift — clamped so image always covers full canvas
    const volcanoParallax = 0.01;
    const maxShift = Math.max(1, (drawW - W) / 2); // min 1 to avoid mod-by-zero
    const rawShift = (scrollOffset * volcanoParallax) % (maxShift * 2);
    // Ping-pong: drift left then back right, never exceeding coverage
    const shiftX = rawShift <= maxShift ? -rawShift : -(maxShift * 2 - rawShift);
    const drawX = (W - drawW) / 2 + shiftX;
    const drawY = (H - drawH) / 2; // center vertically

    // Draw volcano covering everything
    ctx.drawImage(volcanoImg, drawX, drawY, drawW, drawH);

    // Pulsing eruption glow overlay
    const glowPulse = 0.06 + Math.sin(frameCount * 0.04) * 0.03;
    const glow = ctx.createRadialGradient(W / 2 + shiftX, drawH * 0.2, 30, W / 2 + shiftX, drawH * 0.3, W * 0.6);
    glow.addColorStop(0, `rgba(255, 80, 20, ${glowPulse})`);
    glow.addColorStop(0.4, 'rgba(255, 40, 10, 0.02)');
    glow.addColorStop(1, 'rgba(255, 60, 20, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  } else {
    // Fallback if image hasn't loaded yet
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#050510');
    sky.addColorStop(0.5, '#1a0a10');
    sky.addColorStop(1, '#200a10');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawBuildingLayer(buildings, parallaxSpeed, brightness) {
  const PX = 4; // pixel size for 32-bit look — everything snaps to this grid
  const offset = (scrollOffset * parallaxSpeed) % (W + 500);

  // Pre-compute window colors per layer (depends only on brightness, not per-building)
  const a1 = (0.5 + brightness * 0.4).toFixed(2);
  const a2 = (0.4 + brightness * 0.4).toFixed(2);
  const a3 = (0.4 + brightness * 0.3).toFixed(2);
  const a4 = (0.3 + brightness * 0.3).toFixed(2);
  const layerWinColors = [
    'rgba(255,220,80,' + a1 + ')',
    'rgba(80,220,255,' + a2 + ')',
    'rgba(255,150,50,' + a3 + ')',
    'rgba(200,200,255,' + a4 + ')',
    'rgba(255,80,180,' + a4 + ')',
  ];

  for (let bi = 0; bi < buildings.length; bi++) {
    const b = buildings[bi];
    let bx = ((b.x - offset) % (W + 500) + W + 500) % (W + 500) - 100;
    // Snap to pixel grid
    bx = Math.round(bx / PX) * PX;
    const bw = Math.round(b.w / PX) * PX;
    // Skip offscreen buildings
    if (bx + bw < -10 || bx > W + 10) continue;
    // Thin out buildings during village transition — progressively skip more
    if (villageProgress > 0.2) {
      const skipChance = (villageProgress - 0.2) * 1.25; // 0 to 1
      const hash = ((bi * 37 + (b.x | 0) * 13) & 0xFF) / 255;
      if (hash < skipChance) continue;
    }
    const by = Math.round((GROUND_Y - b.h) / PX) * PX;
    const bh = GROUND_Y - by;

    // Parse base color for variations
    const bc = b.color;

    // Building body — dark base
    ctx.fillStyle = bc;
    ctx.fillRect(bx, by, bw, bh);

    // Pixel-art edge highlight (left and top edges lighter)
    ctx.fillStyle = `rgba(${100 + brightness * 80}, ${120 + brightness * 80}, ${160 + brightness * 60}, 0.25)`;
    ctx.fillRect(bx, by, PX, bh); // left edge
    ctx.fillRect(bx, by, bw, PX); // top edge

    // Right and bottom edge shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(bx + bw - PX, by, PX, bh); // right edge
    ctx.fillRect(bx, GROUND_Y - PX, bw, PX); // bottom edge

    // Horizontal panel lines (every few pixel rows) — gives that retro blocky look
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    for (let py = by + PX * 4; py < GROUND_Y; py += PX * 4) {
      ctx.fillRect(bx + PX, py, bw - PX * 2, PX);
    }

    // Pixel-art windows — chunky, grid-snapped, colorful
    const winSpacingX = PX * 3;
    const winSpacingY = PX * 4;
    const winW = PX * 2;
    const winH = PX * 2;
    const winMargin = PX * 2;

    // Use layer-level pre-computed window colors (avoids per-building allocation)
    const winColors = layerWinColors;
    const darkWin = 'rgba(0,0,0,0.2)';

    // Use building-local coords for hash so windows don't flicker during scroll
    let winRow = 0;
    for (let wy = by + winMargin; wy + winH < GROUND_Y - winMargin; wy += winSpacingY) {
      let winCol = 0;
      for (let wx = bx + winMargin; wx + winW < bx + bw - winMargin; wx += winSpacingX) {
        // Hash based on local grid position + building's original X (stable)
        const hash = ((winCol * 7 + winRow * 13 + (b.x | 0) * 3) & 0xFF);
        if (hash > 80) {
          // Only ~2% of lit windows flicker — very rare
          if (hash === 81 || hash === 133 || hash === 200 || hash === 244) {
            const on = Math.sin(frameCount * 0.02 + hash * 3) > -0.6;
            ctx.fillStyle = on ? winColors[hash % 5] : darkWin;
          } else {
            ctx.fillStyle = winColors[hash % 5];
          }
          ctx.fillRect(wx, wy, winW, winH);
        } else {
          ctx.fillStyle = darkWin;
          ctx.fillRect(wx, wy, winW, winH);
        }
        winCol++;
      }
      winRow++;
    }

    // Roof details — antenna, AC units, pixelated
    if (b.h > 100 && bw > PX * 8) {
      // Antenna
      ctx.fillStyle = `rgba(80, 90, 110, ${0.5 + brightness * 0.3})`;
      const antX = bx + Math.round(bw / 2 / PX) * PX;
      ctx.fillRect(antX - PX, by - PX * 4, PX * 2, PX * 4);
      // Blinking light on antenna — slow, randomized per building
      const blinkPhase = (b.x | 0) * 1.7 + (b.h | 0) * 0.3; // unique per building
      const blinkSpeed = 0.015 + ((b.x * 7 | 0) % 10) * 0.003; // 0.015–0.042, varies
      const blink = Math.sin(frameCount * blinkSpeed + blinkPhase) > 0.3;
      ctx.fillStyle = blink ? '#ff3344' : '#441111';
      ctx.fillRect(antX - PX, by - PX * 5, PX * 2, PX);

      // AC unit boxes on roof
      if (bw > PX * 12) {
        ctx.fillStyle = `rgba(60, 65, 80, ${0.6 + brightness * 0.2})`;
        ctx.fillRect(bx + PX * 2, by - PX * 2, PX * 3, PX * 2);
        ctx.fillRect(bx + bw - PX * 5, by - PX * 2, PX * 3, PX * 2);
      }
    }
  }
}

function drawNeonSigns() {
  const offset = (scrollOffset * 0.3) % (W + 500);
  // First pass: glow halos (cheap layered rects instead of shadowBlur)
  for (let si = 0; si < neonSigns.length; si++) {
    const s = neonSigns[si];
    const sx = ((s.x - offset) % (W + 500) + W + 500) % (W + 500) - 100;
    if (sx < -100 || sx > W + 100) continue;
    const intensity = Math.sin(s.blink) * 0.3 + 0.7;
    const flicker = (frameCount + (s.x | 0)) % 50 === 0 ? 0.3 : 1;
    const a = intensity * flicker;
    // Outer glow layer
    ctx.globalAlpha = a * 0.08;
    ctx.fillStyle = s.color;
    ctx.fillRect(sx - 8, s.y - 8, s.w + 16, s.h + 16);
    // Inner glow layer
    ctx.globalAlpha = a * 0.2;
    ctx.fillRect(sx - 3, s.y - 3, s.w + 6, s.h + 6);
    // Sign body
    ctx.globalAlpha = a;
    ctx.fillRect(sx, s.y, s.w, s.h);
  }
  // Second pass: bright centers
  for (let si = 0; si < neonSigns.length; si++) {
    const s = neonSigns[si];
    const sx = ((s.x - offset) % (W + 500) + W + 500) % (W + 500) - 100;
    if (sx < -100 || sx > W + 100) continue;
    const intensity = Math.sin(s.blink) * 0.3 + 0.7;
    const flicker = (frameCount + (s.x | 0)) % 50 === 0 ? 0.3 : 1;
    ctx.globalAlpha = intensity * flicker * 0.4;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx + 2, s.y + 2, s.w - 4, s.h - 4);
  }
  ctx.globalAlpha = 1;
}

// Cache street gradient (doesn't change)
let cachedRoadGradient = null;
function getStreetGradient() {
  if (!cachedRoadGradient) {
    cachedRoadGradient = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    cachedRoadGradient.addColorStop(0, '#1a1a22');
    cachedRoadGradient.addColorStop(0.3, '#141418');
    cachedRoadGradient.addColorStop(1, '#0e0e12');
  }
  return cachedRoadGradient;
}

function drawStreet() {
  // Asphalt base
  ctx.fillStyle = getStreetGradient();
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  const so = scrollOffset; // shorthand

  // Sidewalk / curb at top of street
  ctx.fillStyle = '#22222c';
  ctx.fillRect(0, GROUND_Y, W, 6);
  // Curb highlight
  ctx.fillStyle = '#2e2e3a';
  ctx.fillRect(0, GROUND_Y, W, 2);

  // Sidewalk tile pattern (scrolls)
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  const tileW = 40;
  const tileOff = so % tileW;
  for (let x = -tileOff; x < W + tileW; x += tileW) {
    ctx.fillRect(x, GROUND_Y, 1, 6);
  }

  // Asphalt texture - scrolling grain lines
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 12; i++) {
    const baseX = (i * 73 + 20);
    const sx = ((baseX - so * 0.8) % (W + 100) + W + 100) % (W + 100) - 50;
    ctx.beginPath();
    ctx.moveTo(sx, GROUND_Y + 8 + (i % 3) * 5);
    ctx.lineTo(sx + 15 + (i % 4) * 8, GROUND_Y + 10 + (i % 5) * 4);
    ctx.stroke();
  }

  // Road cracks (scroll with street)
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const baseX = i * 160 + 30;
    const cx = ((baseX - so) % (W + 200) + W + 200) % (W + 200) - 100;
    ctx.beginPath();
    ctx.moveTo(cx, GROUND_Y + 10 + (i % 3) * 8);
    ctx.lineTo(cx + 8 + (i % 2) * 12, GROUND_Y + 18 + (i % 4) * 6);
    ctx.lineTo(cx + 20 + (i % 3) * 5, GROUND_Y + 14 + (i % 2) * 10);
    ctx.stroke();
  }

  // Center dashed line (yellow, scrolling)
  ctx.fillStyle = 'rgba(255, 200, 50, 0.07)';
  const dashLen = 40;
  const dashGap = 40;
  const dashTotal = dashLen + dashGap;
  const dashOff = so % dashTotal;
  for (let x = -dashOff; x < W + dashTotal; x += dashTotal) {
    ctx.fillRect(x, GROUND_Y + 27, dashLen, 3);
  }

  // Edge lane lines (white, scrolling)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
  for (let x = -dashOff; x < W + dashTotal; x += dashTotal) {
    ctx.fillRect(x, GROUND_Y + 8, dashLen * 0.6, 2);
    ctx.fillRect(x, GROUND_Y + 48, dashLen * 0.6, 2);
  }

  // Manhole covers (scroll)
  for (let i = 0; i < 3; i++) {
    const baseX = i * 320 + 150;
    const mx = ((baseX - so) % (W + 400) + W + 400) % (W + 400) - 100;
    const my = GROUND_Y + 30 + (i % 2) * 12;
    ctx.strokeStyle = 'rgba(80,80,100,0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mx, my, 8, 0, Math.PI * 2);
    ctx.stroke();
    // Cross pattern
    ctx.beginPath();
    ctx.moveTo(mx - 5, my);
    ctx.lineTo(mx + 5, my);
    ctx.moveTo(mx, my - 5);
    ctx.lineTo(mx, my + 5);
    ctx.stroke();
  }

  // Wet reflection / puddle sheen
  ctx.fillStyle = 'rgba(100, 140, 220, 0.02)';
  ctx.fillRect(0, GROUND_Y + 6, W, H - GROUND_Y - 6);

  // Neon light reflections on wet road (colored streaks)
  {
    const neonOff = (scrollOffset * 0.3) % (W + 500);
    for (let si = 0; si < neonSigns.length; si++) {
      const s = neonSigns[si];
      const sx = ((s.x - neonOff) % (W + 500) + W + 500) % (W + 500) - 100;
      if (sx > -50 && sx < W + 50) {
        ctx.globalAlpha = 0.04;
        ctx.fillStyle = s.color;
        ctx.fillRect(sx - 5, GROUND_Y + 6, s.w + 10, H - GROUND_Y - 6);
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawVolcanicGround() {
  const so = scrollOffset;
  const step = 4; // sample every 4px for performance

  // 1. Filled polygon: ground surface down to canvas bottom
  ctx.beginPath();
  ctx.moveTo(0, H); // bottom-left
  for (let sx = 0; sx <= W; sx += step) {
    ctx.lineTo(sx, getGroundY(sx + so));
  }
  ctx.lineTo(W, H); // bottom-right
  ctx.closePath();
  ctx.fillStyle = '#3a2515';
  ctx.fill();

  // 2. Surface line along the top
  ctx.beginPath();
  ctx.moveTo(0, getGroundY(so));
  for (let sx = step; sx <= W; sx += step) {
    ctx.lineTo(sx, getGroundY(sx + so));
  }
  ctx.strokeStyle = '#5a3a28';
  ctx.lineWidth = 3;
  ctx.stroke();

  // 3. Animated lava vein cracks
  const veinCount = 10;
  for (let i = 0; i < veinCount; i++) {
    const baseX = i * 120 + 30;
    const sx = ((baseX - so * 0.6) % (W + 200) + W + 200) % (W + 200) - 100;
    if (sx < -50 || sx > W + 50) continue;

    const gy = getGroundY(sx + so);
    const pulse = 0.3 + 0.4 * Math.sin(frameCount * 0.03 + i * 1.7);
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = i % 2 === 0 ? '#ff4500' : '#ff6a00';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, gy + 6);
    ctx.lineTo(sx + 10 + (i % 3) * 5, gy + 14 + (i % 4) * 4);
    ctx.lineTo(sx + 22 + (i % 2) * 8, gy + 20 + (i % 3) * 6);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // 4. Smoke wisps rising from the ground
  for (let i = 0; i < 5; i++) {
    const hash = ((Math.floor(scrollOffset / 300) + i) * 4391) & 0xFFFF;
    const wsx = ((hash % W) + W) % W;
    const wgy = getGroundY(wsx + scrollOffset);
    const wispY = wgy - 10 - Math.sin(frameCount * 0.02 + i * 1.5) * 15;
    const walpha = 0.1 + Math.sin(frameCount * 0.015 + i * 2) * 0.05;
    ctx.fillStyle = `rgba(120, 110, 100, ${walpha})`;
    ctx.beginPath();
    ctx.ellipse(wsx, wispY, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Pool depth helper — hoisted out of per-frame loop to avoid closure allocation
function poolDepthAt(col, totalCols, taperCols, maxDepth) {
  if (col < taperCols) {
    return Math.max(1, Math.round(maxDepth * (col + 1) / (taperCols + 1)));
  } else if (col >= totalCols - taperCols) {
    const fromEnd = totalCols - 1 - col;
    return Math.max(1, Math.round(maxDepth * (fromEnd + 1) / (taperCols + 1)));
  }
  return maxDepth;
}

function drawLavaPools() {
  const P = 4; // pixel grid for 32-bit look

  for (let pi = 0; pi < lavaPools.length; pi++) {
    const p = lavaPools[pi];
    const screenX = p.worldX - scrollOffset;
    if (screenX + p.w < -50 || screenX - p.w > W + 50) continue;

    const fadeIn = Math.min(1, (p.maxLife - p.life) / 30);
    const fadeOut = Math.min(1, p.life / 60);
    const alpha = fadeIn * fadeOut * p.intensity;
    const poolGY = level === 4 ? getGroundY(p.worldX) : GROUND_Y;

    // Snap pool to pixel grid
    const lx = Math.round((screenX - p.w / 2) / P) * P;
    const pw = Math.round(p.w / P) * P;
    const totalCols = pw / P;
    const maxDepth = 4; // max pixel rows deep at center
    const taperCols = Math.max(2, Math.floor(totalCols * 0.25)); // 25% taper on each side

    // ── Glow underneath (pixelated radial) ──
    ctx.globalAlpha = alpha * 0.3;
    const glowSteps = 4;
    for (let g = glowSteps; g >= 1; g--) {
      const gw = pw + g * P * 4;
      const gx = lx - g * P * 2;
      ctx.fillStyle = `rgba(255, ${40 + g * 15}, 0, ${0.08 / g})`;
      ctx.fillRect(gx, poolGY - g * P, gw, g * P * 2 + P);
    }

    // ── Main pool body (tapered rows of chunky pixels) ──
    ctx.globalAlpha = alpha;
    const lavaColors = LAVA_COLORS;

    for (let col = 0; col < totalCols; col++) {
      const colX = lx + col * P;
      const depth = poolDepthAt(col, totalCols, taperCols, maxDepth);
      for (let row = 0; row < depth; row++) {
        const rowY = poolGY + row * P;
        const hash = ((col * 7 + row * 13 + Math.floor(frameCount * 0.08 + p.waveOffset)) & 0xFF);
        const colorIdx = hash % lavaColors.length;
        ctx.fillStyle = lavaColors[colorIdx];
        ctx.fillRect(colX, rowY, P, P);
      }
    }

    // ── Surface crust pixels (darker top edge, animated — full width) ──
    for (let col = 0; col < totalCols; col++) {
      const colX = lx + col * P;
      const surfaceAnim = Math.sin((col + frameCount * 0.05 + p.waveOffset) * 0.8);
      if (surfaceAnim > 0.2) {
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(colX, poolGY - P, P, P);
      } else if (surfaceAnim > -0.3) {
        ctx.fillStyle = '#dd4400';
        ctx.fillRect(colX, poolGY - P, P, P);
      }
    }

    // ── Bright hotspot pixels (only in deeper center area) ──
    const hotspotCount = Math.floor(totalCols / 4);
    for (let i = 0; i < hotspotCount; i++) {
      const hCol = ((i * 17 + Math.floor(frameCount * 0.1 + p.waveOffset * 3)) % totalCols);
      const depth = poolDepthAt(hCol, totalCols, taperCols, maxDepth);
      if (depth < 2) continue;
      const hx = lx + hCol * P;
      const hy = poolGY + ((i * 7 + Math.floor(frameCount * 0.06)) % depth) * P;
      ctx.fillStyle = (i + Math.floor(frameCount * 0.05)) % 3 === 0 ? '#ffee66' : '#ffaa00';
      ctx.fillRect(hx, hy, P, P);
    }

    // ── Edge outline (follows tapered shape) ──
    ctx.fillStyle = 'rgba(100, 20, 0, 0.5)';
    // Bottom edge per column
    for (let col = 0; col < totalCols; col++) {
      const colX = lx + col * P;
      const depth = poolDepthAt(col, totalCols, taperCols, maxDepth);
      ctx.fillRect(colX, poolGY + depth * P, P, P);
    }
    // Left edge
    for (let row = 0; row < poolDepthAt(0, totalCols, taperCols, maxDepth); row++) {
      ctx.fillRect(lx, poolGY + row * P, P, P);
    }
    // Right edge
    for (let row = 0; row < poolDepthAt(totalCols - 1, totalCols, taperCols, maxDepth); row++) {
      ctx.fillRect(lx + (totalCols - 1) * P, poolGY + row * P, P, P);
    }
    // Stepped side outlines on taper transitions
    for (let col = 1; col < taperCols; col++) {
      const d1 = poolDepthAt(col - 1, totalCols, taperCols, maxDepth), d2 = poolDepthAt(col, totalCols, taperCols, maxDepth);
      if (d2 > d1) ctx.fillRect(lx + col * P, poolGY + d1 * P, P, (d2 - d1) * P);
    }
    for (let col = totalCols - taperCols; col < totalCols - 1; col++) {
      const d1 = poolDepthAt(col, totalCols, taperCols, maxDepth), d2 = poolDepthAt(col + 1, totalCols, taperCols, maxDepth);
      if (d1 > d2) ctx.fillRect(lx + col * P, poolGY + d2 * P, P, (d1 - d2) * P);
    }

    // ── Ember particles (square pixels rising) ──
    if (particles.length < MAX_PARTICLES && Math.random() < 0.15 * alpha) {
      // Favor embers from the deeper center area
      const emCol = Math.floor(taperCols + Math.random() * (totalCols - taperCols * 2));
      const emX = lx + emCol * P;
      particles.push({
        x: emX,
        y: poolGY - P * 2,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -(1 + Math.random() * 2),
        life: 20 + Math.random() * 20,
        maxLife: 40,
        color: Math.random() > 0.5 ? '#ff6600' : '#ffaa00',
        size: P
      });
    }

    ctx.globalAlpha = 1;
  }
}

function drawLavaDrops() {
  // Warning markers (world coords)
  for (let wi = 0; wi < warningMarkers.length; wi++) {
    const w = warningMarkers[wi];
    const sx = w.worldX - scrollOffset;
    if (sx < -30 || sx > W + 30) continue;

    const pulse = Math.sin(w.life * 0.3) * 0.3 + 0.5;
    const alpha = (w.life / w.maxLife) * pulse;
    ctx.globalAlpha = alpha;

    // Red target on ground
    ctx.strokeStyle = '#ff3300';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx - 15, GROUND_Y - 2);
    ctx.lineTo(sx + 15, GROUND_Y - 2);
    ctx.stroke();

    // Exclamation
    ctx.fillStyle = '#ff3300';
    ctx.font = FONT_8B;
    ctx.textAlign = 'center';
    ctx.fillText('!', sx, GROUND_Y - 8);

    ctx.globalAlpha = 1;
  }

  // Actual drops (world coords)
  for (let di = 0; di < lavaDrops.length; di++) {
    const d = lavaDrops[di];
    const sx = d.worldX - scrollOffset;
    if (sx < -40 || sx > W + 40) continue;

    // Flash effect — rapid bright/dim cycle as drop falls
    const flash = Math.sin(frameCount * 0.6 + d.worldX * 0.1) * 0.4 + 0.6;
    const flashWhite = Math.max(0, Math.sin(frameCount * 0.9 + d.worldX * 0.2));

    // Glow halo — cheap rect instead of shadowBlur
    const glowAlpha = (0.15 + flash * 0.1);
    ctx.globalAlpha = glowAlpha;
    ctx.fillStyle = flashWhite > 0.7 ? '#ffee88' : '#ff4400';
    ctx.fillRect(sx - d.size * 2, d.y - d.size * 2, d.size * 4, d.size * 4);

    ctx.globalAlpha = 1;

    // Drop body — solid colors instead of radialGradient
    if (flashWhite > 0.7) {
      ctx.fillStyle = '#ffee66';
    } else {
      ctx.fillStyle = '#ff6600';
    }

    // Teardrop shape
    ctx.beginPath();
    ctx.moveTo(sx, d.y - d.size * 1.5);
    ctx.quadraticCurveTo(sx + d.size, d.y, sx, d.y + d.size * 0.5);
    ctx.quadraticCurveTo(sx - d.size, d.y, sx, d.y - d.size * 1.5);
    ctx.closePath();
    ctx.fill();

    // Bright core pixel
    ctx.fillStyle = flashWhite > 0.7 ? '#ffffff' : '#ffcc00';
    ctx.fillRect(sx - 1, d.y - 1, 2, 2);

    // Trail — fillRect instead of arc
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#ff4400';
    for (let t = 1; t < 4; t++) {
      const ty = d.y - d.vy * t * 3;
      const ts = d.size * (1 - t * 0.25);
      ctx.fillRect(sx - ts * 0.5, ty - ts * 0.5, ts, ts);
    }
    ctx.globalAlpha = 1;
  }
}

function drawVehicles() {
  const P = 8; // doubled pixel size for bigger vehicles

  for (let vi = 0; vi < vehicles.length; vi++) {
    const v = vehicles[vi];
    const facing = v.dir;
    ctx.save();
    ctx.translate(v.x + v.w / 2, v.y + v.h / 2);
    if (facing === 1) ctx.scale(-1, 1);

    const hw = v.w / 2;
    const hh = v.h / 2;

    // Color palettes per vehicle type (base, dark, highlight, light1, light2)
    let base, dark, hi, stripe, light1, light2;
    if (v.type === 'schoolbus') {
      base = '#ddaa00'; dark = '#aa7700'; hi = '#ffcc22'; stripe = '#111111';
      light1 = '#ffaa00'; light2 = '#ff4400';
    } else if (v.type === 'firetruck') {
      base = '#cc2222'; dark = '#881111'; hi = '#ee4444'; stripe = '#ffcc00';
      light1 = '#ff0000'; light2 = '#ff6600';
    } else if (v.type === 'ambulance') {
      base = '#dddddd'; dark = '#999999'; hi = '#ffffff'; stripe = '#cc2222';
      light1 = '#ff0000'; light2 = '#ffffff';
    } else {
      base = '#1a1a5a'; dark = '#0e0e33'; hi = '#3333aa'; stripe = '#ffffff';
      light1 = '#ff0000'; light2 = '#3366ff';
    }

    // px helper — draw a "pixel" snapped to grid
    function px(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * P, y * P, w * P, h * P);
    }

    // ── Shadow under vehicle ──
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(-hw + P * 2, hh, v.w - P * 4, P * 2);

    // ── Main body (pixel art) ──
    const isSchoolBus = v.type === 'schoolbus';
    const bw = isSchoolBus ? 30 : 22, bh = isSchoolBus ? 9 : 7;
    const bx = -bw / 2, by = -bh / 2 - 1;

    // Base body
    px(bx, by + 1, bw, bh - 1, base);

    // Top edge highlight
    px(bx + 1, by + 1, bw - 2, 1, hi);

    // Bottom edge shadow
    px(bx, by + bh, bw, 1, dark);

    // Left edge highlight
    px(bx, by + 1, 1, bh - 1, hi);

    // Right edge shadow
    px(bx + bw - 1, by + 1, 1, bh - 1, dark);

    // ── Cab section (front) ──
    px(bx, by, 7, 1, dark); // cab roof
    px(bx, by + 1, 7, bh - 1, base);
    px(bx + 1, by, 5, 1, base); // cab roof highlight

    // Windshield (2 pixel-art panes)
    px(bx + 1, by + 2, 2, 3, '#44aadd');
    px(bx + 1, by + 2, 1, 1, '#88ddff'); // glare pixel
    px(bx + 4, by + 2, 2, 3, '#3388bb');

    // ── Rear section ──
    px(bx + bw - 3, by + 2, 2, 3, dark); // tail panel
    // Tail lights
    const tailBlink = Math.sin(v.sirenPhase * 0.5) > 0;
    px(bx + bw - 2, by + 2, 1, 1, tailBlink ? '#ff3300' : '#661100');
    px(bx + bw - 2, by + 4, 1, 1, '#ffaa00'); // turn signal

    // ── Wheels (chunky square pixels) ──
    // Front wheel
    px(bx + 3, by + bh, 3, 2, '#111111');
    px(bx + 4, by + bh, 1, 1, '#444444'); // hubcap
    // Rear wheel
    px(bx + bw - 6, by + bh, 3, 2, '#111111');
    px(bx + bw - 5, by + bh, 1, 1, '#444444');
    // Wheel wells (dark dents above wheels)
    px(bx + 3, by + bh - 1, 3, 1, dark);
    px(bx + bw - 6, by + bh - 1, 3, 1, dark);

    // ── Siren light bar on roof (not on school bus) ──
    if (v.type !== 'schoolbus') {
      const sirenOn1 = Math.sin(v.sirenPhase) > 0;
      const sirenOn2 = Math.sin(v.sirenPhase + Math.PI) > 0;

      // Light bar base
      px(-3, by - 1, 6, 1, '#222222');
      px(-3, by - 2, 6, 1, '#333333');

      // Left siren pixel
      px(-3, by - 2, 2, 2, sirenOn1 ? light1 : '#330000');
      // Right siren pixel
      px(1, by - 2, 2, 2, sirenOn2 ? light2 : '#000033');

      // Siren glow effect
      if (sirenOn1) {
        ctx.shadowColor = light1;
        ctx.shadowBlur = 12;
        px(-3, by - 2, 2, 2, light1);
        ctx.shadowBlur = 0;
      }
      if (sirenOn2) {
        ctx.shadowColor = light2;
        ctx.shadowBlur = 12;
        px(1, by - 2, 2, 2, light2);
        ctx.shadowBlur = 0;
      }
    }

    // ── Type-specific pixel art details ──
    if (v.type === 'schoolbus') {
      // Black stripe along bottom
      px(bx + 1, by + bh - 2, bw - 2, 1, stripe);
      // "SCHOOL BUS" as dark pixel blocks on side
      for (let dx = 0; dx < 8; dx++) {
        px(bx + 9 + dx * 2, by + 3, 1, 1, stripe);
      }
      // Row of windows (kids visible!)
      for (let wx = bx + 8; wx < bx + bw - 4; wx += 3) {
        // Window frame
        px(wx, by + 2, 2, 3, '#44aadd');
        px(wx, by + 2, 1, 1, '#88ddff'); // glare
        // Kid head peeking out (alternating colors) — animated bobbing
        const kidBob = Math.sin(frameCount * 0.1 + wx * 0.5) > 0 ? 0 : -1;
        const kidColor = (wx % 6 < 3) ? '#ffaa77' : '#885533';
        px(wx, by + 3 + kidBob, 1, 1, kidColor);
        // Open mouth (screaming!)
        if (Math.sin(frameCount * 0.15 + wx * 0.7) > -0.3) {
          px(wx, by + 4 + kidBob, 1, 1, '#220000');
        }
      }
      // Stop sign arm (folds out on left side)
      px(bx - 2, by + 2, 2, 2, '#cc2222');
      px(bx - 2, by + 2, 2, 1, '#ff4444');
      // Front bumper - bigger
      px(bx, by + bh, bw, 1, '#333333');
      // Flashing yellow lights on top (school bus warning)
      const busFlash = Math.sin(frameCount * 0.2) > 0;
      px(bx + 2, by - 1, 2, 1, busFlash ? '#ffaa00' : '#664400');
      px(bx + bw - 4, by - 1, 2, 1, !busFlash ? '#ffaa00' : '#664400');
      if (busFlash) {
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 8;
        px(bx + 2, by - 1, 2, 1, '#ffaa00');
        ctx.shadowBlur = 0;
      }
    } else if (v.type === 'firetruck') {
      // Yellow stripe
      px(bx + 7, by + 3, bw - 10, 1, stripe);

      if (v.ladderExtended) {
        // ── LADDER EXTENDED UP ── angled from roof toward sky
        ctx.save();
        const ladderBaseX = (bx + 10) * P;
        const ladderBaseY = (by - 1) * P;
        ctx.translate(ladderBaseX, ladderBaseY);
        ctx.rotate(-1.1); // ~63 degrees up

        // Ladder rails
        ctx.fillStyle = '#888888';
        ctx.fillRect(0, -1 * P, 18 * P, P);
        ctx.fillStyle = '#666666';
        ctx.fillRect(0, 0, 18 * P, P);

        // Ladder rungs
        for (let r = 1; r < 17; r += 2) {
          ctx.fillStyle = '#aaaaaa';
          ctx.fillRect(r * P, -1 * P, P, 2 * P);
        }

        // Ladder tip/nozzle
        ctx.fillStyle = '#cccccc';
        ctx.fillRect(17 * P, -2 * P, 2 * P, P);
        ctx.fillStyle = '#555555';
        ctx.fillRect(18 * P, -2 * P, P, P);

        // Subtle water spray from nozzle tip (animated)
        const sprayPhase = frameCount * 0.15;
        for (let s = 0; s < 5; s++) {
          const sx = 19 * P + s * 3 + Math.sin(sprayPhase + s) * 2;
          const sy = -2 * P + Math.cos(sprayPhase + s * 1.3) * 4 - s * 2;
          ctx.fillStyle = `rgba(100,180,255,${0.6 - s * 0.1})`;
          ctx.fillRect(sx, sy, 3, 3);
        }

        ctx.restore();

        // Turntable base on roof
        px(bx + 9, by - 1, 4, 1, '#555555');
        px(bx + 10, by - 2, 2, 1, '#777777');
      } else {
        // ── LADDER FLAT ON ROOF (original) ──
        px(bx + 8, by - 1, 10, 1, '#888888');
        px(bx + 8, by, 10, 1, '#666666');
        for (let lx = bx + 9; lx < bx + 17; lx += 2) {
          px(lx, by - 1, 1, 2, '#aaaaaa');
        }
      }

      // Hose reel at back
      px(bx + bw - 5, by + 1, 2, 2, '#666666');
      px(bx + bw - 4, by + 1, 1, 1, '#888888');
    } else if (v.type === 'ambulance') {
      // Red cross (pixel art)
      px(bx + 12, by + 2, 4, 1, stripe); // horizontal
      px(bx + 13, by + 1, 2, 3, stripe); // vertical
      // "+" highlight
      px(bx + 13, by + 2, 2, 1, '#ff4444');
      // Side window
      px(bx + 8, by + 2, 3, 2, '#44aadd');
      px(bx + 8, by + 2, 1, 1, '#88ddff'); // glare
    } else {
      // Police stripe
      px(bx + 7, by + 4, bw - 10, 1, stripe);
      // Badge/star shape (tiny pixel art)
      px(bx + 11, by + 2, 1, 1, '#ffcc00');
      px(bx + 10, by + 3, 3, 1, '#ffcc00');
      px(bx + 11, by + 4, 1, 1, '#ffcc00');
      // "POLICE" represented as dark pixels on white stripe
      for (let dx = 0; dx < 5; dx++) {
        px(bx + 8 + dx * 2, by + 4, 1, 1, dark);
      }
      // Side spotlight
      px(bx + 7, by + 1, 1, 2, '#cccccc');
    }

    // ── Pixel outline (1px dark border around whole vehicle) ──
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx * P, (by) * P, bw * P, (bh + 2) * P);

    ctx.restore();

    // ── Siren glow on road (not on school bus) ──
    if (v.type !== 'schoolbus' && v.x > -50 && v.x < W + 50) {
      const sirenGlow = Math.sin(v.sirenPhase) > 0 ? light1 : light2;
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = sirenGlow;
      ctx.fillRect(v.x - P * 3, GROUND_Y, v.w + P * 6, H - GROUND_Y);
      ctx.globalAlpha = 1;
    }
  }
}

function drawStreetLamps() {
  const P = 4; // pixel grid size

  for (let li = 0; li < streetLamps.length; li++) {
    const lamp = streetLamps[li];
    const sx = lamp.worldX - scrollOffset;
    // Skip if off screen
    if (sx < -40 || sx > W + 40) continue;

    const baseY = GROUND_Y;
    const topY = baseY - lamp.poleH;
    // Flickering lamps stutter on/off erratically; steady lamps have gentle glow
    let flicker;
    if (lamp.flickering) {
      // Erratic flicker: combine fast and slow sine waves with step function
      const raw = Math.sin(frameCount * 0.15 + lamp.flickerPhase) +
                  Math.sin(frameCount * 0.37 + lamp.flickerPhase * 2.1) +
                  Math.sin(frameCount * 0.07 + lamp.flickerPhase * 0.5);
      flicker = raw > 0.3 ? 0.9 : (raw > -0.8 ? 0.15 : 0.0);
    } else {
      flicker = 0.7 + Math.sin(frameCount * 0.06 + lamp.flickerPhase) * 0.3;
    }

    // ── Lamp glow on ground (simple rect, cheaper than radialGradient) ──
    ctx.globalAlpha = 0.06 * flicker;
    ctx.fillStyle = lamp.glowColor;
    ctx.fillRect(sx - 35, baseY - 10, 70, 20);
    ctx.globalAlpha = 0.03 * flicker;
    ctx.fillRect(sx - 50, baseY - 18, 100, 36);
    ctx.globalAlpha = 1;

    // ── Pole (pixel art — 2 pixels wide) ──
    // Dark side
    ctx.fillStyle = '#333340';
    ctx.fillRect(sx - P, topY + lamp.lampH, P, lamp.poleH);
    // Light side
    ctx.fillStyle = '#4a4a5a';
    ctx.fillRect(sx, topY + lamp.lampH, P, lamp.poleH);
    // Highlight pixel at top of pole
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(sx - P, topY + lamp.lampH, P * 2, P);

    // ── Base plate (wider, 3 pixels) ──
    ctx.fillStyle = '#3a3a48';
    ctx.fillRect(sx - P * 2, baseY - P * 2, P * 4, P * 2);
    ctx.fillStyle = '#4a4a58';
    ctx.fillRect(sx - P * 2, baseY - P * 2, P * 4, P);

    // ── Lamp arm (horizontal bracket extending left and right) ──
    const armY = topY;
    const armW = lamp.lampW / 2;
    // Left arm
    ctx.fillStyle = '#444450';
    ctx.fillRect(sx - armW, armY + P, armW, P);
    ctx.fillStyle = '#555565';
    ctx.fillRect(sx - armW, armY, armW, P);
    // Right arm
    ctx.fillStyle = '#444450';
    ctx.fillRect(sx, armY + P, armW, P);
    ctx.fillStyle = '#555565';
    ctx.fillRect(sx, armY, armW, P);

    // ── Lamp housing (the light fixture, chunky pixels) ──
    // Housing body
    ctx.fillStyle = '#555560';
    ctx.fillRect(sx - armW + P, armY - P, lamp.lampW - P * 2, P);

    // ── Light bulb / glow ──
    ctx.fillStyle = lamp.glowColor;
    ctx.globalAlpha = flicker;
    ctx.fillRect(sx - armW + P * 2, armY + P * 2, lamp.lampW - P * 4, P);
    ctx.globalAlpha = 1;

    // Warm glow halo around lamp — layered rects instead of shadowBlur
    ctx.fillStyle = lamp.glowColor;
    ctx.globalAlpha = 0.06 * flicker;
    ctx.fillRect(sx - armW - P * 3, armY - P * 3, lamp.lampW + P * 6, P * 10);
    ctx.globalAlpha = 0.12 * flicker;
    ctx.fillRect(sx - armW - P, armY - P, lamp.lampW + P * 2, P * 6);
    ctx.globalAlpha = 1;

    // ── Platform highlight (so player can see where to land) ──
    // Subtle top-edge highlight on the arm
    ctx.fillStyle = 'rgba(255, 255, 200, 0.15)';
    ctx.fillRect(sx - armW, armY, lamp.lampW, P);
  }
}

function drawTrees() {
  const P = 4; // pixel grid size
  for (const t of trees) {
    if (t.collapsed) continue;
    const sx = t.worldX - scrollOffset;
    if (sx < -100 || sx > W + 100) continue;

    const baseY = getGroundY(t.worldX);
    const trunkTop = baseY - t.height;
    const canopyCenter = trunkTop - t.canopyH / 2;

    // Burn color progression
    const burnProg = t.burning ? Math.min(t.burnTimer / 210, 1) : 0;

    // ── Trunk ──
    const trunkR = Math.floor(50 + burnProg * 40);
    const trunkG = Math.floor(30 - burnProg * 20);
    const trunkB = Math.floor(15 - burnProg * 10);
    // Dark side
    ctx.fillStyle = `rgb(${trunkR - 15},${Math.max(0, trunkG - 10)},${Math.max(0, trunkB - 5)})`;
    ctx.fillRect(sx - t.trunkW / 2, trunkTop, t.trunkW / 2, t.height);
    // Light side
    ctx.fillStyle = `rgb(${trunkR},${Math.max(0, trunkG)},${Math.max(0, trunkB)})`;
    ctx.fillRect(sx, trunkTop, t.trunkW / 2, t.height);

    // ── Canopy (ellipse) ──
    let cR, cG, cB;
    if (!t.burning) {
      cR = 20 + Math.random() * 5 | 0;
      cG = 80 + Math.random() * 10 | 0;
      cB = 20 + Math.random() * 5 | 0;
    } else {
      // Transition green -> brown/orange -> red
      if (burnProg < 0.5) {
        const p = burnProg * 2;
        cR = Math.floor(20 + p * 160);
        cG = Math.floor(80 - p * 40);
        cB = Math.floor(20 - p * 15);
      } else {
        const p = (burnProg - 0.5) * 2;
        cR = Math.floor(180 + p * 75);
        cG = Math.floor(40 - p * 30);
        cB = Math.floor(5);
      }
      // Flash in critical phase (last 20%)
      if (burnProg > 0.8 && frameCount % 6 < 3) {
        cR = 255; cG = 200; cB = 50;
      }
    }

    ctx.fillStyle = `rgb(${cR},${cG},${cB})`;
    ctx.beginPath();
    ctx.ellipse(sx, canopyCenter, t.canopyW / 2, t.canopyH / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Canopy highlight
    ctx.fillStyle = `rgba(${cR + 30},${cG + 20},${cB + 10}, 0.4)`;
    ctx.beginPath();
    ctx.ellipse(sx, canopyCenter - t.canopyH * 0.15, t.canopyW * 0.35, t.canopyH * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // ── Platform highlight (so player can see where to land) ──
    ctx.fillStyle = 'rgba(255, 255, 200, 0.15)';
    ctx.fillRect(sx - t.canopyW / 2, trunkTop - t.canopyH, t.canopyW, P);

    // ── Fire particles when burning ──
    if (t.burning) {
      const numFlames = Math.min(Math.floor(burnProg * 8) + 2, 8);
      for (let i = 0; i < numFlames; i++) {
        const fx = sx + (Math.random() - 0.5) * t.canopyW * 0.8;
        const fy = canopyCenter - t.canopyH * 0.3 + (Math.random() - 0.5) * t.canopyH * 0.6;
        const fs = P + Math.random() * P;
        const fireColors = ['#ff4400', '#ff6600', '#ff8800', '#ffaa00', '#ffcc00'];
        ctx.fillStyle = fireColors[Math.random() * fireColors.length | 0];
        ctx.globalAlpha = 0.6 + Math.random() * 0.4;
        ctx.fillRect(fx - fs / 2, fy - fs - Math.random() * 8, fs, fs);
      }
      ctx.globalAlpha = 1;
    }
  }
}

// ── VILLAGE SCENE (end of level 3) ──
function drawVillage() {
  if (villageProgress <= 0) return;
  const P = 4;
  const alpha = villageProgress;

  ctx.save();
  ctx.globalAlpha = alpha;

  // ── Grass ground (transitions from road) ──
  // Dark grass — everything is in shadow
  const grassGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grassGrad.addColorStop(0, '#142a08');
  grassGrad.addColorStop(0.3, '#0f1f06');
  grassGrad.addColorStop(1, '#0a1504');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Sparse dark grass blades along ground line
  ctx.fillStyle = '#1a3a0c';
  for (let gx = 0; gx < W; gx += P * 3) {
    const gh = P + ((gx * 7 + 13) % 3) * P;
    ctx.fillRect(gx, GROUND_Y - gh, P, gh);
  }

  // ── Dirt path (subtle, dark) ──
  ctx.fillStyle = 'rgba(40, 30, 18, 0.3)';
  ctx.fillRect(0, GROUND_Y + P, W, P * 5);

  // ── House + torches (scrolls in from right) ──
  if (villageProgress > 0.3) {
    ctx.globalAlpha = alpha;

    // Scroll from off-screen right to final position
    const scrollT = Math.min(1, (villageProgress - 0.3) / 0.5);
    const hxFinal = W - 240;
    const hx = hxFinal + (1 - scrollT) * (W + 200 - hxFinal);

    // House dimensions
    const houseW = P * 34;
    const wallH = P * 18;
    const roofH = P * 13;
    const hy = GROUND_Y - wallH;

    // ── Torch flicker (shared by all light sources) ──
    const tf1 = Math.sin(frameCount * 0.07) * 0.15;
    const tf2 = Math.sin(frameCount * 0.13 + 2.0) * 0.1;
    const tf3 = Math.sin(frameCount * 0.31 + 5.0) * 0.08;
    const torchGlow = Math.max(0.35, 0.6 + tf1 + tf2 + tf3);
    // Second torch slightly offset in phase
    const tf4 = Math.sin(frameCount * 0.08 + 1.0) * 0.15;
    const tf5 = Math.sin(frameCount * 0.15 + 3.5) * 0.1;
    const tf6 = Math.sin(frameCount * 0.28 + 4.2) * 0.08;
    const torchGlow2 = Math.max(0.35, 0.6 + tf4 + tf5 + tf6);

    // ── TORCHES (draw first so house overlaps slightly) ──
    const torchLX = hx - P * 10;  // left torch
    const torchRX = hx + houseW + P * 6;  // right torch
    const torchY = GROUND_Y - P * 16; // flame height

    // Draw a torch at position tx
    for (let ti = 0; ti < 2; ti++) {
      const tx = ti === 0 ? torchLX : torchRX;
      const tg = ti === 0 ? torchGlow : torchGlow2;

      // Ground glow pool from torch
      ctx.globalAlpha = alpha * 0.12 * tg;
      ctx.fillStyle = '#ff8830';
      ctx.fillRect(tx - P * 8, GROUND_Y, P * 16, P * 4);
      ctx.globalAlpha = alpha * 0.06 * tg;
      ctx.fillRect(tx - P * 12, GROUND_Y - P, P * 24, P * 6);
      ctx.globalAlpha = alpha;

      // Pole — dark wood
      ctx.fillStyle = '#1a1208';
      ctx.fillRect(tx - P / 2, torchY + P * 2, P, GROUND_Y - torchY - P * 2);
      ctx.fillStyle = '#241a0e';
      ctx.fillRect(tx + P / 2, torchY + P * 2, P / 2, GROUND_Y - torchY - P * 2);

      // Torch head bracket
      ctx.fillStyle = '#2a1e10';
      ctx.fillRect(tx - P, torchY + P, P * 2, P * 2);

      // Flame — layered rectangles, animated
      const flH = P * 3 + Math.sin(frameCount * 0.2 + ti * 3.0) * P;
      const flW = P * 2 + Math.sin(frameCount * 0.15 + ti * 2.0) * P * 0.5;
      // Outer flame — orange
      ctx.fillStyle = `rgba(255, 120, 20, ${tg * 0.8})`;
      ctx.fillRect(tx - flW / 2, torchY - flH + P * 2, flW, flH);
      // Mid flame — yellow
      const midH = flH * 0.65;
      const midW = flW * 0.6;
      ctx.fillStyle = `rgba(255, 200, 50, ${tg * 0.9})`;
      ctx.fillRect(tx - midW / 2, torchY - midH + P * 2, midW, midH);
      // Core — bright white-yellow
      const coreH = flH * 0.3;
      ctx.fillStyle = `rgba(255, 240, 150, ${tg * 0.7})`;
      ctx.fillRect(tx - P * 0.3, torchY + P, P * 0.6, coreH);

      // Glow halo around flame
      ctx.globalAlpha = alpha * 0.08 * tg;
      ctx.fillStyle = '#ff8830';
      ctx.fillRect(tx - P * 6, torchY - P * 4, P * 12, P * 10);
      ctx.globalAlpha = alpha * 0.04 * tg;
      ctx.fillRect(tx - P * 10, torchY - P * 6, P * 20, P * 14);
      ctx.globalAlpha = alpha;

      // Sparks — a couple of tiny pixels rising from flame
      for (let sp = 0; sp < 2; sp++) {
        const sparkPhase = frameCount * 0.05 + sp * 4.3 + ti * 7.1;
        const sparkLife = (sparkPhase % 1.0);
        const sparkX = tx + Math.sin(sparkPhase * 6.0) * P * 2;
        const sparkY = torchY - P * 2 - sparkLife * P * 8;
        ctx.globalAlpha = alpha * (1 - sparkLife) * 0.6 * tg;
        ctx.fillStyle = '#ffcc44';
        ctx.fillRect(sparkX, sparkY, P * 0.5, P * 0.5);
      }
      ctx.globalAlpha = alpha;
    }

    // ── Stone foundation ──
    ctx.fillStyle = '#12100c';
    ctx.fillRect(hx - P, GROUND_Y - P * 2, houseW + P * 2, P * 2);
    // Stone texture
    ctx.fillStyle = '#1a1610';
    for (let sx = hx; sx < hx + houseW; sx += P * 3) {
      ctx.fillRect(sx, GROUND_Y - P * 2, P * 2, P);
    }

    // ── House walls — timber frame style ──
    // Main wall fill — dark plaster
    ctx.fillStyle = '#110e0a';
    ctx.fillRect(hx, hy, houseW, wallH);
    // Slightly lighter interior
    ctx.fillStyle = '#15110c';
    ctx.fillRect(hx + P * 2, hy + P * 2, houseW - P * 4, wallH - P * 3);

    // Timber frame beams — dark wood
    ctx.fillStyle = '#0d0908';
    // Vertical beams
    ctx.fillRect(hx, hy, P * 2, wallH);
    ctx.fillRect(hx + houseW - P * 2, hy, P * 2, wallH);
    ctx.fillRect(hx + houseW / 2 - P, hy, P * 2, wallH);
    // Horizontal beams
    ctx.fillRect(hx, hy, houseW, P * 2);
    ctx.fillRect(hx, hy + wallH / 2 - P, houseW, P * 2);
    // Cross braces in left panel
    ctx.fillStyle = '#0a0706';
    const panelL = hx + P * 2;
    const panelMid = hx + houseW / 2 - P;
    const panelR = hx + houseW - P * 2;
    const beamMidY = hy + wallH / 2 - P;

    // ── Roof — steep A-frame with overhang ──
    const overhang = P * 5;
    ctx.fillStyle = '#0c0606';
    ctx.beginPath();
    ctx.moveTo(hx - overhang, hy);
    ctx.lineTo(hx + houseW / 2, hy - roofH);
    ctx.lineTo(hx + houseW + overhang, hy);
    ctx.closePath();
    ctx.fill();
    // Left slope — faint light edge
    ctx.fillStyle = '#180e0e';
    ctx.beginPath();
    ctx.moveTo(hx - overhang, hy);
    ctx.lineTo(hx + houseW / 2, hy - roofH);
    ctx.lineTo(hx + houseW / 2, hy - roofH + P);
    ctx.lineTo(hx - overhang + P, hy);
    ctx.closePath();
    ctx.fill();
    // Roof ridge cap
    ctx.fillStyle = '#1a0f0a';
    ctx.fillRect(hx + houseW / 2 - P * 2, hy - roofH - P, P * 4, P);

    // ── Door — arched top, recessed ──
    const doorW = P * 6;
    const doorH = P * 12;
    const doorX = hx + houseW / 2 - doorW / 2;
    const doorY = GROUND_Y - doorH;
    ctx.fillStyle = '#080504';
    ctx.fillRect(doorX, doorY + P * 2, doorW, doorH - P * 2);
    // Arch top
    ctx.beginPath();
    ctx.arc(doorX + doorW / 2, doorY + P * 2, doorW / 2, Math.PI, 0);
    ctx.fill();
    // Door planks — subtle vertical lines
    ctx.fillStyle = '#0c0806';
    ctx.fillRect(doorX + doorW / 2 - 1, doorY + P * 2, 1, doorH - P * 2);
    // Iron handle
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(doorX + doorW - P * 2, doorY + doorH / 2, P, P * 2);
    // Warm light leaking under door
    ctx.globalAlpha = alpha * 0.2 * torchGlow;
    ctx.fillStyle = '#ff9930';
    ctx.fillRect(doorX + P, GROUND_Y - P, doorW - P * 2, P);
    ctx.globalAlpha = alpha;

    // ── Windows with candlelight ──
    const winW = P * 5;
    const winH = P * 5;
    const winLX = hx + P * 5;
    const winRX = hx + houseW - P * 10;
    const winY = hy + P * 5;

    // Window glow — warm candlelight
    ctx.fillStyle = `rgba(255, 150, 40, ${torchGlow})`;
    ctx.fillRect(winLX, winY, winW, winH);
    ctx.fillRect(winRX, winY, winW, winH);

    // Candle flames in windows
    const flameH = P + Math.sin(frameCount * 0.2) * 1.5;
    ctx.fillStyle = `rgba(255, 220, 100, ${torchGlow * 0.9})`;
    ctx.fillRect(winLX + winW / 2 - 1, winY + winH - P * 2 - flameH, 3, flameH + P);
    ctx.fillRect(winRX + winW / 2 - 1, winY + winH - P * 2 - flameH, 3, flameH + P);
    // Bright tip
    ctx.fillStyle = `rgba(255, 255, 180, ${torchGlow * 0.7})`;
    ctx.fillRect(winLX + winW / 2, winY + winH - P * 2 - flameH - 1, 1, 2);
    ctx.fillRect(winRX + winW / 2, winY + winH - P * 2 - flameH - 1, 1, 2);

    // Window light spill trapezoids
    ctx.globalAlpha = alpha * 0.12 * torchGlow;
    ctx.fillStyle = '#cc8020';
    ctx.beginPath();
    ctx.moveTo(winLX - P, winY + winH);
    ctx.lineTo(winLX + winW + P, winY + winH);
    ctx.lineTo(winLX + winW + P * 5, GROUND_Y);
    ctx.lineTo(winLX - P * 5, GROUND_Y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(winRX - P, winY + winH);
    ctx.lineTo(winRX + winW + P, winY + winH);
    ctx.lineTo(winRX + winW + P * 5, GROUND_Y);
    ctx.lineTo(winRX - P * 5, GROUND_Y);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = alpha;

    // Window frames — dark cross mullions
    ctx.fillStyle = '#080604';
    ctx.fillRect(winLX + winW / 2 - 1, winY, 2, winH);
    ctx.fillRect(winLX, winY + winH / 2 - 1, winW, 2);
    ctx.fillRect(winRX + winW / 2 - 1, winY, 2, winH);
    ctx.fillRect(winRX, winY + winH / 2 - 1, winW, 2);

    // ── Chimney ──
    ctx.fillStyle = '#0a0606';
    const chimX = hx + houseW - P * 9;
    const chimW = P * 4;
    const chimTop = hy - roofH + P * 4;
    ctx.fillRect(chimX, chimTop, chimW, hy - chimTop + roofH * 0.3);
    // Chimney cap
    ctx.fillStyle = '#0e0a08';
    ctx.fillRect(chimX - P, chimTop, chimW + P * 2, P);
    // Smoke wisps
    for (let s = 0; s < 3; s++) {
      const smokeY = chimTop - P * 3 - s * P * 5 + Math.sin(frameCount * 0.018 + s * 2.2) * 5;
      const smokeX = chimX + chimW / 2 + Math.sin(frameCount * 0.012 + s * 1.7) * 7;
      const smokeA = 0.06 - s * 0.015;
      ctx.globalAlpha = alpha * smokeA;
      ctx.fillStyle = '#444444';
      ctx.fillRect(smokeX - P, smokeY - P, P * 3, P * 2);
    }

    // ── Stone path leading to door ──
    ctx.globalAlpha = alpha * 0.4;
    ctx.fillStyle = '#1a1610';
    const pathCX = doorX + doorW / 2;
    for (let si = 0; si < 5; si++) {
      const sy = GROUND_Y + P + si * P * 2;
      const sw = P * 2 + si * P;
      ctx.fillRect(pathCX - sw / 2 + ((si * 3) % 3 - 1) * P, sy, sw, P);
    }

    // ── Wooden fence (left side) ──
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#120e08';
    const fenceStartX = hx - P * 8;
    const fenceEndX = hx - P;
    for (let fx = fenceStartX; fx < fenceEndX; fx += P * 3) {
      // Pointed tops
      ctx.fillRect(fx, GROUND_Y - P * 7, P, P * 7);
      ctx.fillStyle = '#1a1410';
      ctx.fillRect(fx, GROUND_Y - P * 8, P, P);
      ctx.fillStyle = '#120e08';
    }
    // Horizontal rails
    ctx.fillRect(fenceStartX, GROUND_Y - P * 5, fenceEndX - fenceStartX, P);
    ctx.fillRect(fenceStartX, GROUND_Y - P * 3, fenceEndX - fenceStartX, P);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPlayer() {
  if (!player.alive) return;
  // Invincibility flash — blink every 4 frames
  if (player.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;

  // Trail - subtle dust puffs (only when moving on ground)
  player.trail.forEach(t => {
    const alpha = (t.life / 12) * 0.08;
    if (alpha < 0.01) return;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(180, 180, 200, 0.5)';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 2 + (1 - t.life / 12) * 3, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (spriteReady) {
    ctx.save();

    let bobY = 0;
    let scaleX = player.facingRight ? 1 : -1;
    let rotation = 0;
    let scaleYAnim = 1;
    let scaleXAnim = 1;

    if (player.kicking) {
      // ── KICK ANIMATION ──
      // Kick is a fast forward tilt + leg extension
      const kt = player.kickTimer / 20; // 0 to 1
      const kickCurve = Math.sin(kt * Math.PI); // peaks at 0.5
      rotation = scaleX * kickCurve * 0.35; // lean forward into kick
      // Stretch horizontally, squash vertically during kick peak
      scaleXAnim = 1 + kickCurve * 0.15;
      scaleYAnim = 1 - kickCurve * 0.1;
    } else if (!player.grounded && player.doubleJumped) {
      // ── DOUBLE JUMP SPIN (eased, with tuck + afterimages) ──
      rotation = player.spinAngle;
      const spinProgress = Math.min(1, player.spinTimer / 24);
      // Tuck: sprite compresses at peak spin speed (early in animation)
      const spinSpeed = spinProgress < 0.5 ? spinProgress * 2 : 2 - spinProgress * 2;
      scaleXAnim = 1 + spinSpeed * 0.12;  // wider during fast spin
      scaleYAnim = 1 - spinSpeed * 0.15;  // shorter during fast spin (tuck)

      // Draw afterimage ghosts (semi-transparent trailing copies)
      if (spinProgress < 0.85 && spinProgress > 0.05) {
        for (let g = 1; g <= 3; g++) {
          const ghostAngle = rotation - g * 0.45;
          const ghostAlpha = (0.2 - g * 0.05) * (1 - spinProgress);
          if (ghostAlpha > 0.01) {
            ctx.save();
            ctx.globalAlpha = ghostAlpha;
            ctx.translate(cx, player.y + player.h);
            ctx.rotate(ghostAngle);
            ctx.scale(scaleX * scaleXAnim, scaleYAnim);
            ctx.drawImage(ninjaSprite, -SPRITE_W / 2, -SPRITE_H, SPRITE_W, SPRITE_H);
            ctx.restore();
          }
        }
        ctx.globalAlpha = 1;
      }
    } else if (!player.grounded) {
      // ── SINGLE JUMP — lean back/forward ──
      if (player.vy < 0) {
        rotation = -0.12;
        scaleYAnim = 1.05;
        scaleXAnim = 0.95;
      } else {
        rotation = 0.08;
        scaleYAnim = 0.95; // squash down
        scaleXAnim = 1.05;
      }
    } else {
      // ── WALK CYCLE on ground ──
      // Bob up and down + squash/stretch for walk feel
      const walkPhase = player.runFrame * Math.PI / 2;
      bobY = Math.sin(walkPhase) * 4;
      // Squash at bottom of bob, stretch at top
      const squashStretch = Math.sin(walkPhase);
      scaleYAnim = 1 - squashStretch * 0.06;
      scaleXAnim = 1 + squashStretch * 0.04;
      // Slight lean in movement direction
      rotation = Math.sin(walkPhase) * 0.05;
    }

    ctx.translate(cx, player.y + player.h + bobY);
    ctx.rotate(rotation);
    ctx.scale(scaleX * scaleXAnim, scaleYAnim);

    // Draw sprite centered at bottom
    ctx.drawImage(ninjaSprite, -SPRITE_W / 2, -SPRITE_H, SPRITE_W, SPRITE_H);

    // ── KICK LEG (pixel art extension during kick) ──
    if (player.kicking) {
      const kt = player.kickTimer / 20;
      const kickExtend = Math.sin(kt * Math.PI);
      const P = 4;
      const legLen = Math.floor(kickExtend * 6) * P;
      if (legLen > 0) {
        // Kicking leg extends forward from lower body
        const legX = SPRITE_W * 0.2;
        const legY = -SPRITE_H * 0.2;
        // Upper leg
        ctx.fillStyle = '#2266bb';
        ctx.fillRect(legX, legY, legLen, P * 2);
        // Shoe/foot
        ctx.fillStyle = '#1a4488';
        ctx.fillRect(legX + legLen, legY - P, P * 2, P * 3);
        // Highlight
        ctx.fillStyle = '#44aadd';
        ctx.fillRect(legX, legY, legLen, P);
      }
    }

    ctx.restore();

    // ── KICK EFFECT (impact lines when kick peaks) ──
    if (player.kicking && player.kickTimer > 6 && player.kickTimer < 14) {
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#44ccff';
      ctx.lineWidth = 2;
      const effectX = player.facingRight ? cx + SPRITE_W * 0.6 : cx - SPRITE_W * 0.6;
      const effectDir = player.facingRight ? 1 : -1;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(effectX, cy + i * 8);
        ctx.lineTo(effectX + effectDir * (15 + Math.abs(i) * 5), cy + i * 12);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Shadow on ground
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    const shadowGroundY = level === 4 ? getGroundY(player.x + scrollOffset) : GROUND_Y;
    const shadowScale = player.grounded ? 1 : Math.max(0.4, 1 - (shadowGroundY - (player.y + player.h)) / 200);
    ctx.beginPath();
    ctx.ellipse(cx, shadowGroundY + 2, SPRITE_W * 0.35 * shadowScale, 4 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Fallback: simple rectangle if sprite not loaded
    ctx.fillStyle = '#3399dd';
    ctx.fillRect(player.x, player.y, player.w, player.h);
  }
}

function drawHUD() {
  // Level progress bar
  const progress = levelTimer / levelDuration;
  const barW = W - 40;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(20, 12, barW, 10);
  const barGrad = ctx.createLinearGradient(20, 12, 20 + barW * progress, 22);
  barGrad.addColorStop(0, '#33ccff');
  barGrad.addColorStop(1, '#0088ff');
  ctx.fillStyle = barGrad;
  ctx.fillRect(20, 12, barW * progress, 10);
  ctx.strokeStyle = 'rgba(100,200,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 12, barW, 10);

  // Level label
  ctx.fillStyle = '#33ccff';
  ctx.font = `bold 7px ${GAME_FONT}`;
  ctx.textAlign = 'left';
  ctx.fillText(`LEVEL ${level} — NEO TOKYO`, 20, 38);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold 12px ${GAME_FONT}`;
  ctx.textAlign = 'right';
  ctx.fillText(`${score}`, W - 20, 38);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ff8866';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillText(`BEST: ${highScore}`, W - 20, 54);
  }

  // ── Lives display (character icons) ──
  const iconSize = 20;
  const iconGap = 4;
  const livesStartX = 20;
  const livesY = 48;
  for (let i = 0; i < lives; i++) {
    const ix = livesStartX + i * (iconSize + iconGap);
    if (spriteReady) {
      ctx.drawImage(ninjaSprite, ix, livesY, iconSize, iconSize);
    } else {
      ctx.fillStyle = '#3399dd';
      ctx.fillRect(ix, livesY, iconSize, iconSize);
    }
  }

  // Double jump indicator
  if (!player.grounded && !player.doubleJumped) {
    ctx.textAlign = 'center';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillStyle = 'rgba(100,200,255,0.6)';
    ctx.fillText('DOUBLE JUMP READY', W / 2, 55);
  }
}

function drawMenu() {
  // Dissolve factor: 0 during pause, ramps to 1 slowly as scroll starts
  const dissolve = menuScrollY <= 0 ? 0 : Math.min(1, menuScrollY / 250);

  // Draw the city background — fades to black as legend scrolls
  // Always start with the solid dark base to prevent flicker
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  if (dissolve < 1) {
    ctx.globalAlpha = 1 - dissolve;
    drawNeoTokyoSky();
    drawBuildingLayer(buildings_far, 0.05, 0);
    drawBuildingLayer(buildings_mid, 0.15, 0.3);
    drawNeonSigns();
    drawBuildingLayer(buildings_near, 0.3, 0.1);
    drawStreet();
    // Darken overlay on top of city
    ctx.globalAlpha = 1;
    ctx.fillStyle = `rgba(0,0,0,${0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.textAlign = 'center';

  // Title image/text — fades out as dissolve increases
  const titleAlpha = Math.max(0, 1 - dissolve * 1.2);
  if (titleAlpha > 0.01) {
    ctx.globalAlpha = titleAlpha;
    // Slow zoom: grows ~12% over the title display duration
    const zoomTime = menuScrollY + 480; // 0 at menu start, increases over time
    const titleScale = 1 + Math.min(0.12, Math.max(0, zoomTime) * 0.00015);
    if (titleReady) {
      const maxW = W * 0.85;
      const aspect = titleImg.height / titleImg.width;
      const baseW = Math.min(maxW, titleImg.width);
      const baseH = baseW * aspect;
      const drawW = baseW * titleScale;
      const drawH = baseH * titleScale;
      const titleX = (W - drawW) / 2;
      const titleY = H / 2 - drawH / 2 - 40;
      ctx.drawImage(titleImg, titleX, titleY, drawW, drawH);
    } else {
      ctx.save();
      ctx.translate(W / 2, H / 2 - 35);
      ctx.scale(titleScale, titleScale);
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#ff6600';
      ctx.font = `bold 36px ${GAME_FONT}`;
      ctx.fillText('EVERYTHING', 0, -30);
      ctx.fillStyle = '#ffcc00';
      ctx.font = `bold 42px ${GAME_FONT}`;
      ctx.fillText('IS LAVA', 0, 30);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    const pulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = titleAlpha * pulse;
    ctx.fillStyle = '#ffaa66';
    ctx.font = `16px ${GAME_FONT}`;
    ctx.fillText(titleMusicUnlocked ? 'Press SPACE to start' : 'Press any key', W / 2, H - 50);
    ctx.globalAlpha = titleAlpha;
    ctx.fillStyle = '#667788';
    ctx.font = `10px ${GAME_FONT}`;
    ctx.fillText('A/D  ·  Space  ·  Double jump  ·  Dodge the lava!', W / 2, H - 25);
    ctx.globalAlpha = 1;
  }

  // ── Scrolling legend crawl ──
  // Only draw when scroll has started (menuScrollY > 0)
  if (menuScrollY > 0) {
    // Use pre-computed legend arrays (hoisted to module scope)

    // Scroll zone — smoothly expands as title fades
    const scrollZoneTopStart = H / 2 + 100;
    const scrollZoneTopEnd = 30;
    const scrollZoneTop = scrollZoneTopStart + (scrollZoneTopEnd - scrollZoneTopStart) * dissolve;
    const scrollZoneH = H - scrollZoneTop - 10;
    const fadeH = 35;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, scrollZoneTop, W, scrollZoneH);
    ctx.clip();

    let yPos = scrollZoneTop + scrollZoneH - menuScrollY;
    // Loop the scroll
    if (yPos + MENU_LEGEND_TOTAL_H < scrollZoneTop) {
      menuScrollY = -60; // brief pause before repeating
      yPos = scrollZoneTop + scrollZoneH;
    }

    ctx.textAlign = 'center';
    for (let li = 0; li < MENU_LEGEND_LINES.length; li++) {
      const line = MENU_LEGEND_LINES[li];
      yPos += line.size + MENU_LEGEND_LINE_GAP * 0.5;
      if (yPos < scrollZoneTop - 20 || yPos > scrollZoneTop + scrollZoneH + 20) continue;
      if (!line.text) continue;

      let alpha = 0.8;
      const distFromBottom = (scrollZoneTop + scrollZoneH) - yPos;
      if (distFromBottom < fadeH) alpha *= distFromBottom / fadeH;
      alpha = Math.max(0, Math.min(0.8, alpha));

      ctx.globalAlpha = alpha;
      ctx.fillStyle = line.color;
      ctx.font = MENU_LEGEND_FONTS[li];
      ctx.fillText(line.text, W / 2, yPos);
    }

    ctx.globalAlpha = 1;
    ctx.restore();

  }
}

function drawRespawnScreen() {
  const t = deathTimer;

  // ── Death sprite animation (flies up spinning, then falls off screen) ──
  if (deathAnimActive && spriteReady) {
    deathAnimVY += 0.4; // gravity
    deathAnimY += deathAnimVY;
    deathAnimSpin += 0.25;

    // Spawn trailing particles while falling
    if (t % 3 === 0) {
      spawnParticles(deathAnimX, deathAnimY, '#ff6600', 2, 3);
    }

    if (deathAnimY < H + 100) {
      const fadeOut = deathAnimY > H - 50 ? Math.max(0, 1 - (deathAnimY - (H - 50)) / 100) : 1;
      ctx.save();
      ctx.globalAlpha = fadeOut;
      ctx.translate(deathAnimX, deathAnimY);
      ctx.rotate(deathAnimSpin);
      ctx.drawImage(ninjaSprite, -SPRITE_W / 2, -SPRITE_H / 2, SPRITE_W, SPRITE_H);
      ctx.restore();
      ctx.globalAlpha = 1;
    } else {
      deathAnimActive = false;
    }
  }

  // Darken background
  const bgAlpha = Math.min(0.5, t * 0.015);
  ctx.fillStyle = `rgba(0,0,0,${bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  if (t > 20) {
    const textAlpha = Math.min(1, (t - 20) / 20);
    ctx.globalAlpha = textAlpha;
    ctx.textAlign = 'center';

    // "GET GOOD!" text
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff4400';
    ctx.font = `bold 28px ${GAME_FONT}`;
    ctx.fillText('GET GOOD!', W / 2, H / 2 - 50);
    ctx.shadowBlur = 0;

    // Lives remaining — character icons
    const iconSize = 28;
    const iconGap = 6;
    const totalW = lives * (iconSize + iconGap) - iconGap;
    const startX = W / 2 - totalW / 2;

    ctx.fillStyle = '#ccbbaa';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillText('LIVES REMAINING', W / 2, H / 2 - 10);

    for (let i = 0; i < lives; i++) {
      const ix = startX + i * (iconSize + iconGap);
      const iy = H / 2 + 5;
      if (spriteReady) {
        ctx.drawImage(ninjaSprite, ix, iy, iconSize, iconSize);
      } else {
        ctx.fillStyle = '#3399dd';
        ctx.fillRect(ix, iy, iconSize, iconSize);
      }
    }

    ctx.globalAlpha = 1;
  }

  // Respawn prompt after delay
  if (t >= DEATH_RESTART_DELAY) {
    const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffaa66';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillText('Press SPACE or TAP to continue', W / 2, H / 2 + 60);
    ctx.globalAlpha = 1;
  }
}

function drawVictory() {
  const t = deathTimer;

  // Black background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  const scrollStart = 120; // frames before scroll begins
  const lineH = 22;

  if (t > scrollStart) {
    const scrollY = (t - scrollStart) * 0.4; // scroll speed
    const legendLines = victoryLegendCache;

    // Calculate positions and draw
    let yPos = H + 40 - scrollY;
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 35, W, H - 70);
    ctx.clip();

    for (const line of legendLines) {
      if (line.text === 'SPRITE') {
        if (spriteReady && yPos > -110 && yPos < H + 30) {
          const sprW = 100, sprH = 100;
          const fadeTop = Math.min(1, (yPos - 35) / 50);
          const fadeBot = Math.min(1, (H - 35 - yPos) / 50);
          ctx.globalAlpha = Math.max(0, Math.min(fadeTop, fadeBot));
          // Blue glow behind sprite
          ctx.shadowColor = '#44aaff';
          ctx.shadowBlur = 25;
          ctx.drawImage(ninjaSprite, W / 2 - sprW / 2, yPos, sprW, sprH);
          ctx.shadowBlur = 0;
        }
        yPos += line.gap;
        continue;
      }
      if (line.text === '') { yPos += line.gap; continue; }

      if (yPos > -30 && yPos < H + 30) {
        const fadeTop = Math.min(1, (yPos - 35) / 50);
        const fadeBot = Math.min(1, (H - 35 - yPos) / 50);
        ctx.globalAlpha = Math.max(0, Math.min(fadeTop, fadeBot));
        ctx.font = line.font;
        ctx.fillStyle = line.color;
        // Golden glow for headings
        if (line.color === '#ffcc00' || line.color === '#ffcc44') {
          ctx.shadowColor = line.color;
          ctx.shadowBlur = 15;
        }
        ctx.fillText(line.text, W / 2, yPos);
        ctx.shadowBlur = 0;
      }
      yPos += lineH + line.gap;
    }

    ctx.restore();
    ctx.globalAlpha = 1;

    // Check if scroll finished
    let totalH = 0;
    for (const line of legendLines) {
      if (line.text === '' || line.text === 'SPRITE') { totalH += line.gap; }
      else { totalH += lineH + line.gap; }
    }
    const endScrollY = totalH + 40 - H / 2;
    if (scrollY > endScrollY) {
      victoryScrollDone = true;
    }
  } else {
    // Brief pause — show title before scroll starts
    const fadeIn = Math.min(1, t / 40);
    ctx.globalAlpha = fadeIn;
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold 24px ${GAME_FONT}`;
    ctx.fillText('YOU GOT GOOD', W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawDeathScreen() {

  const bgAlpha = Math.min(0.7, t * 0.01);
  ctx.fillStyle = `rgba(0,0,0,${bgAlpha})`;
