  for (let i = 0; i < SFX_LIST.length; i++) {
    const sfx = SFX_LIST[i];
    const y = startY + i * rowH;
    const selected = i === sfxSelectedIndex;
    const justPlayed = selected && sfxPlayingTimer > 0;

    // Selection highlight bar
    if (selected) {
      const barAlpha = justPlayed ? 0.35 : 0.15;
      const barColor = justPlayed ? 'rgba(255,102,0,' + barAlpha + ')' : 'rgba(255,170,100,' + barAlpha + ')';
      ctx.fillStyle = barColor;
      const barW = 340;
      ctx.fillRect(listX - barW / 2, y - 8, barW, rowH - 4);

      // Selection arrow
      ctx.fillStyle = '#ff6600';
      ctx.font = `10px ${GAME_FONT}`;
      ctx.textAlign = 'right';
      ctx.fillText('▶', listX - 145, y + 5);
    }

    // Key shortcut
    ctx.textAlign = 'left';
    ctx.fillStyle = selected ? '#ffcc00' : '#556677';
    ctx.font = `bold 8px ${GAME_FONT}`;
    ctx.fillText('[' + sfx.key + ']', listX - 130, y + 5);

    // SFX name
    ctx.fillStyle = selected ? (justPlayed ? '#ff8844' : '#ffddbb') : '#8899aa';
    ctx.font = `9px ${GAME_FONT}`;
    ctx.fillText(sfx.name, listX - 95, y + 5);

    // Playing indicator
    if (justPlayed) {
      ctx.fillStyle = '#ff6600';
      ctx.font = `bold 8px ${GAME_FONT}`;
      ctx.textAlign = 'right';
      ctx.fillText('♪', listX + 155, y + 5);
    }
  }

  ctx.textAlign = 'left';

  // Decrement playing timer
  if (sfxPlayingTimer > 0) sfxPlayingTimer--;
}

function updateDojo() {
  // Stun countdown
  if (dojoStunTimer > 0) {
    dojoStunTimer--;
    // During stun: still apply gravity but no input
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.y + player.h >= GROUND_Y) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumping = false;
      player.doubleJumped = false;
    }
    // Stun visual shake
    player.x += (Math.random() - 0.5) * 3;
    player.x = Math.max(10, Math.min(W - player.w - 10, player.x));
    jumpBuffered = false;
    // Still update birds/water while stunned
    updateDojoBirds();
    updateDojoWater();
    return;
  }

  // Same movement as main game but no lava, no vehicles, no scrolling
  if (jumpBuffered) {
    if (player.crouching) {
      player.crouching = false;
      player.h = SPRITE_H;
      player.y = GROUND_Y - player.h;
    }
    if (player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      player.jumping = true;
      player.doubleJumped = false;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#44bbff', 6, 3);
    } else if (!player.doubleJumped) {
      player.vy = JUMP_FORCE * 0.82;
      player.doubleJumped = true;
      player.spinAngle = 0;
      player.spinTimer = 0;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#66ddff', 10, 5);
    }
    jumpBuffered = false;
  }

  player.vy += GRAVITY;
  player.y += player.vy;

  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = PLAYER_SPEED;
  player.x += moveX;
  player.x = Math.max(10, Math.min(W - player.w - 10, player.x));

  if (moveX > 0) player.facingRight = true;
  else if (moveX < 0) player.facingRight = false;

  // Crouch — down arrow or S while grounded
  const wantCrouch = player.grounded && (keys['ArrowDown'] || keys['KeyS']);
  if (wantCrouch && !player.crouching) {
    player.crouching = true;
    player.h = Math.floor(SPRITE_H * 0.5);
    player.y = GROUND_Y - player.h;
  } else if (!wantCrouch && player.crouching) {
    player.crouching = false;
    player.h = SPRITE_H;
    player.y = GROUND_Y - player.h;
  }

  if (player.kicking) {
    player.kickTimer++;
    if (player.kickTimer > 20) {
      player.kicking = false;
      player.kickTimer = 0;
    }
  }

  if (!player.grounded && player.doubleJumped) {
    player.spinTimer++;
    const t = player.spinTimer;
    const spinDuration = 24;
    if (t <= spinDuration) {
      const progress = t / spinDuration;
      const eased = 1 - Math.pow(1 - progress, 3);
      player.spinAngle = eased * Math.PI * 2;
    } else {
      player.spinAngle = Math.PI * 2;
    }
  } else if (player.grounded) {
    player.spinAngle = 0;
    player.spinTimer = 0;
  }

  // ── Dojo lamp platform collision ──
  const dojoLampX = W / 2;
  const dojoLampPlatY = GROUND_Y - 135; // top of lamp arm
  const dojoLampPlatW = 32; // P*4 each side = 32px total
  const dojoLampPlatH = 8;  // 2*P thickness
  const pLeft = dojoLampX - dojoLampPlatW / 2;
  const pRight = dojoLampX + dojoLampPlatW / 2;
  const pTop = dojoLampPlatY;
  if (
    player.vy >= 0 &&
    player.x + player.w > pLeft + 4 &&
    player.x < pRight - 4 &&
    player.y + player.h >= pTop &&
    player.y + player.h <= pTop + dojoLampPlatH + player.vy + 2
  ) {
    player.y = pTop - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumping = false;
    player.doubleJumped = false;
  }

  if (player.y + player.h >= GROUND_Y) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumping = false;
    player.doubleJumped = false;
  }

  if (player.grounded) {
    player.runTimer++;
    if (player.runTimer > 10) { // slower bob in dojo (was 5 in gameplay)
      player.runFrame = (player.runFrame + 1) % 4;
      player.runTimer = 0;
    }
  }

  player.trail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, life: 12 });
  if (player.trail.length > 15) player.trail.shift();
  player.trail.forEach(t => t.life--);

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Trial mode — advance timer, ramp difficulty, track score
  if (dojoTrialOn) {
    dojoTrialTimer++;
    // Score: +1 per frame survived without being stunned
    if (dojoStunTimer <= 0) dojoTrialScore++;
    // End trial when time runs out
    if (dojoTrialTimer >= dojoTrialDuration) {
      dojoTrialOn = false;
      // Leave birds/water on so player sees final state, but stop spawning
      dojoBirdsOn = false;
      dojoWaterOn = false;
    }
  }

  // Update birds & water, check collisions
  updateDojoBirds();
  updateDojoWater();
}

function dojoStun() {
  if (dojoStunTimer > 0) return; // already stunned
  dojoHitCount++;
  dojoStunTimer = 30; // ~0.5 second stun
  player.vy = -4; // small knockback hop
  player.grounded = false;
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ffffff', 8, 3);
}

function updateDojoBirds() {
  if (!dojoBirdsOn) return;
  // Spawn rate: ramps from every 60 frames down to every 20 during trial
  const trialProgress = dojoTrialOn ? dojoTrialTimer / dojoTrialDuration : 0;
  const birdRate = Math.max(20, Math.floor(60 - trialProgress * 40));
  if (frameCount % birdRate === 0) {
    const birdY = 60 + Math.random() * (GROUND_Y - 120);
    const speedBonus = trialProgress * 3; // birds get faster during trial
    const speed = 3 + Math.random() * 3 + speedBonus;
    dojoBirds.push({ x: W + 20, y: birdY, vx: -speed, frame: 0, timer: 0, w: 24, h: 16 });
  }
  for (let i = dojoBirds.length - 1; i >= 0; i--) {
    const b = dojoBirds[i];
    b.x += b.vx;
    b.timer++;
    if (b.timer % 8 === 0) b.frame = (b.frame + 1) % 4;
    // Wave motion
    b.y += Math.sin(b.timer * 0.08) * 0.5;
    // Remove offscreen — dodged
    if (b.x < -40) { dojoDodgeCount++; dojoBirds.splice(i, 1); continue; }
    // Collision with player
    if (dojoStunTimer <= 0 &&
        b.x < player.x + player.w &&
        b.x + b.w > player.x &&
        b.y < player.y + player.h &&
        b.y + b.h > player.y) {
      dojoStun();
      dojoBirds.splice(i, 1);
    }
  }
}

function updateClimbBirds() {
  if (!verticalMode) { climbBirds = []; return; }

  // Spawn rate: ~every 90-140 frames, gets slightly denser higher up
  const climbProg = Math.min(1, Math.abs(scrollOffsetY) / CLIMB_TOTAL_HEIGHT);
  // No new birds in the final 1/3 of the climb — but let existing ones finish
  const spawnRate = Math.max(60, Math.floor(120 - climbProg * 50));
  if (climbProg <= 0.67 && frameCount % spawnRate === 0) {
    const birdScreenY = 40 + Math.random() * (H * 0.7);
    const fromLeft = Math.random() < 0.5;
    // Eagles: ~40% base chance, up to ~70% higher up
    const eagle = Math.random() < 0.4 + climbProg * 0.3;
    const speed = eagle
      ? 1.8 + Math.random() * 1.5 + climbProg * 1.0  // eagles are slower but menacing
      : 2.5 + Math.random() * 2.5 + climbProg * 1.5;
    climbBirds.push({
      x: fromLeft ? (eagle ? -60 : -30) : (eagle ? W + 60 : W + 30),
      y: birdScreenY,
      baseY: birdScreenY,
      vx: fromLeft ? speed : -speed,
      dir: fromLeft ? 1 : -1,
      frame: 0,
      timer: 0,
      w: eagle ? 48 : 24,
      h: eagle ? 28 : 16,
      isEagle: eagle,
      bobPhase: Math.random() * Math.PI * 2
    });
    if (eagle) playEagleScreech();
  }

  for (let i = climbBirds.length - 1; i >= 0; i--) {
    const b = climbBirds[i];
    b.x += b.vx;
    b.timer++;
    if (b.timer % 8 === 0) b.frame = (b.frame + 1) % 4;
    // Up/down soaring motion — eagles have bigger, slower swoops
    if (b.baseY === undefined) { b.baseY = b.y; b.bobPhase = 0; }
    if (b.isEagle) {
      // Eagle attack behavior: dive toward player when in range
      if (b.attackState === undefined) b.attackState = 'approach'; // approach → dive → pullup → glide
      if (b.attackState === 'pullup') b.pullupTimer = (b.pullupTimer || 0);

      const distToPlayer = Math.abs(b.x + b.w / 2 - (player.x + player.w / 2));
      const playerCenterY = player.y + player.h / 2;

      if (b.attackState === 'approach') {
        // Soar at baseY until horizontally close to player
        b.y = b.baseY + Math.sin(b.timer * 0.035 + b.bobPhase) * 12;
        if (distToPlayer < W * 0.45) {
          b.attackState = 'dive';
          b.diveStartY = b.y;
          b.diveTargetY = playerCenterY - 5; // aim slightly above player center
          b.diveProgress = 0;
        }
      } else if (b.attackState === 'dive') {
        // Swoop down toward the player's Y position
        b.diveProgress += 0.04;
        const t = Math.min(1, b.diveProgress);
        const ease = t * t * (3 - 2 * t); // smooth ease in-out
        b.y = b.diveStartY + (b.diveTargetY - b.diveStartY) * ease;
        // Speed up during dive
        b.x += b.vx * 0.3;
        if (t >= 1) {
          b.attackState = 'pullup';
          b.pullupTimer = 0;
          b.pullupStartY = b.y;
        }
      } else if (b.attackState === 'pullup') {
        // Pull back up after dive
        b.pullupTimer++;
        const pullT = Math.min(1, b.pullupTimer / 40);
        const pullEase = pullT * pullT;
        b.y = b.pullupStartY + (b.baseY - b.pullupStartY) * pullEase;
        if (pullT >= 1) {
          b.attackState = 'glide'; // done attacking, just glide out
        }
      } else {
        // glide: gentle bob while exiting
        b.y = b.baseY + Math.sin(b.timer * 0.035 + b.bobPhase) * 8;
      }
    } else {
      b.y = b.baseY + Math.sin(b.timer * 0.07 + b.bobPhase) * 3;
    }
    // Remove when offscreen on the other side
    if ((b.dir > 0 && b.x > W + 40) || (b.dir < 0 && b.x < -40)) {
      climbBirds.splice(i, 1);
      continue;
    }
    // Collision — knockback, no kill. Eagles hit much harder.
    if (player.invincible <= 0 &&
        b.x < player.x + player.w &&
        b.x + b.w > player.x &&
        b.y < player.y + player.h &&
        b.y + b.h > player.y) {
      const knockForce = b.isEagle ? 80 : 6;  // eagles send you FLYING sideways
      const knockUp = b.isEagle ? -6 : -7;   // eagles: huge horizontal + upward pop
      const invFrames = b.isEagle ? 60 : 40;
      player.x += b.dir * knockForce;
      player.x = Math.max(10, Math.min(W - player.w - 10, player.x));
      player.vy = knockUp;
      player.grounded = false;
      player.invincible = invFrames;
      player.knockbackTimer = 20;
      playRockHit();
      const pColor = b.isEagle ? '#ffddaa' : '#aabbcc';
      const pCount = b.isEagle ? 12 : 6;
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, pColor, pCount, b.isEagle ? 5 : 3);
      b.vx *= 1.8;
    }
  }
}

function drawClimbBirds() {
  const P = 4;
  for (const b of climbBirds) {
    const bx = Math.floor(b.x);
    const by = Math.floor(b.y);
    const wingUp = b.frame < 2;
    const facingLeft = b.dir < 0;

    if (b.isEagle) {
      // ── EAGLE — large, brown/gold, hooked beak, wide wingspan ──
      const E = P; // same pixel size
      if (facingLeft) {
        // Body — wide, dark brown
        ctx.fillStyle = '#4a3020';
        ctx.fillRect(bx, by + E * 2, E * 8, E * 3);
        // Chest — lighter brown
        ctx.fillStyle = '#6a4830';
        ctx.fillRect(bx + E, by + E * 2, E * 3, E * 2);
        // Head — white (bald eagle)
        ctx.fillStyle = '#e8ddd0';
        ctx.fillRect(bx - E, by + E, E * 3, E * 3);
        ctx.fillRect(bx - E * 2, by + E * 2, E, E * 2);
        // Eye — fierce yellow with black pupil
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(bx, by + E * 2, E, E);
        ctx.fillStyle = '#000000';
        ctx.fillRect(bx, by + E * 2, Math.ceil(E * 0.6), Math.ceil(E * 0.6));
        // Hooked beak — yellow, curves down
        ctx.fillStyle = '#eea820';
        ctx.fillRect(bx - E * 3, by + E * 3, E * 2, E);
        ctx.fillRect(bx - E * 2, by + E * 4, E, E);
        // Wings — dark brown, WIDE
        ctx.fillStyle = '#3a2418';
        if (wingUp) {
          ctx.fillRect(bx + E * 2, by - E * 2, E * 5, E);
          ctx.fillRect(bx + E * 3, by - E * 3, E * 4, E);
          ctx.fillRect(bx + E * 4, by - E * 4, E * 3, E);
          // Wing tips — lighter
          ctx.fillStyle = '#5a3c28';
          ctx.fillRect(bx + E * 6, by - E * 4, E * 2, E);
        } else {
          ctx.fillRect(bx + E * 2, by + E * 5, E * 5, E);
          ctx.fillRect(bx + E * 3, by + E * 6, E * 4, E);
          ctx.fillRect(bx + E * 4, by + E * 7, E * 3, E);
          ctx.fillStyle = '#5a3c28';
          ctx.fillRect(bx + E * 6, by + E * 7, E * 2, E);
        }
        // Tail feathers — dark, fanned
        ctx.fillStyle = '#2a1810';
        ctx.fillRect(bx + E * 8, by + E, E * 3, E);
        ctx.fillRect(bx + E * 8, by + E * 2, E * 2, E);
        ctx.fillRect(bx + E * 9, by + E * 3, E * 2, E);
        // Talons
        ctx.fillStyle = '#eea820';
        ctx.fillRect(bx + E, by + E * 5, E, E);
        ctx.fillRect(bx + E * 3, by + E * 5, E, E);
      } else {
        // Body — mirrored
        ctx.fillStyle = '#4a3020';
        ctx.fillRect(bx + E * 4, by + E * 2, E * 8, E * 3);
        // Chest
        ctx.fillStyle = '#6a4830';
        ctx.fillRect(bx + E * 8, by + E * 2, E * 3, E * 2);
        // Head — white
        ctx.fillStyle = '#e8ddd0';
        ctx.fillRect(bx + E * 10, by + E, E * 3, E * 3);
        ctx.fillRect(bx + E * 13, by + E * 2, E, E * 2);
        // Eye
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(bx + E * 11, by + E * 2, E, E);
        ctx.fillStyle = '#000000';
        ctx.fillRect(bx + E * 11 + Math.floor(E * 0.4), by + E * 2, Math.ceil(E * 0.6), Math.ceil(E * 0.6));
        // Hooked beak
        ctx.fillStyle = '#eea820';
        ctx.fillRect(bx + E * 13, by + E * 3, E * 2, E);
        ctx.fillRect(bx + E * 13, by + E * 4, E, E);
        // Wings
        ctx.fillStyle = '#3a2418';
        if (wingUp) {
          ctx.fillRect(bx + E * 5, by - E * 2, E * 5, E);
          ctx.fillRect(bx + E * 5, by - E * 3, E * 4, E);
          ctx.fillRect(bx + E * 5, by - E * 4, E * 3, E);
          ctx.fillStyle = '#5a3c28';
          ctx.fillRect(bx + E * 4, by - E * 4, E * 2, E);
        } else {
          ctx.fillRect(bx + E * 5, by + E * 5, E * 5, E);
          ctx.fillRect(bx + E * 5, by + E * 6, E * 4, E);
          ctx.fillRect(bx + E * 5, by + E * 7, E * 3, E);
          ctx.fillStyle = '#5a3c28';
          ctx.fillRect(bx + E * 4, by + E * 7, E * 2, E);
        }
        // Tail feathers
        ctx.fillStyle = '#2a1810';
        ctx.fillRect(bx + E, by + E, E * 3, E);
        ctx.fillRect(bx + E * 2, by + E * 2, E * 2, E);
        ctx.fillRect(bx + E, by + E * 3, E * 2, E);
        // Talons
        ctx.fillStyle = '#eea820';
        ctx.fillRect(bx + E * 8, by + E * 5, E, E);
        ctx.fillRect(bx + E * 10, by + E * 5, E, E);
      }
    } else {
      // ── Small bird — same as before ──
      if (facingLeft) {
        ctx.fillStyle = '#556070';
        ctx.fillRect(bx, by + P, P * 5, P * 2);
        ctx.fillStyle = '#667080';
        ctx.fillRect(bx, by + P, P * 2, P * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(bx + P, by + P, P, P);
        ctx.fillStyle = '#ffaa44';
        ctx.fillRect(bx - P, by + P * 2, P, P);
        ctx.fillStyle = '#778899';
        if (wingUp) {
          ctx.fillRect(bx + P, by - P, P * 3, P);
          ctx.fillRect(bx + P * 2, by - P * 2, P * 2, P);
        } else {
          ctx.fillRect(bx + P, by + P * 3, P * 3, P);
          ctx.fillRect(bx + P * 2, by + P * 4, P * 2, P);
        }
        ctx.fillStyle = '#667080';
        ctx.fillRect(bx + P * 5, by, P * 2, P);
        ctx.fillRect(bx + P * 5, by + P, P, P);
      } else {
        ctx.fillStyle = '#556070';
        ctx.fillRect(bx + P * 2, by + P, P * 5, P * 2);
        ctx.fillStyle = '#667080';
        ctx.fillRect(bx + P * 5, by + P, P * 2, P * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(bx + P * 5, by + P, P, P);
        ctx.fillStyle = '#ffaa44';
        ctx.fillRect(bx + P * 7, by + P * 2, P, P);
        ctx.fillStyle = '#778899';
        if (wingUp) {
          ctx.fillRect(bx + P * 3, by - P, P * 3, P);
          ctx.fillRect(bx + P * 3, by - P * 2, P * 2, P);
        } else {
          ctx.fillRect(bx + P * 3, by + P * 3, P * 3, P);
          ctx.fillRect(bx + P * 3, by + P * 4, P * 2, P);
        }
        ctx.fillStyle = '#667080';
        ctx.fillRect(bx, by, P * 2, P);
        ctx.fillRect(bx + P, by + P, P, P);
      }
    }
  }
}

function updateDojoWater() {
  if (!dojoWaterOn) return;
  // Spawn rate: ramps from every 25 frames down to every 10 during trial
  const trialProgress = dojoTrialOn ? dojoTrialTimer / dojoTrialDuration : 0;
  const waterRate = Math.max(10, Math.floor(25 - trialProgress * 15));
  if (frameCount % waterRate === 0) {
    const dx = 30 + Math.random() * (W - 60);
    const speedBonus = trialProgress * 2;
    const spd = 2 + Math.random() * 3 + speedBonus;
    const sz = 3 + Math.random() * 3;
    dojoWaterDrops.push({ x: dx, y: -10, vy: 0, size: sz, warn: 40, speed: spd });
    // warn > 0: drop is invisible, floor flashes. When warn hits 0, drop starts falling.
  }
  // Update warnings and drops

  for (let i = dojoWaterDrops.length - 1; i >= 0; i--) {
    const d = dojoWaterDrops[i];
    // Warning phase — drop hasn't started falling yet
    if (d.warn > 0) {
      d.warn--;
      if (d.warn === 0) d.vy = d.speed; // start falling
      continue;
    }
    d.vy += 0.15; // gravity
    d.y += d.vy;
    // Hit the ground — dodged, splash and remove
    if (d.y >= GROUND_Y) {
      dojoDodgeCount++;
      spawnParticles(d.x, GROUND_Y, '#44aaff', 4, 2);
      dojoWaterDrops.splice(i, 1);
      continue;
    }
    // Collision with player
    if (dojoStunTimer <= 0 &&
        d.x > player.x && d.x < player.x + player.w &&
        d.y > player.y && d.y < player.y + player.h) {
      dojoStun();
      spawnParticles(d.x, d.y, '#44aaff', 6, 3);
      dojoWaterDrops.splice(i, 1);
    }
  }
}

function drawDojo() {
  const P = 4;

  // ── Dojo background — warm wooden interior ──
  // Dark wood wall
  const wallGrad = ctx.createLinearGradient(0, 0, 0, H);
  wallGrad.addColorStop(0, '#1a0e06');
  wallGrad.addColorStop(0.3, '#2a1a0e');
  wallGrad.addColorStop(1, '#1f1208');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, H);

  // Horizontal wood planks on wall
  for (let y = 0; y < GROUND_Y; y += P * 8) {
    // Plank body
    const shade = 30 + ((y * 7) % 20);
    ctx.fillStyle = `rgb(${shade + 15}, ${shade + 5}, ${shade - 10})`;
    ctx.fillRect(0, y, W, P * 7);
    // Plank gap (dark line)
    ctx.fillStyle = '#0e0804';
    ctx.fillRect(0, y + P * 7, W, P);
    // Wood grain highlights
    for (let x = 0; x < W; x += P * 3) {
      const grainAlpha = (Math.sin(x * 0.02 + y * 0.1) * 0.5 + 0.5) * 0.08;
      ctx.fillStyle = `rgba(180, 140, 90, ${grainAlpha})`;
      ctx.fillRect(x, y + P, P, P * 2);
    }
  }

  // ── Decorative elements ──
  // Large circle (enso) on back wall
  ctx.save();
  ctx.strokeStyle = 'rgba(180, 150, 100, 0.12)';
  ctx.lineWidth = P * 2;
  ctx.beginPath();
  ctx.arc(W / 2, GROUND_Y * 0.45, 80, -0.3, Math.PI * 1.8);
  ctx.stroke();
  ctx.restore();

  // Japanese-style vertical banners on left and right walls
  const bannerW = P * 6;
  const bannerH = P * 25;
  // Left banner
  ctx.fillStyle = '#8b1a1a';
  ctx.fillRect(P * 8, GROUND_Y * 0.15, bannerW, bannerH);
  ctx.fillStyle = '#cc9944';
  ctx.fillRect(P * 8, GROUND_Y * 0.15, bannerW, P);
  ctx.fillRect(P * 8, GROUND_Y * 0.15 + bannerH - P, bannerW, P);
  // Kanji-like marks
  ctx.fillStyle = '#ffddaa';
  ctx.fillRect(P * 10, GROUND_Y * 0.15 + P * 4, P * 2, P * 6);
  ctx.fillRect(P * 9, GROUND_Y * 0.15 + P * 6, P * 4, P * 2);
  ctx.fillRect(P * 10, GROUND_Y * 0.15 + P * 12, P * 2, P * 6);
  ctx.fillRect(P * 9, GROUND_Y * 0.15 + P * 16, P, P * 3);
  ctx.fillRect(P * 12, GROUND_Y * 0.15 + P * 14, P, P * 3);

  // Right banner
  ctx.fillStyle = '#1a3366';
  ctx.fillRect(W - P * 14, GROUND_Y * 0.15, bannerW, bannerH);
  ctx.fillStyle = '#cc9944';
  ctx.fillRect(W - P * 14, GROUND_Y * 0.15, bannerW, P);
  ctx.fillRect(W - P * 14, GROUND_Y * 0.15 + bannerH - P, bannerW, P);
  // Kanji-like marks
  ctx.fillStyle = '#aaddff';
  ctx.fillRect(W - P * 12, GROUND_Y * 0.15 + P * 4, P * 2, P * 8);
  ctx.fillRect(W - P * 13, GROUND_Y * 0.15 + P * 7, P * 4, P * 2);
  ctx.fillRect(W - P * 12, GROUND_Y * 0.15 + P * 14, P * 2, P * 5);

  // ── Wooden floor (different from wall) ──
  for (let y = GROUND_Y; y < H; y += P * 3) {
    const fShade = 45 + ((y * 3) % 15);
    ctx.fillStyle = `rgb(${fShade + 20}, ${fShade + 8}, ${fShade - 5})`;
    ctx.fillRect(0, y, W, P * 2);
    ctx.fillStyle = '#1a0e06';
    ctx.fillRect(0, y + P * 2, W, P);
    // Floor plank vertical joints
    for (let x = 0; x < W; x += P * 20 + ((y * 7) % (P * 10))) {
      ctx.fillStyle = '#1a0e06';
      ctx.fillRect(x, y, P, P * 3);
    }
  }

  // ── Floor line (ground level) ──
  ctx.fillStyle = '#3a2518';
  ctx.fillRect(0, GROUND_Y - P, W, P);
  ctx.fillStyle = '#554030';
  ctx.fillRect(0, GROUND_Y, W, P);

  // ── Training dummies (pixel art) ──
  const dummyPositions = [W * 0.2, W * 0.8];
  dummyPositions.forEach(dx => {
    // Post
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(dx - P, GROUND_Y - P * 14, P * 2, P * 14);
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(dx - P, GROUND_Y - P * 14, P, P * 14);
    // Cross arm
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(dx - P * 4, GROUND_Y - P * 10, P * 8, P * 2);
    // Head circle
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(dx - P * 2, GROUND_Y - P * 18, P * 4, P * 4);
    ctx.fillStyle = '#7a5a3a';
    ctx.fillRect(dx - P, GROUND_Y - P * 17, P * 2, P * 2);
    // Base
    ctx.fillStyle = '#4a2a15';
    ctx.fillRect(dx - P * 3, GROUND_Y - P * 2, P * 6, P * 2);
  });

  // ── Streetlight height reference post (center of dojo) ──
  const lampRefX = W / 2;
  const lampPoleH = 135; // same as real street lamps
  const lampTopY = GROUND_Y - lampPoleH;
  // Pole
  ctx.fillStyle = '#333340';
  ctx.fillRect(lampRefX - P, lampTopY + 8, P, lampPoleH);
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(lampRefX, lampTopY + 8, P, lampPoleH);
  // Highlight at top
  ctx.fillStyle = '#5a5a6a';
  ctx.fillRect(lampRefX - P, lampTopY + 8, P * 2, P);
  // Base plate
  ctx.fillStyle = '#3a3a48';
  ctx.fillRect(lampRefX - P * 2, GROUND_Y - P * 2, P * 4, P * 2);
  ctx.fillStyle = '#4a4a58';
  ctx.fillRect(lampRefX - P * 2, GROUND_Y - P * 2, P * 4, P);
  // Lamp arm extending left/right
  const armY = lampTopY;
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(lampRefX - P * 4, armY, P * 8, P);
  ctx.fillStyle = '#3a3a48';
  ctx.fillRect(lampRefX - P * 4, armY + P, P * 8, P);
  // Lamp heads on each end
  ctx.fillStyle = '#ffcc44';
  ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.06) * 0.3;
  ctx.fillRect(lampRefX - P * 4, armY - P * 2, P * 2, P * 2);
  ctx.fillRect(lampRefX + P * 2, armY - P * 2, P * 2, P * 2);
  // Ground glow
  ctx.globalAlpha = 0.06 + Math.sin(frameCount * 0.06) * 0.03;
  const dojoGlow = ctx.createRadialGradient(lampRefX, GROUND_Y, 2, lampRefX, GROUND_Y, 50);
  dojoGlow.addColorStop(0, '#ffcc44');
  dojoGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = dojoGlow;
  ctx.fillRect(lampRefX - 50, GROUND_Y - 20, 100, 40);
  ctx.globalAlpha = 1;
  // Height label
  ctx.fillStyle = 'rgba(255, 204, 136, 0.4)';
  ctx.font = `12px ${GAME_FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('LAMP HEIGHT', lampRefX, lampTopY - 6);
  ctx.textAlign = 'left';

  // ── Ambient particles (dust motes floating) ──
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 12; i++) {
    const mx = (i * 73 + frameCount * 0.3) % W;
    const my = (i * 47 + Math.sin(frameCount * 0.01 + i) * 30) % (GROUND_Y - 20);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(Math.floor(mx / P) * P, Math.floor(my / P) * P, P, P);
  }
  ctx.globalAlpha = 1;

  // ── Draw birds ──
  for (let i = 0; i < dojoBirds.length; i++) {
    const b = dojoBirds[i];
    const bx = Math.floor(b.x);
    const by = Math.floor(b.y);
    const wingUp = b.frame < 2;
    // Body
    ctx.fillStyle = '#334455';
    ctx.fillRect(bx, by + P, P * 5, P * 2);
    // Head
    ctx.fillStyle = '#445566';
    ctx.fillRect(bx, by + P, P * 2, P * 2);
    // Eye
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(bx + P, by + P, P, P);
    // Beak
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(bx - P, by + P * 2, P, P);
    // Wings
    ctx.fillStyle = '#556677';
    if (wingUp) {
      ctx.fillRect(bx + P, by - P, P * 3, P);
      ctx.fillRect(bx + P * 2, by - P * 2, P * 2, P);
    } else {
      ctx.fillRect(bx + P, by + P * 3, P * 3, P);
      ctx.fillRect(bx + P * 2, by + P * 4, P * 2, P);
    }
    // Tail
    ctx.fillStyle = '#445566';
    ctx.fillRect(bx + P * 5, by, P * 2, P);
    ctx.fillRect(bx + P * 5, by + P, P, P);
  }

  // ── Draw water drop floor warnings + drops ──
  for (let i = 0; i < dojoWaterDrops.length; i++) {
    const d = dojoWaterDrops[i];
    if (d.warn > 0) {
      // Floor warning — style depends on trial mode
      if (dojoTrialOn) {
        // Trial: quick white flash, only visible in last 12 frames of warning
        if (d.warn <= 12) {
          const flash = d.warn <= 6 ? (d.warn / 6) : (1 - (d.warn - 6) / 6);
          ctx.globalAlpha = flash * 0.8;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(d.x - 6, GROUND_Y - P * 2, 12, P);
          ctx.globalAlpha = flash * 0.2;
          ctx.fillRect(d.x - 14, GROUND_Y - P * 3, 28, P * 3);
          ctx.globalAlpha = 1;
        }
      } else {
        // Practice: slow pulsing blue indicator
        const pulse = Math.sin(d.warn * 0.4) * 0.3 + 0.5;
        const warnRadius = 10 + (40 - d.warn) * 0.3;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#44aaff';
        ctx.fillRect(d.x - warnRadius, GROUND_Y - P * 2, warnRadius * 2, P);
        ctx.fillRect(d.x - warnRadius * 0.6, GROUND_Y - P * 3, warnRadius * 1.2, P);
        ctx.globalAlpha = pulse * 0.15;
        ctx.fillRect(d.x - warnRadius * 1.5, GROUND_Y - P * 4, warnRadius * 3, P * 4);
        ctx.globalAlpha = 1;
      }
      continue; // don't draw the drop yet
    }
    const s = d.size;
    // Teardrop shape
    ctx.fillStyle = '#66bbee';
    ctx.fillRect(d.x - s * 0.3, d.y, s * 0.6, s);
    ctx.fillStyle = '#88ddff';
    ctx.fillRect(d.x - s * 0.15, d.y + s * 0.2, s * 0.3, s * 0.4);
    // Highlight
    ctx.fillStyle = '#aaeeff';
    ctx.fillRect(d.x - s * 0.1, d.y + s * 0.1, s * 0.15, s * 0.25);
  }

  // ── Draw stun stars ──
  if (dojoStunTimer > 0) {
    for (let s = 0; s < 3; s++) {
      const angle = frameCount * 0.15 + s * (Math.PI * 2 / 3);
      const sx = player.x + player.w / 2 + Math.cos(angle) * 16;
      const sy = player.y - 6 + Math.sin(angle) * 6;
      ctx.fillStyle = '#ffff44';
      ctx.fillRect(sx - 2, sy - 2, P, P);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(sx - 1, sy - 1, 2, 2);
    }
  }

  // ── Draw player ──
  // Flash player during stun
  if (dojoStunTimer > 0 && Math.floor(frameCount / 3) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  drawPlayer();
  ctx.globalAlpha = 1;

  // ── Draw particles ──
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── HUD overlay ──
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, 35);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc88';
  ctx.font = `bold 9px ${GAME_FONT}`;
  if (dojoTrialOn) {
    ctx.fillText('GGD DOJO — TRIAL', W / 2, 23);
  } else {
    ctx.fillText('GGD DOJO — PRACTICE MODE', W / 2, 23);
  }

  // Trial mode — timer bar + score
  if (dojoTrialOn) {
    // Progress bar
    const barW = W - 30;
    const barH = 5;
    const barX = 15;
    const barY = 8;
    const progress = dojoTrialTimer / dojoTrialDuration;
    ctx.fillStyle = '#333344';
    ctx.fillRect(barX, barY, barW, barH);
    // Color ramps from green to yellow to red
    const r = Math.min(255, Math.floor(progress * 2 * 255));
    const g = Math.min(255, Math.floor((1 - progress) * 2 * 255));
    ctx.fillStyle = `rgb(${r},${g},60)`;
    ctx.fillRect(barX, barY, barW * progress, barH);

    // Left: score
    ctx.textAlign = 'left';
    ctx.font = `bold 12px ${GAME_FONT}`;
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('SCORE: ' + dojoTrialScore, 15, 30);

    // Right: dodge/hit
    ctx.textAlign = 'right';
    ctx.font = `bold 11px ${GAME_FONT}`;
    ctx.fillStyle = '#88ff88';
    ctx.fillText('DODGE: ' + dojoDodgeCount, W - 15, 23);
    ctx.fillStyle = '#ff6666';
    ctx.fillText('HIT: ' + dojoHitCount, W - 15, 33);
  } else if (!dojoTrialOn && dojoTrialScore > 0) {
    // Show final score after trial ends
    ctx.textAlign = 'left';
    ctx.font = `bold 12px ${GAME_FONT}`;
    ctx.fillStyle = '#ffcc00';
    const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('FINAL: ' + dojoTrialScore + '  DODGE: ' + dojoDodgeCount + '  HIT: ' + dojoHitCount, 15, 13);
    ctx.globalAlpha = 1;
  } else {
    // Toggle indicators (non-trial)
    ctx.font = `10px ${GAME_FONT}`;
    if (dojoBirdsOn) {
      ctx.fillStyle = '#88ff88';
      ctx.fillText('BIRDS: ON', W / 2 - 60, 13);
    }
    if (dojoWaterOn) {
      ctx.fillStyle = '#88ddff';
      ctx.fillText('WATER: ON', W / 2 + 60, 13);
    }

    // Dodge / Hit score counter (shown when birds or water active)
    if (dojoBirdsOn || dojoWaterOn) {
      ctx.textAlign = 'right';
      ctx.font = `bold 12px ${GAME_FONT}`;
      ctx.fillStyle = '#88ff88';
      ctx.fillText('DODGE: ' + dojoDodgeCount, W - 15, 15);
      ctx.fillStyle = '#ff6666';
      ctx.fillText('HIT: ' + dojoHitCount, W - 15, 30);
    }
  }

  ctx.textAlign = 'left';
  ctx.fillStyle = '#887766';
  ctx.font = `11px ${GAME_FONT}`;
  ctx.fillText('A/D: Move  ·  Space: Jump  ·  N: Music  ·  I: Birds  ·  O: Water  ·  T: Trial  ·  ESC: Exit', 15, H - 12);
}
