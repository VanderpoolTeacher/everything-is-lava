const CLIFF_TRANSITION_PROGRESS = 0.30; // vertical mode fully starts here

let cliffWorldX = 0; // world X where the cliff face starts (set when transition begins)
const CLIMB_GROUND_Y = 60; // ground is 60px from bottom of screen in vertical mode

function getGroundY(worldX) {
  if (!isVolcanoLevel()) return GROUND_Y;
  if (level === 6 && verticalMode) return climbScreenY(0); // solid ground at bottom, scrolls with camera
  const progress = Math.min(1, levelTimer / levelDuration);
  let slope;
  if (level === 6) {
    if (cliffTransition > 0) {
      // Flat zero plane once cliff transition begins
      slope = 0;
    } else {
      // Level 2-3: slope ramps up then eases to 0 before transition
      const horizProgress = Math.min(1, progress / VERTICAL_TRANSITION_PROGRESS);
      const baseSlope = 0.45 + horizProgress * 0.15; // 45% → 60%
      // Ease slope to 0 in the last 30% of the horizontal phase
      const flattenStart = 0.7;
      if (horizProgress > flattenStart) {
        const flattenT = (horizProgress - flattenStart) / (1 - flattenStart);
        slope = baseSlope * (1 - flattenT * flattenT); // smooth ease to 0
      } else {
        slope = baseSlope;
      }
    }
  } else if (level === 5) {
    // Level 2-2: steep slope, 15% → 45%
    slope = 0.15 + progress * 0.30;
  } else {
    // Level 2-1: gentle slope, 5% → 15%
    slope = 0.05 + progress * 0.10;
  }
  const screenX = worldX - scrollOffset;
  const playerScreenX = 150;
  const rise = (screenX - playerScreenX) * slope;
  return GROUND_Y - rise;
}

// ── MASTER VOLUME ──

function applyMasterVolume() {

  gameOverMusic.volume = 0.6 * v;

// applyMasterVolume() called after audio elements are created below

// ── MUSIC ──
const levelMusic = new Audio('assets/music/neo-tokyo-level-1.mp3');

// ── SOUND EFFECTS (Web Audio API) ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Cached noise buffers — created once, reused forever
let _splashBuf = null, _slopBuf = null, _crunchBuf = null, _crackBuf = null, _deathNoiseBuf = null;
function getSplashBuf(ac) {
  if (_splashBuf) return _splashBuf;
  const bufSize = Math.floor(ac.sampleRate * 0.35);
  _splashBuf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = _splashBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / bufSize;
    const env = (1 - t) * (1 - t);
    data[i] = ((Math.random() * 2 - 1) * 0.7 + Math.sin(i * 0.02) * 0.3) * env;
  }
  return _splashBuf;
}
function getSlopBuf(ac) {
  if (_slopBuf) return _slopBuf;
  const slopLen = Math.floor(ac.sampleRate * 0.12);
  _slopBuf = ac.createBuffer(1, slopLen, ac.sampleRate);
  const data = _slopBuf.getChannelData(0);
  for (let i = 0; i < slopLen; i++) {
    const env = Math.pow(1 - i / slopLen, 1.5);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  return _slopBuf;
}
function getCrunchBuf(ac) {
  if (_crunchBuf) return _crunchBuf;
  const len = Math.floor(ac.sampleRate * 0.25);
  _crunchBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _crunchBuf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const env = Math.pow(1 - i / len, 2);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  return _crunchBuf;
}
function getCrackBuf(ac) {
  if (_crackBuf) return _crackBuf;
  const len = Math.floor(ac.sampleRate * 0.15);
  _crackBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _crackBuf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const env = Math.pow(1 - i / len, 3);
    data[i] = (Math.random() > 0.5 ? 1 : -1) * env * (Math.random() > 0.7 ? 1 : 0.2);
  }
  return _crackBuf;
}
function getDeathNoiseBuf(ac) {
  if (_deathNoiseBuf) return _deathNoiseBuf;
  const len = Math.floor(ac.sampleRate * 0.8);
  _deathNoiseBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _deathNoiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1);
  return _deathNoiseBuf;
}

// Auto-cleanup helper: disconnects all nodes when source ends
function autoCleanup(srcNode, allNodes) {
  srcNode.onended = () => {
    for (let i = 0; i < allNodes.length; i++) {
      try { allNodes[i].disconnect(); } catch(e) {}
    }
  };
}

// Fire/ambulance siren — slow warble between two tones
let sirenOsc = null;
let sirenGain = null;
function startSiren() {
  if (sirenOsc) return;
  const ac = getAudioCtx();
  sirenOsc = ac.createOscillator();
  sirenGain = ac.createGain();
  sirenOsc.type = 'sawtooth';
  sirenOsc.frequency.value = 600;
  sirenGain.gain.value = 0;
  sirenOsc.connect(sirenGain);
  sirenGain.connect(ac.destination);
  sirenOsc.start();
}
function updateSiren(volume, time) {
  if (!sirenOsc) return;
  const t = time || performance.now() / 1000;
  sirenOsc.frequency.value = 750 + Math.sin(t * 8) * 150;
  sirenGain.gain.value = Math.min(0.17, volume) * (muted ? 0 : masterVolume);
}
function stopSiren() {
  if (sirenOsc) {
    sirenOsc.stop();
    sirenOsc.disconnect();
    sirenOsc = null;
    sirenGain = null;
  }
}

// Police siren — fast hi-lo "woop woop"
let policeOsc1 = null, policeOsc2 = null;
let policeGain = null;
function startPoliceSiren() {
  if (policeOsc1) return;
  try {
    const ac = getAudioCtx();
    policeGain = ac.createGain();
    policeGain.gain.value = 0;
    policeGain.connect(ac.destination);

    // Primary tone — fast switching between hi and lo
    policeOsc1 = ac.createOscillator();
    policeOsc1.type = 'square';
    policeOsc1.frequency.value = 800;
    const pf1 = ac.createBiquadFilter();
    pf1.type = 'bandpass'; pf1.frequency.value = 1000; pf1.Q.value = 3;
    policeOsc1.connect(pf1);
    pf1.connect(policeGain);
    policeOsc1.start();

    // Second tone — slight detune for thickness
    policeOsc2 = ac.createOscillator();
    policeOsc2.type = 'square';
    policeOsc2.frequency.value = 810;
    const pf2 = ac.createBiquadFilter();
    pf2.type = 'bandpass'; pf2.frequency.value = 1050; pf2.Q.value = 2;
    policeOsc2.connect(pf2);
    pf2.connect(policeGain);
    policeOsc2.start();
  } catch(e) {}
}
function updatePoliceSiren(volume) {
  if (!policeOsc1) return;
  const t = performance.now() / 1000;
  // Fast hi-lo toggle (~3Hz) — 660Hz to 960Hz
  const hiLo = Math.sin(t * 18) > 0 ? 960 : 660;
  policeOsc1.frequency.value = hiLo;
  policeOsc2.frequency.value = hiLo + 12;
  policeGain.gain.value = Math.min(0.14, volume) * (muted ? 0 : masterVolume);
}
function stopPoliceSiren() {
  if (policeOsc1) { policeOsc1.stop(); policeOsc1.disconnect(); policeOsc1 = null; }
  if (policeOsc2) { policeOsc2.stop(); policeOsc2.disconnect(); policeOsc2 = null; }
  if (policeGain) { policeGain.disconnect(); policeGain = null; }
}

// School bus screaming kids — voiced yells (high and low) chopped into bursts
let busScreamNodes = null;
function startBusScream() {
  if (busScreamNodes) return;
  try {
    const ac = getAudioCtx();
    const masterGain = ac.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(ac.destination);

    // Noise buffer for breath texture
    const nBuf = ac.createBuffer(1, ac.sampleRate * 2, ac.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1);

    // HIGH YELL — child voice, triangle wave (softer than sawtooth)
    // Amplitude-modulated to chop into stuttered yelling bursts
    const hiOsc = ac.createOscillator();
    hiOsc.type = 'triangle';
    hiOsc.frequency.value = 620;
    const hiGain = ac.createGain(); hiGain.gain.value = 0;
    const hiAM = ac.createOscillator();
    hiAM.type = 'square';
    hiAM.frequency.value = 6;
    const hiAMGain = ac.createGain(); hiAMGain.gain.value = 0.4;
    const hiBP = ac.createBiquadFilter();
    hiBP.type = 'bandpass'; hiBP.frequency.value = 1800; hiBP.Q.value = 1.5;
    hiOsc.connect(hiGain); hiGain.connect(hiBP); hiBP.connect(masterGain);
    hiAM.connect(hiAMGain); hiAMGain.connect(hiGain.gain);
    hiOsc.start(); hiAM.start();

    // LOW YELL — deeper voice
    const loOsc = ac.createOscillator();
    loOsc.type = 'triangle';
    loOsc.frequency.value = 340;
    const loGain = ac.createGain(); loGain.gain.value = 0;
    const loAM = ac.createOscillator();
    loAM.type = 'square';
    loAM.frequency.value = 4.5;
    const loAMGain = ac.createGain(); loAMGain.gain.value = 0.35;
    const loBP = ac.createBiquadFilter();
    loBP.type = 'bandpass'; loBP.frequency.value = 900; loBP.Q.value = 1.2;
    loOsc.connect(loGain); loGain.connect(loBP); loBP.connect(masterGain);
    loAM.connect(loAMGain); loAMGain.connect(loGain.gain);
    loOsc.start(); loAM.start();

    // MID SHRIEK — panicked yelp
    const midOsc = ac.createOscillator();
    midOsc.type = 'triangle';
    midOsc.frequency.value = 480;
    const midGain = ac.createGain(); midGain.gain.value = 0;
    const midAM = ac.createOscillator();
    midAM.type = 'square';
    midAM.frequency.value = 7;
    const midAMGain = ac.createGain(); midAMGain.gain.value = 0.45;
    const midBP = ac.createBiquadFilter();
    midBP.type = 'bandpass'; midBP.frequency.value = 1400; midBP.Q.value = 1.3;
    midOsc.connect(midGain); midGain.connect(midBP); midBP.connect(masterGain);
    midAM.connect(midAMGain); midAMGain.connect(midGain.gain);
    midOsc.start(); midAM.start();

    // BREATH NOISE — adds realism between yells
    const noiseSrc = ac.createBufferSource();
    noiseSrc.buffer = nBuf; noiseSrc.loop = true;
    const noiseGain = ac.createGain(); noiseGain.gain.value = 0;
    const noiseBP = ac.createBiquadFilter();
    noiseBP.type = 'bandpass'; noiseBP.frequency.value = 2200; noiseBP.Q.value = 0.8;
    noiseSrc.connect(noiseBP); noiseBP.connect(noiseGain); noiseGain.connect(masterGain);
    noiseSrc.start();

    busScreamNodes = {
      masterGain,
      hi: { osc: hiOsc, gain: hiGain, am: hiAM, amGain: hiAMGain, bp: hiBP },
      lo: { osc: loOsc, gain: loGain, am: loAM, amGain: loAMGain, bp: loBP },
      mid: { osc: midOsc, gain: midGain, am: midAM, amGain: midAMGain, bp: midBP },
      noise: { src: noiseSrc, gain: noiseGain, bp: noiseBP }
    };
  } catch(e) {}
}
function updateBusScream(volume) {
  if (!busScreamNodes) return;
  const t = performance.now();
  const n = busScreamNodes;
  n.masterGain.gain.value = Math.min(0.35, volume * 0.65) * (muted ? 0 : masterVolume);

  // High yell — pitch jumps erratically like a kid screaming
  const hiPitch = 620 + Math.sin(t / 120) * 80 + (Math.sin(t / 31) > 0.5 ? 150 : 0);
  n.hi.osc.frequency.value = hiPitch;
  n.hi.am.frequency.value = 5 + Math.sin(t / 200) * 3;
  n.hi.gain.gain.value = 0.5 + (Math.sin(t / 180) > 0 ? 0.3 : 0);

  // Low yell — slower, deeper, groaning panic
  const loPitch = 340 + Math.sin(t / 170) * 60 + (Math.sin(t / 47) > 0.3 ? -80 : 40);
  n.lo.osc.frequency.value = loPitch;
  n.lo.am.frequency.value = 3.5 + Math.sin(t / 300) * 2;
  n.lo.gain.gain.value = 0.45 + (Math.sin(t / 230) > 0 ? 0.25 : 0);

  // Mid shriek — fills in gaps
  const midPitch = 480 + Math.sin(t / 90) * 100 + (Math.sin(t / 61) > 0.6 ? 120 : 0);
  n.mid.osc.frequency.value = midPitch;
  n.mid.am.frequency.value = 6 + Math.sin(t / 150) * 2.5;
  n.mid.gain.gain.value = 0.35 + (Math.sin(t / 140) > 0.2 ? 0.3 : 0);

  // Breath noise — rises when voices yell
  n.noise.gain.gain.value = 0.15 + Math.max(0, Math.sin(t / 100)) * 0.15;
  n.noise.bp.frequency.value = 2200 + Math.sin(t / 70) * 600;
}
function stopBusScream() {
  if (!busScreamNodes) return;
  const n = busScreamNodes;
  [n.hi, n.lo, n.mid].forEach(v => {
    try { v.osc.stop(); v.osc.disconnect(); } catch(e) {}
    try { v.am.stop(); v.am.disconnect(); } catch(e) {}
  });
  try { n.noise.src.stop(); n.noise.src.disconnect(); } catch(e) {}
  n.masterGain.disconnect();
  busScreamNodes = null;
}

function playLavaSplash() {
  try {
    const ac = getAudioCtx();

// Death scream — descending "arghh" with wavering pitch
function playDeathSound() {

    voice.type = 'sawtooth';

    vibrato.start(now);
    vibrato.stop(now + 1.0);
    // Formants
    const formant = ac.createBiquadFilter();
    formant.type = 'bandpass';
    formant.frequency.setValueAtTime(800, now);
    formant.frequency.linearRampToValueAtTime(400, now + 0.8);
    formant.Q.value = 2;
    const formant2 = ac.createBiquadFilter();
    formant2.type = 'bandpass';
    formant2.frequency.setValueAtTime(1200, now);
    formant2.frequency.linearRampToValueAtTime(600, now + 0.8);
    formant2.Q.value = 1.5;
    // Envelope
    const env = ac.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.15, now + 0.05);
    env.gain.setValueAtTime(0.15, now + 0.3);
    env.gain.linearRampToValueAtTime(0.08, now + 0.6);
    env.gain.linearRampToValueAtTime(0, now + 1.0);
    // Noise layer for breathiness (cached buffer)
    const noise = ac.createBufferSource();
    noise.buffer = getDeathNoiseBuf(ac);
    const noiseGain = ac.createGain();
    noiseGain.gain.setValueAtTime(0.04, now);
    noiseGain.gain.linearRampToValueAtTime(0, now + 0.8);
    const noiseFilter = ac.createBiquadFilter();
    noiseFilter.type = 'bandpass';

    noiseFilter.Q.value = 0.8;
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ac.destination);
    noise.start(now);
    // Connect voice chain
    voice.connect(formant);
    voice.connect(formant2);
    formant.connect(env);
    formant2.connect(env);
    env.connect(ac.destination);
    // Auto-cleanup when voice ends (longest sound)
    autoCleanup(voice, [voice, vibrato, vibratoGain, formant, formant2, env, noise, noiseGain, noiseFilter]);
    voice.start(now);
    voice.stop(now + 1.0);
  } catch(e) {}
}

// Molten rock sizzle — crackling lava hiss (one-shot, call periodically)
let _sizzleBuf = null;
function getSizzleBuf(ac) {
  if (_sizzleBuf) return _sizzleBuf;
  const len = Math.floor(ac.sampleRate * 0.5);
  _sizzleBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _sizzleBuf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const t = i / len;
    const env = Math.sin(t * Math.PI); // fade in and out
    // Crackling: random pops mixed with hiss
    const pop = Math.random() > 0.92 ? (Math.random() * 2 - 1) * 3 : 0;
    data[i] = ((Math.random() * 2 - 1) * 0.3 + pop) * env;
  }
  return _sizzleBuf;
}
function playMoltenSizzle() {

// Cough sound — loud percussive hack
function playCough() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const vol = (muted ? 0 : masterVolume) * 0.8;

    // 1. Sharp percussive "hack" onset — short noise pop
    const popLen = Math.floor(ac.sampleRate * 0.06);
    const popBuf = ac.createBuffer(1, popLen, ac.sampleRate);
    const pd = popBuf.getChannelData(0);
    for (let i = 0; i < popLen; i++) {
      const t = i / popLen;
      const env = t < 0.1 ? t / 0.1 : Math.pow(1 - (t - 0.1) / 0.9, 2);
      pd[i] = (Math.random() * 2 - 1) * env;
    }
    const popSrc = ac.createBufferSource();
    popSrc.buffer = popBuf;
    const popGain = ac.createGain();
    popGain.gain.setValueAtTime(vol * 1.2, now);
    popGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    popSrc.connect(popGain);
    popGain.connect(ac.destination);
    autoCleanup(popSrc, [popSrc, popGain]);
    popSrc.start(now);

    // 2. Breathy raspy exhale — longer noise with wide filter
    const len = Math.floor(ac.sampleRate * 0.35);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      const env = t < 0.05 ? t / 0.05 : Math.pow(1 - (t - 0.05) / 0.95, 1.5);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 800;
    filt.Q.value = 0.8; // wide Q — lets more sound through
    const gain = ac.createGain();
    gain.gain.setValueAtTime(vol, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    src.connect(filt);
    filt.connect(gain);
    gain.connect(ac.destination);
    autoCleanup(src, [src, filt, gain]);
    src.start(now + 0.02);

    // 3. Chest thump — low sine for body resonance
    const chest = ac.createOscillator();
    chest.type = 'sine';
    chest.frequency.setValueAtTime(150, now);
    chest.frequency.exponentialRampToValueAtTime(60, now + 0.15);
    const chestGain = ac.createGain();
    chestGain.gain.setValueAtTime(vol * 0.6, now);
    chestGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    chest.connect(chestGain);
    chestGain.connect(ac.destination);
    autoCleanup(chest, [chest, chestGain]);
    chest.start(now);
    chest.stop(now + 0.2);
  } catch(e) {}
}

let _fireBuf = null;
function getFireBuf(ac) {
  if (_fireBuf) return _fireBuf;
  const len = Math.floor(ac.sampleRate * 0.6);

  const data = _fireBuf.getChannelData(0);
  for (let i = 0; i < len; i++) {

    screech2.connect(filt2);

    autoCleanup(screech1, [screech1, screech2, vib, vibGain, filt, filt2, gain1, gain2]);

// ── LAVA CRACKS & POOLS (Level 2-2 ground hazards) ──
let lavaPits = []; // array of crack objects

function generateLavaPits() {
  lavaPits = [];
  const levelLen = 10000;
  let wx = 500 + Math.random() * 300;
  while (wx < levelLen) {
    const progress = wx / levelLen;
    // Mix of narrow cracks (visual) and wide cracks with lava pools (hurtbox)
    const isPool = Math.random() < 0.25 + progress * 0.15; // ~25-40% are pools
    const w = isPool
      ? 55 + Math.random() * 50   // pools: 55-105px
      : 20 + Math.random() * 35;  // cracks: 20-55px
    // Generate jagged crack segments (seeded offsets per column)
    const P = 4;
    const cols = Math.ceil(w / P);
    const segments = [];
    const seed = Math.round(wx * 13.7) & 0xFFFF;
    for (let c = 0; c < cols; c++) {
      const hash = ((c * 31 + seed) * 2654435761 >>> 16);
      const wiggleY = (hash % 5) - 2;           // -2 to +2 pixel offset
      const depth = isPool
        ? 2 + (hash >>> 4) % 3                  // pools: 2-4 deep
        : 1 + (hash >>> 4) % 2;                 // cracks: 1-2 deep
      segments.push({ wiggleY, depth });
    }
    lavaPits.push({
      worldX: wx,
      w: w,
      isPool: isPool,
      segments: segments,
      glowPhase: Math.random() * Math.PI * 2
    });
    const gap = 400 + Math.random() * 300 - progress * 150;
    wx += w + Math.max(180, gap);
  }
}

function drawLavaPits() {
  const P = 4;
  for (const pit of lavaPits) {
    const sx = pit.worldX - scrollOffset;
    if (sx + pit.w < -50 || sx > W + 50) continue;
    const gyMid = getGroundY(pit.worldX + pit.w / 2);
    const pulse = Math.sin(frameCount * 0.05 + pit.glowPhase) * 0.25 + 0.75;
    const cols = pit.segments.length;

    // Ambient glow halo above crack (stronger for pools)
    const glowStr = pit.isPool ? 0.15 : 0.06;
    ctx.fillStyle = `rgba(255, 50, 0, ${glowStr * pulse})`;
    ctx.beginPath();
    ctx.ellipse(sx + pit.w / 2, gyMid - 2, pit.w * 0.6, pit.isPool ? 14 : 8, 0, 0, Math.PI * 2);
    ctx.fill();

    for (let c = 0; c < cols; c++) {
      const seg = pit.segments[c];
      const colX = sx + c * P;
      // Follow ground slope per column
      const colGY = getGroundY(pit.worldX + c * P);
      const crackY = colGY + seg.wiggleY * P;

      // Dark crack edges (top and bottom rim)
      ctx.fillStyle = '#0d0400';
      ctx.fillRect(colX, crackY - P, P, P);
      ctx.fillRect(colX, crackY + seg.depth * P, P, P);

      // Lava inside the crack
      for (let row = 0; row < seg.depth; row++) {
        const hash = ((c * 7 + row * 11 + Math.floor(frameCount * 0.07 + pit.glowPhase)) & 0xFF);
        const rowPulse = pulse * (0.85 + Math.sin(frameCount * 0.06 + c * 0.5) * 0.15);
        let color;
        if (pit.isPool && row >= 1) {
          // Pool interior — brighter, more yellow
          if (hash % 4 === 0) color = `rgba(255, 240, 80, ${rowPulse})`;
          else if (hash % 3 === 0) color = `rgba(255, 180, 20, ${rowPulse})`;
          else color = `rgba(255, 120, 0, ${rowPulse * 0.95})`;
        } else {
          // Crack interior — deeper oranges/reds
          if (hash % 5 === 0) color = `rgba(255, 200, 60, ${rowPulse * 0.9})`;
          else if (hash % 3 === 0) color = `rgba(255, 100, 0, ${rowPulse * 0.85})`;
          else color = `rgba(200, 50, 0, ${rowPulse * 0.7})`;
        }
        ctx.fillStyle = color;
        ctx.fillRect(colX, crackY + row * P, P, P);
      }
    }

    // Bubbling bright spots for pools
    if (pit.isPool) {
      for (let b = 0; b < 4; b++) {
        const bSeed = (Math.floor(frameCount * 0.08) * 37 + b * 53 + Math.round(pit.glowPhase * 100)) & 0xFFF;
        const bc = bSeed % cols;
        const seg = pit.segments[bc];
        if (seg.depth < 2) continue;
        const bx = sx + bc * P;
        const bColGY = getGroundY(pit.worldX + bc * P);
        const by = bColGY + seg.wiggleY * P + P;
        const bright = ((bSeed >>> 4) % 3 === 0) ? '#ffee55' : '#ffaa00';
        ctx.fillStyle = bright;
        ctx.fillRect(bx, by, P, P);
      }
    }
  }
}

// ── LEVEL 2-3: VERTICAL CLIMB LEDGES & GAS CLOUDS ──

const CLIMB_TOTAL_HEIGHT = 4000; // total vertical distance to summit (shorter mountain)

function generateClimbLedges() {
  climbLedges = [];
  // Larger vertical gaps — require commitment + double jump
  const MIN_VERT_GAP = 115;
  const MAX_VERT_GAP = 145;
  // Center-to-center horizontal distance between consecutive ledges — much wider spread
  const MIN_HORIZ_STEP = 200; // must commit hard to horizontal movement
  const MAX_HORIZ_STEP = 300; // near-wall-to-wall reach

  let wy = -100; // first ledge above ground
  let lastLedgeX = W / 2 - 70;
  let lastLedgeW = 140;
  let lastCenter = lastLedgeX + lastLedgeW / 2;

  function getWalls(prog) {
    const taperStart = 0.8;
    const taperFrac = prog > taperStart ? (prog - taperStart) / (1 - taperStart) : 0;
    const taperAmount = taperFrac * taperFrac * 0.15;
    return {
      left: taperAmount * W * 0.5 + 30,
      right: W - taperAmount * W * 0.5 - 30
    };
  }

  // Probability-based alternation: after a ledge on one side, the NEXT ledge
  // has a 2x chance (2/3) of being on the OPPOSITE side, and a 1x chance (1/3)
  // of staying on the same side. First ledge is randomised so runs don't always
  // start on the same side.
  let currentSide = Math.random() < 0.5 ? 'left' : 'right';

  while (wy > -CLIMB_TOTAL_HEIGHT + 40) {
    const progress = Math.abs(wy) / CLIMB_TOTAL_HEIGHT;
    const walls = getWalls(progress);
    const midX = (walls.left + walls.right) / 2;

    // Smaller ledges — 18-30% of available width, min 70px
    const availableWidth = walls.right - walls.left;
    const ledgeW = Math.max(70, availableWidth * (0.18 + Math.random() * 0.12));

    // Bigger vertical gap — double jump territory
    const vertGap = MIN_VERT_GAP + Math.random() * (MAX_VERT_GAP - MIN_VERT_GAP);

    // Compute the valid center range for the new ledge:
    //   1. Must be on the opposite side of midX from the previous ledge
    //   2. Must be within [MIN_HORIZ_STEP, MAX_HORIZ_STEP] from lastCenter horizontally
    //   3. Must fit within the walls
    let centerMin, centerMax;
    if (currentSide === 'right') {
      // New ledge goes right of midline; its center is > lastCenter
      centerMin = Math.max(midX + 20 + ledgeW / 2, lastCenter + MIN_HORIZ_STEP);
      centerMax = Math.min(walls.right - ledgeW / 2, lastCenter + MAX_HORIZ_STEP);
    } else {
      // New ledge goes left of midline; its center is < lastCenter
      centerMin = Math.max(walls.left + ledgeW / 2, lastCenter - MAX_HORIZ_STEP);
      centerMax = Math.min(midX - 20 - ledgeW / 2, lastCenter - MIN_HORIZ_STEP);
    }

    // If the opposite-side range is empty (e.g. near the narrow summit), relax
    // the opposite-side constraint but still enforce the horizontal step
    if (centerMin > centerMax) {
      if (currentSide === 'right') {
        centerMin = Math.max(walls.left + ledgeW / 2, lastCenter + MIN_HORIZ_STEP);
        centerMax = Math.min(walls.right - ledgeW / 2, lastCenter + MAX_HORIZ_STEP);
      } else {
        centerMin = Math.max(walls.left + ledgeW / 2, lastCenter - MAX_HORIZ_STEP);
        centerMax = Math.min(walls.right - ledgeW / 2, lastCenter - MIN_HORIZ_STEP);
      }
    }
    // Last-resort fallback — place anywhere within walls
    if (centerMin > centerMax) {
      centerMin = walls.left + ledgeW / 2;
      centerMax = walls.right - ledgeW / 2;
      if (centerMin > centerMax) centerMin = centerMax = midX;
    }

    // Bias toward the outer edge of the range so consecutive ledges feel far apart
    // For the right side, bias toward centerMax; for the left side, bias toward centerMin
    const bias = 1 - Math.random() * Math.random(); // biased toward 1 (outer)
    const ledgeCenter = currentSide === 'right'
      ? centerMin + bias * (centerMax - centerMin)
      : centerMax - bias * (centerMax - centerMin);
    let ledgeX = ledgeCenter - ledgeW / 2;
    ledgeX = Math.max(walls.left, Math.min(walls.right - ledgeW, ledgeX));

    climbLedges.push({
      worldX: ledgeX,
      worldY: wy,
      w: ledgeW,
      h: 16,
      seed: Math.random() * 10000 | 0
    });

    // ── TINY FILLER PLATFORM on the opposite (empty) side ──
    // Gives the climb some visual texture + optional tiny footholds
    // Skip occasionally for variety
    if (Math.random() < 0.75) {
      const tinyW = 30 + Math.random() * 20; // 30-50px wide
      const tinyYOffset = vertGap * (0.35 + Math.random() * 0.3); // between main ledges vertically
      const tinyWy = wy - tinyYOffset;
      // Place on the opposite side — where the NEXT main ledge will NOT be
      // currentSide is this ledge's side; the next one flips, so the "empty" band
      // near this ledge is the opposite side
      const oppositeSide = currentSide === 'left' ? 'right' : 'left';
      let tinyX;
      if (oppositeSide === 'left') {
        // Push toward the left wall
        const tinyMin = walls.left + 4;
        const tinyMax = Math.min(midX - 40 - tinyW, walls.right - tinyW);
        tinyX = tinyMax > tinyMin
          ? tinyMin + Math.random() * Math.random() * (tinyMax - tinyMin)
          : tinyMin;
      } else {
        const tinyMin = Math.max(midX + 40, walls.left);
        const tinyMax = walls.right - tinyW - 4;
        tinyX = tinyMax > tinyMin
          ? tinyMin + (1 - Math.random() * Math.random()) * (tinyMax - tinyMin)
          : Math.max(walls.left, tinyMax);
      }
      tinyX = Math.max(walls.left, Math.min(walls.right - tinyW, tinyX));
      climbLedges.push({
        worldX: tinyX,
        worldY: tinyWy,
        w: tinyW,
        h: 10,
        seed: Math.random() * 10000 | 0,
        tiny: true
      });
    }

    lastLedgeX = ledgeX;
    lastLedgeW = ledgeW;
    lastCenter = ledgeX + ledgeW / 2;
    wy -= vertGap;

    // 2x weighted flip: 2/3 chance the next ledge is on the OPPOSITE side,
    // 1/3 chance it stays on the same side. Applies symmetrically to both
    // sides so the climb doesn't drift toward one wall.
    if (Math.random() < 2 / 3) {
      currentSide = currentSide === 'left' ? 'right' : 'left';
    }
  }

  // Summit ledge — sits right on top of the mountain rock, at the lip
  // Use a slight offset so the platform graphic sits ON the mountain, not floating above
  const summitTaperAmt = ((1.0 - 0.8) / 0.2);
  const summitTaper = summitTaperAmt * summitTaperAmt * 0.15;
  const summitLeft = summitTaper * W * 0.5 + 20;
  const summitRight = W - summitTaper * W * 0.5 - 20;
  climbLedges.push({
    worldX: summitLeft,
    worldY: -CLIMB_TOTAL_HEIGHT + 4 - 30, // sits on the volcano lip (moved down 10px from previous)
    w: summitRight - summitLeft,
    h: 20,
    seed: 77777,
    isSummit: true
  });

  // Bridge any gap to summit
  const lastRegularY = climbLedges[climbLedges.length - 2]?.worldY || 0;
  const gapToSummit = Math.abs(lastRegularY - (-CLIMB_TOTAL_HEIGHT - 16));
  if (gapToSummit > 100) {
    const topWalls = getWalls(0.95);
    const stepY = -CLIMB_TOTAL_HEIGHT + 80;
    const stepW = Math.max(100, (topWalls.right - topWalls.left) * 0.5);
    const stepX = topWalls.left + Math.random() * Math.max(0, topWalls.right - topWalls.left - stepW);
    climbLedges.push({
      worldX: stepX, worldY: stepY, w: stepW, h: 16,
      seed: Math.random() * 10000 | 0
    });
  }
}

function generateGasClouds() {
  gasClouds = [];
  let wy = -300;
  while (wy > -CLIMB_TOTAL_HEIGHT + 300) {
    const progress = Math.abs(wy) / CLIMB_TOTAL_HEIGHT;
    const cloudW = 280 + Math.random() * 300 + progress * 150; // wider at top
    const cloudH = 100 + Math.random() * 80 + progress * 120; // much thicker at top
    const cloudX = -100 + Math.random() * (W - cloudW + 200); // can start partially off-screen
    const seed = Math.floor(Math.random() * 99999);
    const P = 4; // 4px blocks for sharper pixel art

    // Generate cauliflower sub-blobs — irregular lumpy shapes, no single dominant ellipse
    const blobCount = 7 + Math.floor(Math.random() * 5) + Math.floor(progress * 5);
    const blobs = [];
    // Ring of blobs around the perimeter — placed at EDGES for bumpy left/right/top/bottom
    const perimCount = 6 + Math.floor(Math.random() * 4);
    for (let i = 0; i < perimCount; i++) {
      const angle = (i / perimCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
      // Push blobs further out toward grid edges, with random radial variation
      const radialDist = 0.3 + Math.random() * 0.2;
      blobs.push({
        cx: 0.5 + Math.cos(angle) * radialDist,
        cy: 0.45 + Math.sin(angle) * (radialDist * 0.75),
        rx: 0.1 + Math.random() * 0.2,
        ry: 0.08 + Math.random() * 0.16,
        bright: 0.2 + Math.random() * 0.4
      });
    }
    // Extra blobs specifically on left and right edges for bumpy sides
    for (let i = 0; i < 3; i++) {
      const side = Math.random() < 0.5 ? 0.05 + Math.random() * 0.12 : 0.83 + Math.random() * 0.12;
      blobs.push({
        cx: side,
        cy: 0.2 + Math.random() * 0.5,
        rx: 0.08 + Math.random() * 0.12,
        ry: 0.08 + Math.random() * 0.15,
        bright: 0.2 + Math.random() * 0.3
      });
    }
    // Interior blobs for density and bright cores
    for (let i = 0; i < blobCount - perimCount; i++) {
      blobs.push({
        cx: 0.15 + Math.random() * 0.7,
        cy: 0.15 + Math.random() * 0.6,
        rx: 0.1 + Math.random() * 0.22,
        ry: 0.1 + Math.random() * 0.18,
        bright: 0.4 + Math.random() * 0.6
      });
    }
    // A few smaller overlapping core blobs (NOT one big ellipse)
    for (let i = 0; i < 3; i++) {
      blobs.push({
        cx: 0.3 + Math.random() * 0.4,
        cy: 0.25 + Math.random() * 0.35,
        rx: 0.15 + Math.random() * 0.15,
        ry: 0.12 + Math.random() * 0.15,
        bright: 0.7 + Math.random() * 0.3
      });
    }

    // Pre-generate shape grid with cauliflower blobbing
    const cols = Math.ceil(cloudW / P);
    const rows = Math.ceil(cloudH / P);
    const shape = [];
    const brightness = []; // per-cell brightness for core glow
    for (let r = 0; r < rows; r++) {
      shape[r] = [];
      brightness[r] = [];
      for (let c = 0; c < cols; c++) {
        const nx = c / cols;
        const ny = r / rows;
        let maxDensity = 0;
        let maxBright = 0;
        for (const blob of blobs) {
          const dx = (nx - blob.cx) / blob.rx;
          const dy = (ny - blob.cy) / blob.ry;
          const d = dx * dx + dy * dy;
          if (d < 1) {
            const density = 1 - d;
            if (density > maxDensity) maxDensity = density;
            maxBright = Math.max(maxBright, density * blob.bright);
          }
        }
        // Edge falloff — density fades near grid borders so shapes don't get clipped flat
        const edgeDistX = Math.min(nx, 1 - nx); // 0 at edges, 0.5 at center
        const edgeDistY = Math.min(ny, 1 - ny);
        const edgeFalloff = Math.min(1, Math.min(edgeDistX, edgeDistY) * 12); // smooth ramp in outer ~8%

        // Hash noise for organic edges — heavy randomization for bumpy, irregular boundary
        const h = ((c * 17 + r * 31 + seed) * 2654435761 >>> 16) & 0xFFFF;
        const h2 = ((c * 53 + r * 97 + seed * 3) * 2654435761 >>> 16) & 0xFFFF;
        const h3 = ((c * 41 + r * 73 + seed * 7) * 2654435761 >>> 16) & 0xFFFF;
        // Large-scale noise for big lumpy bulges + fine noise for ragged edges
        const bigNoise = (h / 65536) * 0.35;
        const fineNoise = (h2 / 65536) * 0.15;
        const extraNoise = (h3 / 65536) * 0.08;
        const noise = bigNoise + fineNoise + extraNoise;
        // Apply edge falloff to density so blobs dissolve at grid borders
        shape[r][c] = (maxDensity * edgeFalloff) > 0.1 + noise ? 1 : 0;
        brightness[r][c] = maxBright;
        // Dripping tendrils at bottom
        if (ny > 0.75 && shape[r][c] === 0 && r > 0 && shape[r - 1][c]) {
          const dripChance = (h & 7) < 2 ? 1 : 0;
          shape[r][c] = dripChance;
          brightness[r][c] = maxBright * 0.4;
        }
      }
    }

    // Generate floating bubble positions (seeded)
    const bubbleCount = 6 + Math.floor(Math.random() * 6);
    const bubbles = [];
    for (let i = 0; i < bubbleCount; i++) {
      bubbles.push({
        nx: 0.05 + Math.random() * 0.9,
        ny: 0.1 + Math.random() * 0.8,
        r: 2 + Math.random() * 4,
        phase: Math.random() * Math.PI * 2
      });
    }

    const moveDir = Math.random() < 0.5 ? 1 : -1; // each cloud picks a direction and sticks with it
    gasClouds.push({
      worldX: cloudX, worldY: wy, w: cloudW, h: cloudH,
      speed: 0.15 + Math.random() * 1.4, // wide range: some drift slowly, some move fast
      dir: moveDir,
      phase: Math.random() * Math.PI * 2,
      density: 0.6 + progress * 0.4,
      seed, shape, brightness, cols, rows, bubbles,
      offsetX: 0 // accumulated horizontal travel
    });
    // Clouds get much closer together near the top — dense toxic layer
    wy -= 80 + Math.random() * 160 - progress * 100;
  }
}

function generateSummitSmoke() {
  summitSmokeClouds = [];
  const P = 4;
  // 3 layers of large grey/black clouds at the volcano top
  // layer 0 = background (hovers/bobs), layer 1 = mid (drifts left), layer 2 = foreground (drifts right)
  const layerConfigs = [
    { count: 15, layer: 0, minW: 500, maxW: 900, minH: 150, maxH: 280, speed: 0, alpha: 0.8 },   // bg: hover
    { count: 15, layer: 1, minW: 400, maxW: 800, minH: 120, maxH: 250, speed: 0.4, alpha: 0.65 }, // mid: left
    { count: 12, layer: 2, minW: 450, maxW: 850, minH: 100, maxH: 220, speed: 0.5, alpha: 0.5 }   // fg: right
  ];

  for (const cfg of layerConfigs) {
    for (let i = 0; i < cfg.count; i++) {
      const cloudW = cfg.minW + Math.random() * (cfg.maxW - cfg.minW);
      const cloudH = cfg.minH + Math.random() * (cfg.maxH - cfg.minH);
      const cloudX = -300 + Math.random() * (W + 500);
      const cloudY = Math.random(); // 0→1 mapped to smoke band
      const seed = Math.floor(Math.random() * 99999);

      // Generate cauliflower blobs — same system as gas clouds
      const blobs = [];
      const perimCount = 6 + Math.floor(Math.random() * 5);
      for (let j = 0; j < perimCount; j++) {
        const angle = (j / perimCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
        const radialDist = 0.3 + Math.random() * 0.2;
        blobs.push({
          cx: 0.5 + Math.cos(angle) * radialDist,
          cy: 0.45 + Math.sin(angle) * (radialDist * 0.75),
          rx: 0.12 + Math.random() * 0.22,
          ry: 0.1 + Math.random() * 0.18,
          bright: 0.2 + Math.random() * 0.4
        });
      }
      // Extra side blobs for wider spread
      for (let j = 0; j < 4; j++) {
        const side = Math.random() < 0.5 ? 0.02 + Math.random() * 0.15 : 0.83 + Math.random() * 0.15;
        blobs.push({ cx: side, cy: 0.15 + Math.random() * 0.6, rx: 0.1 + Math.random() * 0.15, ry: 0.08 + Math.random() * 0.16, bright: 0.15 + Math.random() * 0.35 });
      }
      // Interior + core blobs
      for (let j = 0; j < 5; j++) {
        blobs.push({ cx: 0.12 + Math.random() * 0.76, cy: 0.12 + Math.random() * 0.65, rx: 0.12 + Math.random() * 0.24, ry: 0.1 + Math.random() * 0.2, bright: 0.4 + Math.random() * 0.6 });
      }
      for (let j = 0; j < 3; j++) {
        blobs.push({ cx: 0.25 + Math.random() * 0.5, cy: 0.2 + Math.random() * 0.4, rx: 0.15 + Math.random() * 0.18, ry: 0.12 + Math.random() * 0.16, bright: 0.6 + Math.random() * 0.4 });
      }

      // Pre-generate shape grid
      const cols = Math.ceil(cloudW / P);
      const rows = Math.ceil(cloudH / P);
      const shape = [];
      const brightness = [];
      for (let r = 0; r < rows; r++) {
        shape[r] = [];
        brightness[r] = [];
        for (let c = 0; c < cols; c++) {
          const nx = c / cols;
          const ny = r / rows;
          let maxDensity = 0;
          let maxBright = 0;
          for (const blob of blobs) {
            const dx = (nx - blob.cx) / blob.rx;
            const dy = (ny - blob.cy) / blob.ry;
            const d = dx * dx + dy * dy;
            if (d < 1) {
              const density = 1 - d;
              if (density > maxDensity) maxDensity = density;
              maxBright = Math.max(maxBright, density * blob.bright);
            }
          }
          const edgeDistX = Math.min(nx, 1 - nx);
          const edgeDistY = Math.min(ny, 1 - ny);
          const edgeFalloff = Math.min(1, Math.min(edgeDistX, edgeDistY) * 12);
          const h = ((c * 17 + r * 31 + seed) * 2654435761 >>> 16) & 0xFFFF;
          const h2 = ((c * 53 + r * 97 + seed * 3) * 2654435761 >>> 16) & 0xFFFF;
          const bigNoise = (h / 65536) * 0.35;
          const fineNoise = (h2 / 65536) * 0.15;
          shape[r][c] = (maxDensity * edgeFalloff) > 0.1 + bigNoise + fineNoise ? 1 : 0;
          brightness[r][c] = maxBright;
        }
      }

      summitSmokeClouds.push({
        baseX: cloudX, yFrac: cloudY, w: cloudW, h: cloudH,
        speed: cfg.speed + Math.random() * 0.3,
        dir: cfg.layer === 2 ? 1 : (cfg.layer === 1 ? -1 : 0), // bg=0, mid=left, fg=right
        phase: Math.random() * Math.PI * 2,
        seed, shape, brightness, cols, rows,
        offsetX: 0,
        layer: cfg.layer,
        layerAlpha: cfg.alpha
      });
    }
  }
}

function drawSummitSmokeLayer(smokeTop, smokeBot, P, drawLayer) {
  // drawLayer: 0 = background, 1 = mid, 2 = foreground
  const smokeBandHeight = smokeBot - smokeTop;
  if (smokeBandHeight <= 0) return;

  for (const cloud of summitSmokeClouds) {
    if (cloud.layer !== drawLayer) continue;

    // Update movement
    if (cloud.dir !== 0) {
      cloud.offsetX += cloud.speed * cloud.dir;
      // Wrap around when drifting off screen
      const cx2 = cloud.baseX + cloud.offsetX;
      if (cloud.dir < 0 && cx2 + cloud.w < -100) cloud.offsetX += W + cloud.w + 200;
      if (cloud.dir > 0 && cx2 > W + 100) cloud.offsetX -= W + cloud.w + 200;
    }

    // Background layer: gentle hover/bob in place
    let bobY = 0;
    if (cloud.layer === 0) {
      bobY = Math.sin(frameCount * 0.008 + cloud.phase) * 12;
    }

    const cx = cloud.baseX + cloud.offsetX;
    // yFrac 0→1 maps within the smoke band
    const sy = smokeTop + cloud.yFrac * smokeBandHeight - cloud.h * 0.5 + bobY;
    const pulse = Math.sin(frameCount * 0.015 + cloud.phase) * 0.08 + 0.92;

    for (let r = 0; r < cloud.rows; r++) {
      for (let c = 0; c < cloud.cols; c++) {
        if (!cloud.shape[r][c]) continue;
        const bx = cx + c * P;
        const by = sy + r * P;
        if (bx + P < 0 || bx > W || by + P < 0 || by > H) continue;

        const br = cloud.brightness[r][c];

        let neighbors = 0;
        if (r > 0 && cloud.shape[r-1][c]) neighbors++;
        if (r < cloud.rows-1 && cloud.shape[r+1][c]) neighbors++;
        if (c > 0 && cloud.shape[r][c-1]) neighbors++;
        if (c < cloud.cols-1 && cloud.shape[r][c+1]) neighbors++;
        if (r > 0 && c > 0 && cloud.shape[r-1][c-1]) neighbors += 0.5;
        if (r > 0 && c < cloud.cols-1 && cloud.shape[r-1][c+1]) neighbors += 0.5;
        if (r < cloud.rows-1 && c > 0 && cloud.shape[r+1][c-1]) neighbors += 0.5;
        if (r < cloud.rows-1 && c < cloud.cols-1 && cloud.shape[r+1][c+1]) neighbors += 0.5;
        const edgeFade = Math.min(1, neighbors / 4);

        const h = ((c * 17 + r * 31 + cloud.seed) * 2654435761 >>> 16) & 0xFF;
        const flicker = ((c * 7 + r * 13 + Math.floor(frameCount * 0.04)) * 2654435761 >>> 20) & 0x7;

        // Grey/black palette — lighter cores, darker edges
        let red, green, blue;
        if (br > 0.7) {
          red = 65 + flicker * 2; green = 62 + flicker * 2; blue = 68 + flicker * 2;
        } else if (br > 0.5) {
          red = 48 + flicker; green = 45 + flicker; blue = 50 + flicker;
        } else if (br > 0.3) {
          red = 32 + flicker; green = 30 + flicker; blue = 35 + flicker;
        } else if (br > 0.15) {
          red = 18 + flicker; green = 16 + flicker; blue = 20 + flicker;
        } else {
          red = 8 + flicker; green = 7 + flicker; blue = 10 + flicker;
        }
        if (h % 5 === 0 && br > 0.2) { red += 12; green += 10; blue += 14; }
        if (h % 7 === 0 && br < 0.4) { red -= 4; green -= 4; blue -= 4; }

        const alpha = pulse * Math.min(1, br * 1.5 + 0.25) * cloud.layerAlpha * edgeFade;
        ctx.fillStyle = `rgba(${Math.max(0, Math.min(255, red))}, ${Math.max(0, Math.min(255, green))}, ${Math.max(0, Math.min(255, blue))}, ${alpha.toFixed(3)})`;
        ctx.fillRect(bx, by, P, P);
      }
    }
  }
}

function drawClimbLedges() {
  const P = 4; // same pixel grid as volcanic ground
  // Same palette as drawVolcanicGround
  const PAL = {
    deep: '#0c0604', dark: '#160d08', mid: '#24160e',
    surface: '#362010', light: '#4a2e1a', edge: '#5c3820',
    shadow: '#080402', lavaD: '#882200', lava: '#cc4400',
    lavaB: '#ff6600', lavaH: '#ffaa22'
  };

  for (const ledge of climbLedges) {
    const sy = climbScreenY(ledge.worldY);
    if (sy < -60 || sy > H + 40) continue;
    const sx = ledge.worldX;
    const seed = ledge.seed;

    if (ledge.isSummit) {
      // Summit ledge — same rock outcropping graphic as normal platforms
    }
    {
      // ── ROCK OUTCROPPING — same style as volcanic ground rocks ──
      const cols = Math.ceil(ledge.w / P);
      const baseRows = Math.ceil(ledge.h / P);
      const isLeft = sx < W / 2; // outcroppings jut from nearer wall

      for (let col = 0; col < cols; col++) {
        const h = ((col * 17 + seed) * 2654435761 >>> 16);
        // Jagged top surface — 0-3 blocks above baseline
        const edgeFade = isLeft
          ? Math.max(0, 1 - col / (cols * 0.15))   // taper left edge
          : Math.max(0, 1 - (cols - 1 - col) / (cols * 0.15)); // taper right edge
        const midBulge = 1 - Math.abs((col / cols) * 2 - 1) * 0.5; // higher in middle
        const peakBlocks = Math.floor((h % 3) * midBulge * (1 - edgeFade * 0.8));

        // Peak pixels above baseline
        for (let b = 0; b < peakBlocks; b++) {
          const by = sy - (b + 1) * P;
          ctx.fillStyle = b === 0 ? ((h >> 3) % 2 ? PAL.light : PAL.edge) : PAL.surface;
          ctx.fillRect(sx + col * P, by, P, P);
        }

        // Top surface row — highlight
        ctx.fillStyle = (h % 4 === 0) ? PAL.edge : (h % 3 === 0) ? PAL.light : PAL.surface;
        ctx.fillRect(sx + col * P, sy, P, P);

        // Body rows — banded like volcanic ground
        for (let row = 1; row < baseRows + 2; row++) {
          const bh = ((col * 13 + row * 7 + seed) * 2654435761 >>> 20);
          let color;
          if (row <= 1) color = bh % 2 === 0 ? PAL.surface : PAL.mid;
          else if (row <= 3) color = bh % 3 === 0 ? PAL.mid : PAL.dark;
          else color = bh % 2 === 0 ? PAL.dark : PAL.deep;
          ctx.fillStyle = color;
          ctx.fillRect(sx + col * P, sy + row * P, P, P);
        }

        // Crevice/crack detail
        if ((h & 7) === 0 && col > 1 && col < cols - 1) {
          ctx.fillStyle = PAL.shadow;
          ctx.fillRect(sx + col * P, sy + P, P, P * 2);
        }
      }

      // Lava vein glow underneath — subtle
      const veinPulse = Math.sin(frameCount * 0.03 + seed) * 0.08 + 0.06;
      ctx.fillStyle = `rgba(200, 60, 0, ${veinPulse})`;
      ctx.fillRect(sx + P * 2, sy + ledge.h + P, ledge.w - P * 4, P);

      // Shadow underneath
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      for (let col = 1; col < cols - 1; col++) {
        const sh = ((col * 11 + seed) * 2654435761 >>> 18);
        const shadowLen = 2 + (sh % 3);
        for (let s = 0; s < shadowLen; s++) {
          ctx.fillRect(sx + col * P, sy + ledge.h + s * P, P, P);
        }
      }
    }
  }
}

function drawGasClouds() {
  const P = 4; // 4px pixel blocks — sharp pixel art
  for (const cloud of gasClouds) {
    const sy = climbScreenY(cloud.worldY);
    if (sy + cloud.h < -80 || sy > H + 80) continue;

    // Consistent horizontal travel
    cloud.offsetX += cloud.speed * cloud.dir;
    const sx = cloud.worldX + cloud.offsetX;
    const pulse = Math.sin(frameCount * 0.02 + cloud.phase) * 0.1 + 0.9;
    const baseAlpha = cloud.density * pulse;

    // ── Cauliflower cloud body — with edge alpha fade for organic shapes ──
    for (let r = 0; r < cloud.rows; r++) {
      for (let c = 0; c < cloud.cols; c++) {
        if (!cloud.shape[r][c]) continue;
        const bx = sx + c * P;
        const by = sy + r * P;
        if (bx + P < 0 || bx > W || by + P < 0 || by > H) continue;

        const br = cloud.brightness[r][c]; // 0-1, higher = brighter core

        // Count neighboring filled cells — edge cells have fewer neighbors
        let neighbors = 0;
        if (r > 0 && cloud.shape[r-1][c]) neighbors++;
        if (r < cloud.rows-1 && cloud.shape[r+1][c]) neighbors++;
        if (c > 0 && cloud.shape[r][c-1]) neighbors++;
        if (c < cloud.cols-1 && cloud.shape[r][c+1]) neighbors++;
        // Diagonal neighbors for smoother corners
        if (r > 0 && c > 0 && cloud.shape[r-1][c-1]) neighbors += 0.5;
        if (r > 0 && c < cloud.cols-1 && cloud.shape[r-1][c+1]) neighbors += 0.5;
        if (r < cloud.rows-1 && c > 0 && cloud.shape[r+1][c-1]) neighbors += 0.5;
        if (r < cloud.rows-1 && c < cloud.cols-1 && cloud.shape[r+1][c+1]) neighbors += 0.5;
        // Edge fade: cells with few neighbors are more transparent
        const edgeFade = Math.min(1, neighbors / 4);

        const h = ((c * 17 + r * 31 + cloud.seed) * 2654435761 >>> 16) & 0xFF;
        const flicker = ((c * 7 + r * 13 + Math.floor(frameCount * 0.06)) * 2654435761 >>> 20) & 0x7;

        // Vivid green palette matching reference — bright cores, darker edges
        let red, green, blue;
        if (br > 0.7) {
          // Hot core — bright yellow-green (like reference center)
          red = 200 + flicker * 3; green = 255; blue = 80 + flicker * 4;
        } else if (br > 0.5) {
          // Bright lime green
          red = 140 + flicker * 2; green = 240 + Math.min(15, flicker * 2); blue = 40 + flicker;
        } else if (br > 0.3) {
          // Mid green — vivid
          red = 80 + flicker; green = 200 + flicker * 2; blue = 20 + flicker;
        } else if (br > 0.15) {
          // Darker green edge
          red = 40 + flicker; green = 140 + flicker * 2; blue = 10;
        } else {
          // Outer fringe — dark green
          red = 20 + flicker; green = 80 + flicker; blue = 5;
        }

        // Per-pixel variation from hash
        if (h % 5 === 0 && br > 0.2) { red += 20; green += 10; } // bright speckle
        if (h % 7 === 0 && br < 0.4) { green -= 15; } // dark speckle

        const alpha = baseAlpha * Math.min(1, br * 1.5 + 0.25) * 0.7 * edgeFade;
        ctx.fillStyle = `rgba(${Math.min(255, red)}, ${Math.min(255, green)}, ${Math.min(255, blue)}, ${alpha.toFixed(3)})`;
        ctx.fillRect(bx, by, P, P);
      }
    }

    // ── Soft glow overlay on cores ── (radial, no hard rectangles)
    for (let r = 1; r < cloud.rows - 1; r += 2) {
      for (let c = 1; c < cloud.cols - 1; c += 2) {
        if (!cloud.shape[r][c]) continue;
        const br = cloud.brightness[r][c];
        if (br < 0.55) continue;
        const bx = sx + c * P + P / 2;
        const by = sy + r * P + P / 2;
        if (bx < 0 || bx > W || by < 0 || by > H) continue;
        const glowA = (br - 0.5) * baseAlpha * 0.4;
        const glowR = P * 2;
        const grad = ctx.createRadialGradient(bx, by, 0, bx, by, glowR);
        grad.addColorStop(0, `rgba(220, 255, 120, ${glowA.toFixed(3)})`);
        grad.addColorStop(1, `rgba(220, 255, 120, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(bx, by, glowR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ── Floating luminous bubbles ── (round, like reference image)
    for (const bub of cloud.bubbles) {
      const bobX = Math.sin(frameCount * 0.015 + bub.phase) * 12;
      const bobY = Math.cos(frameCount * 0.012 + bub.phase * 1.3) * 8;
      const bx = sx + bub.nx * cloud.w + bobX;
      const by = sy + bub.ny * cloud.h + bobY;
      if (bx < 0 || bx > W || by < 0 || by > H) continue;
      const r = bub.r + 1;
      const bubAlpha = baseAlpha * 0.55;
      // Outer glow
      ctx.beginPath();
      ctx.arc(bx, by, r + 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140, 220, 60, ${(bubAlpha * 0.3).toFixed(3)})`;
      ctx.fill();
      // Bright bubble body
      ctx.beginPath();
      ctx.arc(bx, by, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 255, 80, ${bubAlpha.toFixed(3)})`;
      ctx.fill();
      // Bright center
      ctx.beginPath();
      ctx.arc(bx, by, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(230, 255, 150, ${(bubAlpha * 0.8).toFixed(3)})`;
      ctx.fill();
      // Highlight speck
      ctx.beginPath();
      ctx.arc(bx - r * 0.25, by - r * 0.25, r * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 200, ${(bubAlpha * 0.5).toFixed(3)})`;
      ctx.fill();
    }

  }
}

// ── LAVA DROP SPAWNING ──
// All lava objects use WORLD coordinates (worldX).
// Screen position = worldX - scrollOffset
function spawnLavaDrop() {
  // Vertical mode — drops fall at random screen X positions
  if (verticalMode) {
    const dropX = 40 + Math.random() * (W - 80);
    warningMarkers.push({ worldX: dropX + scrollOffset, life: 45, maxLife: 45 });
    setTimeout(() => {
      if (gameState !== 'playing') return;
      lavaDrops.push({
        worldX: dropX + scrollOffset,
        y: -20,
        vy: 4 + Math.random() * 3,
        size: 6 + Math.random() * 6
      });
    }, 600);
    return;
  }
  let screenTargetX;
  if (level === 6) {
    // Level 2-3: drops on right 1/3 of screen
    screenTargetX = W * 0.67 + Math.random() * (W * 0.31);
  } else if (level === 5) {
    // Level 2-2: drops spread across right 40% of screen
    screenTargetX = W * 0.6 + Math.random() * (W * 0.38);
  } else if (isVolcanoLevel()) {
    // Level 2-1: drops only on rightmost 10%
    screenTargetX = W * 0.9 + Math.random() * (W * 0.1 - 20);
  } else {
    // Levels 1-1 through 1-3: mostly left side, some right
    if (Math.random() < 0.7) {
      screenTargetX = 60 + Math.random() * (W * 0.5 - 60);
    } else {
      screenTargetX = W * 0.5 + Math.random() * (W * 0.5 - 40);
    }
  }
  const worldTargetX = screenTargetX + scrollOffset;
  warningMarkers.push({ worldX: worldTargetX, life: 60, maxLife: 60 });
  const savedScroll = scrollOffset;
  setTimeout(() => {
    if (gameState !== 'playing') return;
    lavaDrops.push({
      worldX: worldTargetX + (Math.random() - 0.5) * 20,
      y: -20,
      vy: 3 + Math.random() * 2 + level * 0.3,
      size: 6 + Math.random() * 6
    });
  }, 800);
}

function spawnLavaPool(worldX, small) {
  // Check if there's already a pool nearby - merge
  for (const pool of lavaPools) {
    if (Math.abs(pool.worldX - worldX) < pool.w * 0.6) {
      pool.w = Math.min(pool.w + 15, 200);
      pool.life = pool.maxLife;
      pool.intensity = Math.min(pool.intensity + 0.2, 1.5);
      return;
    }
  }
  const poolW = small ? 20 + Math.random() * 15 : 40 + Math.random() * 30;
  const poolLife = small ? 200 + Math.random() * 100 : 400 + Math.random() * 200;
  const poolMaxLife = small ? 300 : 600;
  lavaPools.push({
    worldX: worldX,
    w: poolW,
    h: 8,
    life: poolLife,
    maxLife: poolMaxLife,
    intensity: 0.8,
    waveOffset: Math.random() * 6.28
  });
}

// ── EXPLOSION ANIMATION SYSTEM ──
let explosions = [];

function playExplosionSound() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Deep boom
    const boom = ac.createOscillator();
    boom.type = 'sine';
    boom.frequency.setValueAtTime(200, now);
    boom.frequency.exponentialRampToValueAtTime(20, now + 0.4);
    const boomGain = ac.createGain();
    boomGain.gain.setValueAtTime(0.6, now);
    boomGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    boom.connect(boomGain);
    boomGain.connect(ac.destination);
    autoCleanup(boom, [boom, boomGain]);
    boom.start(now);
    boom.stop(now + 0.5);
    // Crunch (cached buffer)
    const crunchSrc = ac.createBufferSource();
    crunchSrc.buffer = getCrunchBuf(ac);
    const crunchFilter = ac.createBiquadFilter();
    crunchFilter.type = 'lowpass';
    crunchFilter.frequency.setValueAtTime(2000, now);
    crunchFilter.frequency.exponentialRampToValueAtTime(200, now + 0.25);
    const crunchGain = ac.createGain();
    crunchGain.gain.setValueAtTime(0.5, now);
    crunchGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    crunchSrc.connect(crunchFilter);
    crunchFilter.connect(crunchGain);
    crunchGain.connect(ac.destination);
    autoCleanup(crunchSrc, [crunchSrc, crunchFilter, crunchGain]);
    crunchSrc.start(now);
    // High crackle (cached buffer)
    const crackSrc = ac.createBufferSource();
    crackSrc.buffer = getCrackBuf(ac);
    const crackFilter = ac.createBiquadFilter();
    crackFilter.type = 'bandpass';
    crackFilter.frequency.value = 3000;
    crackFilter.Q.value = 1;
    const crackGain = ac.createGain();
    crackGain.gain.setValueAtTime(0.25, now);
    crackGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    crackSrc.connect(crackFilter);
    crackFilter.connect(crackGain);
    crackGain.connect(ac.destination);
    autoCleanup(crackSrc, [crackSrc, crackFilter, crackGain]);
    crackSrc.start(now);
  } catch(e) {}
}

function spawnExplosion(x, y, size) {
  explosions.push({
    x, y,
    radius: 4,
    maxRadius: size || 60,
    life: 40,
    maxLife: 40,
    // Debris chunks
    debris: Array.from({ length: 12 }, () => ({
      x, y,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 10 - 2,
      size: 3 + Math.random() * 6,
      color: ['#ff6600', '#ffcc00', '#ff2200', '#333333', '#666666'][Math.random() * 5 | 0],
      rot: Math.random() * 6.28,
      rotV: (Math.random() - 0.5) * 0.4
    }))
  });
  playExplosionSound();
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.life--;
    const progress = 1 - e.life / e.maxLife;
    e.radius = e.maxRadius * Math.pow(progress, 0.4); // fast expand, slow end
    // Update debris
    for (const d of e.debris) {
      d.vy += 0.3; // gravity
      d.x += d.vx;
      d.y += d.vy;
      d.rot += d.rotV;
      d.vx *= 0.97; // drag
    }
    if (e.life <= 0) explosions.splice(i, 1);
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const progress = 1 - e.life / e.maxLife;
    const alpha = e.life / e.maxLife;

    // Expanding fireball — bright core fading to smoke
    if (progress < 0.6) {
      // Inner bright flash
      const innerAlpha = alpha * (1 - progress / 0.6);
      const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
      grad.addColorStop(0, `rgba(255, 255, 200, ${innerAlpha * 0.9})`);
      grad.addColorStop(0.3, `rgba(255, 150, 0, ${innerAlpha * 0.7})`);
      grad.addColorStop(0.6, `rgba(255, 50, 0, ${innerAlpha * 0.4})`);
      grad.addColorStop(1, `rgba(100, 20, 0, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Smoke ring (later phase)
    if (progress > 0.2) {
      const smokeAlpha = alpha * 0.4;
      ctx.globalAlpha = smokeAlpha;
      const smokeGrad = ctx.createRadialGradient(e.x, e.y, e.radius * 0.5, e.x, e.y, e.radius * 1.3);
      smokeGrad.addColorStop(0, 'rgba(60, 40, 20, 0)');
      smokeGrad.addColorStop(0.5, `rgba(40, 30, 15, ${smokeAlpha})`);
      smokeGrad.addColorStop(1, 'rgba(20, 15, 10, 0)');
      ctx.fillStyle = smokeGrad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius * 1.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Debris chunks
    for (const d of e.debris) {
      if (d.y > GROUND_Y + 20) continue;
      ctx.globalAlpha = alpha * 0.9;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.fillStyle = d.color;
      ctx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

// ── VEHICLE DEBRIS SYSTEM ──
let vehicleDebris = [];

function spawnVehicleDebris(x, y, w, h, type) {
  // Color palettes per vehicle type
  let colors;
  if (type === 'schoolbus') {
    colors = ['#ddaa00', '#aa7700', '#ffcc22', '#111111', '#666666', '#88ccff', '#ddaa00', '#aa7700'];
  } else if (type === 'firetruck') {
    colors = ['#cc2222', '#881111', '#ee4444', '#ffcc00', '#666666', '#88ccff', '#cc2222', '#881111'];
  } else if (type === 'ambulance') {
    colors = ['#dddddd', '#999999', '#ff3333', '#2266cc', '#666666', '#88ccff', '#dddddd', '#999999'];
  } else {
    colors = ['#1133aa', '#0a2277', '#ffffff', '#333333', '#666666', '#88ccff', '#1133aa', '#0a2277'];
  }

  const numChunks = 16 + Math.floor(Math.random() * 8);
  for (let i = 0; i < numChunks; i++) {
    // Spawn from random positions within the vehicle bounds
    const sx = x + (Math.random() - 0.5) * w * 0.8;
    const sy = y + (Math.random() - 0.5) * h * 0.6;
    const isWheel = i < 4;
    const isGlass = i >= 4 && i < 7;
    vehicleDebris.push({
      x: sx, y: sy,
      vx: (Math.random() - 0.5) * 18,
      vy: -Math.random() * 14 - 4,
      w: isWheel ? 12 + Math.random() * 6 : (isGlass ? 10 + Math.random() * 12 : 8 + Math.random() * 16),
      h: isWheel ? 12 + Math.random() * 6 : (isGlass ? 8 + Math.random() * 6 : 6 + Math.random() * 10),
      color: isWheel ? '#222222' : (isGlass ? 'rgba(120,200,255,0.7)' : colors[Math.random() * colors.length | 0]),
      rot: Math.random() * 6.28,
      rotV: (Math.random() - 0.5) * 0.5,
      life: 60 + Math.floor(Math.random() * 40),
      maxLife: 100,
      bounced: false
    });
  }
}

function updateVehicleDebris() {
  for (let i = vehicleDebris.length - 1; i >= 0; i--) {
    const d = vehicleDebris[i];
    d.vy += 0.45; // gravity
    d.x += d.vx;
    d.y += d.vy;
    d.rot += d.rotV;
    d.vx *= 0.98; // air drag
    d.life--;

    // Bounce off ground
    if (d.y > GROUND_Y - 5 && !d.bounced) {
      d.vy = -Math.abs(d.vy) * 0.35;
      d.vx *= 0.6;
      d.rotV *= 1.5;
      d.y = GROUND_Y - 5;
      d.bounced = true;
    }

    if (d.life <= 0 || d.y > H + 50) {
      vehicleDebris.splice(i, 1);
    }
  }
}

function drawVehicleDebris() {
  for (const d of vehicleDebris) {
    if (d.x < -50 || d.x > W + 50 || d.y < -50 || d.y > H + 50) continue;
    const alpha = Math.min(1, d.life / 30);
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    // Add a dark edge for depth
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-d.w / 2, -d.h / 2, d.w, d.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ── INPUT ──
const keys = {};
let jumpBuffered = false;

// ── KONAMI CODE: up up down down left right left right b a → then press 1/2/3 for level ──
const KONAMI_SEQ = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA'];
let konamiIndex = 0;
let konamiActive = false; // true after code entered, waiting for level number
let konamiUsed = false;   // true if player used konami to reach a level (score stays 0)
const CHEAT_WORD = ['KeyC','KeyH','KeyE','KeyA','KeyT'];
let cheatIndex = 0;
let cheatActivated = false;
let showHelpOverlay = false; // toggle with ? key

window.addEventListener('keydown', e => {
  keys[e.code] = true;

  // Volume controls: M = mute, +/- = adjust
  if (e.code === 'KeyM') {
    muted = !muted;
    applyMasterVolume();
    volumeDisplayTimer = 90;
    return;
  }
  if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    masterVolume = Math.min(1.0, Math.round((masterVolume + 0.1) * 10) / 10);
    muted = false;
    applyMasterVolume();
    volumeDisplayTimer = 90;
    return;
  }
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    masterVolume = Math.max(0, Math.round((masterVolume - 0.1) * 10) / 10);
    applyMasterVolume();
    volumeDisplayTimer = 90;
    return;
  }

  // R key — open README in new tab
  if (e.code === 'KeyR' && gameState !== 'playing' && gameState !== 'dojo') {
    window.open('README.md', '_blank');
    return;
  }

  // Q key — reset game back to title menu
  if (e.code === 'KeyQ') {
    clearGameState();
    gameState = 'menu';
    menuScrollY = -480;
    titleMusic.currentTime = 0;
    titleMusic.play().catch(() => {});
    return;
  }

  // ? key (Slash with Shift) — toggle help overlay
  if (e.code === 'Slash') {
    showHelpOverlay = !showHelpOverlay;
    return;
  }

  // Any other key dismisses help overlay
  if (showHelpOverlay) {
    showHelpOverlay = false;
    return;
  }

  // Konami code detection — enter code, then press 1/2/3 to jump to level
  if (konamiActive) {
    // Waiting for level number after code was entered
    const levelNum = e.code === 'Digit1' ? 1 : e.code === 'Digit2' ? 2 : e.code === 'Digit3' ? 3 : e.code === 'Digit4' ? 4 : e.code === 'Digit5' ? 5 : e.code === 'Digit6' ? 6 : 0;
    if (levelNum > 0) {
      konamiActive = false;
      konamiUsed = true;
      // Stop all audio
      stopAllLevelMusic();
      titleMusic.pause(); titleMusic.currentTime = 0;
      gameOverMusic.pause(); gameOverMusic.currentTime = 0;
      victoryMusic.pause(); victoryMusic.currentTime = 0;
      dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
      stopSiren(); stopPoliceSiren(); stopBusScream(); stopBuzz();
      // Set up level
      level = levelNum;
      score = 0;
      lives = cheatActivated ? 30 : MAX_LIVES;
      levelDuration = 1800 + level * 300;
      levelTimer = 0;
      frameCount = 0;
      scrollOffset = 0;
      deathTimer = 0;
      villageProgress = 0;
      creditsTimer = 0;
      player.x = 150;
      player.y = GROUND_Y - SPRITE_H;
      player.vy = 0; player.vx = 0;
      player.grounded = true; player.jumping = false;
      player.doubleJumped = false; player.trail = [];
      player.alive = true; player.runFrame = 0;
      player.spinAngle = 0; player.spinTimer = 0;
      player.kicking = false; player.kickTimer = 0;
      player.facingRight = true; player.idleTimer = 0;
      player.invincible = 120;
      lavaDrops = []; lavaPools = []; particles = [];
      warningMarkers = []; vehicles = []; explosions = []; vehicleDebris = [];
      rocks = []; moltenRocks = [];
      generateBuildings();
      if (levelNum < 4) {
        generateStreetLamps();
      }
      if (levelNum >= 4) {
        if (levelNum !== 6) generateTrees();
        else trees = [];
        generateRuins();
        generateBurningVillage();
        if (levelNum === 5) generateLavaPits();
        if (levelNum === 6) { generateLavaPits(); generateClimbLedges(); generateGasClouds(); generateSummitSmoke(); }
      }
      gameState = 'playing';
      musicStarted = true;
      playCurrentMusic();
      return;
    }
    // S key — jump to story scroll (end of 1-3)
    if (e.code === 'KeyS') {
      konamiActive = false;
      konamiUsed = true;
      // Stop all audio
      stopAllLevelMusic();
      titleMusic.pause(); titleMusic.currentTime = 0;
      gameOverMusic.pause(); gameOverMusic.currentTime = 0;
      dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
      stopSiren(); stopPoliceSiren(); stopBusScream(); stopBuzz();
      // Set up victory/story scroll state
      level = 3;
      score = 0;
      lives = cheatActivated ? 30 : MAX_LIVES;
      gameState = 'victory';
      storyScrollY = 0;
      storyScrollDone = false;
      deathTimer = 0;
      victoryMusic.currentTime = 0;
      victoryMusic.play().catch(() => {});
      return;
    }
    // Track CHEAT word input after konami code
    if (e.code === CHEAT_WORD[cheatIndex]) {
      cheatIndex++;
      if (cheatIndex >= CHEAT_WORD.length) {
        // CHEAT activated — 30 lives!
        cheatIndex = 0;
        cheatActivated = true;
        konamiActive = false;
        konamiUsed = true;
        lives = 30;
        // Flash effect
        shakeTimer = 15;
        spawnParticles(W / 2, H / 2, '#ffff00', 30, 8);
        spawnParticles(W / 2, H / 2, '#ff4400', 20, 6);
        return;
      }
      return; // keep konamiActive, waiting for rest of CHEAT or level number
    }
    // Any non-number/S/CHEAT-letter key cancels konami
    cheatIndex = 0;
    konamiActive = false;
    // fall through to normal input handling
  }
  if (e.code === KONAMI_SEQ[konamiIndex]) {
    konamiIndex++;
    if (konamiIndex >= KONAMI_SEQ.length) {
      konamiIndex = 0;
      cheatIndex = 0; // reset CHEAT word tracking
      konamiActive = true; // waiting for level number or CHEAT word
      return;
    }
  } else {
    konamiIndex = e.code === KONAMI_SEQ[0] ? 1 : 0;
  }

  // First interaction on menu — unlock audio and absorb the input
  if (gameState === 'menu' && !titleMusicUnlocked) {
    titleMusicUnlocked = true;
    titleMusic.currentTime = 0;
    titleMusic.play().catch(() => {});
    return; // absorb this input — just start the music
  }

  // ── G-G-D / O-G / S-F-X sequence detection on menu screen ──
  if (gameState === 'menu') {
    const key = e.code;
    const letter = key.length === 4 && key.startsWith('Key') ? key[3].toLowerCase() : null;
    if (letter) {
      dojoKeyBuffer += letter;
      dojoKeyTimer = 60; // reset timeout
      if (dojoKeyBuffer.endsWith('ggd')) {
        enterDojo();
        dojoKeyBuffer = '';
        return;
      }
      if (dojoKeyBuffer.endsWith('og')) {
        dojoKeyBuffer = '';
        window.location.href = 'index-og.html';
        return;
      }
      if (dojoKeyBuffer.endsWith('sfx')) {
        enterSfxScreen();
        dojoKeyBuffer = '';
        return;
      }
      // Keep only last 3 chars
      if (dojoKeyBuffer.length > 3) dojoKeyBuffer = dojoKeyBuffer.slice(-3);
    } else if (key !== 'ShiftLeft' && key !== 'ShiftRight') {
      dojoKeyBuffer = ''; // reset on any other key
    }
  }

  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (e.repeat) return; // no continuous jump from holding the button
    if ((gameState === 'menu' || gameState === 'levelComplete') && e.code !== 'ArrowUp') {
      startGame();
    } else if (gameState === 'dead' && deathTimer >= DEATH_RESTART_DELAY) {
      // Respawn with remaining lives (continue level)
      respawnPlayer();
    } else if (gameState === 'gameover' && gameOverScrollDone) {
      // Full restart from game over — only after scroll completes
      startGame();
    } else if (gameState === 'victory' && storyScrollDone) {
      // Full restart after story scroll completes
      clearGameState();
      gameState = 'menu';
      menuScrollY = -480;
      titleMusic.currentTime = 0;
      titleMusic.play().catch(() => {});
    } else if (gameState === 'playing' && summitWaitingForInput && !summitJumping && !summitConfirmed) {
      // Jump HIGH into the volcano — jump straight up from current position
      // Player draws in FRONT of the mountain on the way up, then BEHIND once past the peak
      summitJumping = true;
      summitJumpTimer = 0;
      player.vx = 0;
      player.vy = JUMP_FORCE * 1.6; // big arc up
      player.grounded = false;
      player.jumping = true;
      player.doubleJumped = false;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#ffcc44', 16, 5);
    } else if (gameState === 'dojo') {
      jumpBuffered = true;
    } else {
      jumpBuffered = true;
    }
  }

  // ── SFX screen controls ──
  if (gameState === 'sfx') {
    if (e.code === 'Escape') {
      exitSfxScreen();
      return;
    }
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      sfxSelectedIndex = (sfxSelectedIndex - 1 + SFX_LIST.length) % SFX_LIST.length;
      return;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      sfxSelectedIndex = (sfxSelectedIndex + 1) % SFX_LIST.length;
      return;
    }
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      SFX_LIST[sfxSelectedIndex].play();
      sfxPlayingName = SFX_LIST[sfxSelectedIndex].name;
      sfxPlayingTimer = 40;
      return;
    }
    // Number key shortcuts (0-9) and letter shortcuts (Q/W/E/R)
    for (let i = 0; i < SFX_LIST.length; i++) {
      const k = SFX_LIST[i].key;
      const match = k.length === 1 && k >= '0' && k <= '9'
        ? e.code === 'Digit' + k
        : e.code === 'Key' + k;
      if (match) {
        sfxSelectedIndex = i;
        SFX_LIST[i].play();
        sfxPlayingName = SFX_LIST[i].name;
        sfxPlayingTimer = 40;
        return;
      }
    }
    return; // absorb all other keys on SFX screen
  }

  // Escape exits dojo back to menu
  if (e.code === 'Escape' && gameState === 'dojo') {
    clearGameState();
    gameState = 'menu';
    menuScrollY = -480;
    titleMusic.currentTime = 0;
    titleMusic.play().catch(() => {});
    return;
  }

  // N key — switch dojo music track
  if (e.code === 'KeyN' && gameState === 'dojo') {
    getDojoMusic().pause();
    dojoTrackIdx = (dojoTrackIdx + 1) % dojoTracks.length;
    getDojoMusic().currentTime = 0;
    getDojoMusic().play().catch(() => {});
    return;
  }

  // I key — toggle dojo birds
  if (e.code === 'KeyI' && gameState === 'dojo') {
    dojoBirdsOn = !dojoBirdsOn;
    if (!dojoBirdsOn) dojoBirds = [];
    dojoDodgeCount = 0; dojoHitCount = 0;
    return;
  }

  // O key — toggle dojo water drops
  if (e.code === 'KeyO' && gameState === 'dojo') {
    dojoWaterOn = !dojoWaterOn;
    if (!dojoWaterOn) dojoWaterDrops = [];
    dojoDodgeCount = 0; dojoHitCount = 0;
    return;
  }

  // T key — start/stop timed trial (birds + water, ramping difficulty, scored)
  if (e.code === 'KeyT' && gameState === 'dojo') {
    if (dojoTrialOn) {
      // Stop trial
      dojoTrialOn = false;
      dojoBirdsOn = false;
      dojoWaterOn = false;

      dojoWaterDrops = [];
    } else {

      dojoBirds = [];
      dojoWaterDrops = [];
      dojoTrialTimer = 0;
      dojoTrialScore = 0;
      dojoDodgeCount = 0;
      dojoHitCount = 0;
    }
    return;
  }

  // Kick removed from arrow/movement keys
});
