  }
  if (gameState === 'transition') return;
  if (gameState === 'victory' && !storyScrollDone) return;
  if (gameState === 'victory') { clearGameState(); gameState = 'menu'; menuScrollY = -480; titleMusic.currentTime = 0; titleMusic.play().catch(() => {}); return; }
  if (gameState === 'dead' && deathTimer < DEATH_RESTART_DELAY) return;
  if (gameState === 'gameover' && !gameOverScrollDone) return;
  if (gameState === 'dead') { respawnPlayer(); return; }
  if (gameState === 'gameover') { startGame(); return; }
  if (gameState !== 'playing' && gameState !== 'dojo') { startGame(); return; }
  if (summitWaitingForInput && !summitJumping && !summitConfirmed) {
    summitJumping = true;
    summitJumpTimer = 0;
    player.vx = 0;
    player.vy = JUMP_FORCE * 1.6;
    player.grounded = false;
    player.jumping = true;
    player.doubleJumped = false;
    spawnParticles(player.x + player.w / 2, player.y + player.h, '#ffcc44', 16, 5);
    return;
  }
  jumpBuffered = true;
});

// ── GAME CONTROL ──
function clearGameState() {
  // Wipe all gameplay arrays and audio to ensure clean slate
  lavaDrops = [];
  lavaPools = [];
  particles = [];
  warningMarkers = [];
  vehicles = [];
  rocks = [];
  moltenRocks = [];
  explosions = [];
  vehicleDebris = [];
  lavaPits = [];
  climbLedges = [];
  gasClouds = [];
  climbBirds = [];
  summitReached = false;
  summitTimer = 0;
  summitWaitingForInput = false;
  summitConfirmed = false;
  summitJumping = false;
  summitJumpTimer = 0;
  summitPlayerAlpha = 1;
  summitJumpPastApex = false;
  summitApexPlayerY = 0;
  summitPostApexFrames = 0;
  if (typeof player !== 'undefined' && player) player._summitBurstFired = false;
  eruptionParticles = [];
  cliffTransition = 0; cliffWorldX = 0;
  verticalMode = false;
  scrollOffsetY = 0;
  playerWorldY = 0;
  gasExposure = 0;
  shakeTimer = 0;
  flashTimer = 0;
  deathTimer = 0;
  levelTimer = 0;
  creditsTimer = 0;
  scrollOffset = 0;
  frameCount = 0;
  villageProgress = 0;
  stopSiren();
  stopPoliceSiren();
  stopBusScream();
  stopBuzz();
  stopAllLevelMusic();
  gameOverMusic.pause();
  gameOverMusic.currentTime = 0;
  victoryMusic.pause();
  victoryMusic.currentTime = 0;
  dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
}

function startGame() {
  const fromLevelComplete = gameState === 'levelComplete';
  if (fromLevelComplete) {
    level = Math.min(level + 1, 6);
    levelDuration = 1800 + level * 300;
  } else {
    level = 1;
    score = 0;
    lives = cheatActivated ? 30 : MAX_LIVES;
    levelDuration = 1800;
    if (!cheatActivated) konamiUsed = false; // reset cheat flag on normal game start
    totalAttempts++;
  }
  gameState = 'transition';
  transitionTimer = 150; // ~2.5 seconds
  // Fresh game: credits will overlay on level 1 gameplay
  if (!fromLevelComplete && level === 1) {
    creditsTimer = 1; // >0 means credits are active
  } else {
    creditsTimer = 0;
  }

  // Stop audio during transition (keep level music if continuing)
  titleMusic.pause();
  titleMusic.currentTime = 0;
  if (level === 1) {
    // Fresh game — silence level music
    stopAllLevelMusic();
  }
  // Level music keeps playing through level transitions
  gameOverMusic.pause();
  gameOverMusic.currentTime = 0;
  victoryMusic.pause();
  victoryMusic.currentTime = 0;
  dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
  stopSiren();
  stopPoliceSiren();
  stopBusScream();
  stopBuzz();
  musicStarted = true;
  frameCount = 0;
  levelTimer = 0;
  scrollOffset = 0;
  deathTimer = 0;
  villageProgress = 0;
  player.x = 150;
  player.y = getGroundY(150 + scrollOffset) - SPRITE_H;
  player.vy = 0;
  player.vx = 0;
  player.grounded = true;
  player.jumping = false;
  player.doubleJumped = false;
  player.trail = [];
  player.alive = true;
  player.runFrame = 0;
  player.spinAngle = 0;
  player.spinTimer = 0;
  player.kicking = false;
  player.kickTimer = 0;
  player.facingRight = true;
  player.idleTimer = 0;
  player.invincible = 0;
  lavaDrops = [];
  lavaPools = [];
  particles = [];
  warningMarkers = [];
  vehicles = [];
  rocks = [];
  moltenRocks = [];
  explosions = [];
  vehicleDebris = [];
  lavaPits = [];
  generateBuildings();
  if (!isVolcanoLevel()) {
    generateStreetLamps();
  }
  if (isVolcanoLevel()) {
    if (level !== 6) generateTrees();
    else trees = []; // clear leftover trees from previous level
    generateRuins();
    generateBurningVillage();
    if (level === 5) generateLavaPits();
    if (level === 6) { generateLavaPits(); generateClimbLedges(); generateGasClouds(); generateSummitSmoke(); }
  }
  // Reset level 2-3 vertical state
  verticalMode = false;
  cliffTransition = 0; cliffWorldX = 0;
  scrollOffsetY = 0;
  playerWorldY = 0;
  gasExposure = 0;
}

function respawnPlayer() {
  // Continue the level with one less life
  gameState = 'playing';
  deathTimer = 0;
  gasExposure = 0;
  if (verticalMode) {
    // Respawn on nearest visible ledge, or on the ground if near bottom
    const groundScreenY = climbScreenY(0);
    let respawnedOnLedge = false;
    for (const ledge of climbLedges) {
      const ly = climbScreenY(ledge.worldY);
      if (ly > H * 0.1 && ly < H * 0.75) {
        player.x = ledge.worldX + ledge.w / 2 - player.w / 2;
        player.y = ly - SPRITE_H;
        respawnedOnLedge = true;
        break;
      }
    }
    if (!respawnedOnLedge) {
      // Respawn on ground
      player.x = W / 2 - player.w / 2;
      player.y = groundScreenY - SPRITE_H;
      // Reset camera to ground level
      scrollOffsetY = 0;
    }
  } else {
    player.x = 150;
    player.y = getGroundY(150 + scrollOffset) - SPRITE_H;
  }
  player.vy = 0;
  player.vx = 0;
  player.grounded = true;
  player.jumping = false;
  player.doubleJumped = false;
  player.trail = [];
  player.alive = true;
  player.runFrame = 0;
  player.spinAngle = 0;
  player.spinTimer = 0;
  player.kicking = false;
  player.kickTimer = 0;
  player.facingRight = true;
  player.idleTimer = 0;
  player.crouching = false;
  player.h = SPRITE_H;
  player.invincible = 120; // ~2 seconds of invincibility
  // Clear immediate threats near player
  lavaDrops = [];
  warningMarkers = [];
  // Restore music volume and resume (respect master volume)
  const v = muted ? 0 : masterVolume;
  const curMusic = getCurrentMusic();
  curMusic.volume = 0.5 * v;
  curMusic.play().catch(() => {});
}

// ── UPDATE ──
function update() {
  if (gameState !== 'playing') return;

  frameCount++;
  levelTimer++; // timer runs throughout — progress bar drives the climb

  // Level 2-3: smooth transition from horizontal to vertical
  if (level === 6 && !verticalMode) {
    const progress = levelTimer / levelDuration;
    if (progress >= VERTICAL_TRANSITION_PROGRESS && progress < CLIFF_TRANSITION_PROGRESS) {
      // First frame of transition: place the cliff wall ahead in world space
      if (cliffTransition === 0) {
        // Place cliff so it fully fills the screen by end of transition
        // Transition = 10% of levelDuration at RUN_SPEED pixels/frame
        const transitionFrames = (CLIFF_TRANSITION_PROGRESS - VERTICAL_TRANSITION_PROGRESS) * levelDuration;
        const totalScroll = transitionFrames * RUN_SPEED;
        // Cliff left edge needs to reach x=0 on screen, so place it totalScroll pixels ahead
        cliffWorldX = scrollOffset + totalScroll;
      }
      cliffTransition = (progress - VERTICAL_TRANSITION_PROGRESS) / (CLIFF_TRANSITION_PROGRESS - VERTICAL_TRANSITION_PROGRESS);
    } else if (progress >= CLIFF_TRANSITION_PROGRESS) {
      verticalMode = true;
      cliffTransition = 1;
      // Keep player where they are — just set up vertical mode state
      playerWorldY = 0;
      scrollOffsetY = 0;
      // Convert current player Y to vertical mode coordinate system
      player.y = climbScreenY(0) - SPRITE_H;
      player.vy = 0;
      player.grounded = true;
    }
  }

  if (verticalMode) {
    // Camera update moved to AFTER collision resolution (see below)
    // Just update playerWorldY for score tracking
    playerWorldY = (player.y + player.h) - (H - CLIMB_GROUND_Y) + scrollOffsetY;
  } else {
    scrollOffset += RUN_SPEED;
  }

  if (player.invincible > 0) player.invincible--;
  if (player.knockbackTimer > 0) player.knockbackTimer--;

  // Village transition — last 600 frames (~10 seconds) of level 3
  const VILLAGE_LEAD_IN = 600;
  if (level === 3 && levelTimer > levelDuration - VILLAGE_LEAD_IN) {
    villageProgress = Math.min(1, (levelTimer - (levelDuration - VILLAGE_LEAD_IN)) / VILLAGE_LEAD_IN);
    // Fade music as village approaches
    const v = muted ? 0 : masterVolume;
    getCurrentMusic().volume = 0.5 * v * (1 - villageProgress * 0.85); // fades to 15% volume
  } else {
    villageProgress = 0;
  }

  // Level 2-3 completion: player must physically reach the summit ledge (set in collision code above)
  if (summitReached) {
    summitTimer++;
    if (!summitJumping) {
      // Freeze player on the summit ledge until they press jump
      player.vx = 0;
      player.vy = 0;
      player.grounded = true;
      // After brief pause, show prompt and wait for input
      if (summitTimer >= SUMMIT_PAUSE_FRAMES && !summitWaitingForInput) {
        summitWaitingForInput = true;
      }
    } else {
      // Player is launching high into the air, then falling into the crater.
      // Rendering logic (in draw()):
      //   - While ascending (summitJumpPastApex === false) → drawn in FRONT of mountain
      //   - Once past apex (summitJumpPastApex === true)   → drawn BEHIND mountain,
      //     placed visually at the TOP of the jump so it snaps into the back layer there
      summitJumpTimer++;

      // Apply gravity — no X repositioning, player falls straight down from wherever they jumped
      player.vy += 0.5;
      player.vy = Math.min(16, player.vy);
      player.y += player.vy;
      player.vx = 0;
      player.grounded = false;
      player.jumping = true;

      // Detect apex: velocity has flipped from negative (rising) to non-negative (falling)
      if (!summitJumpPastApex && player.vy >= 0) {
        summitJumpPastApex = true;
        summitApexPlayerY = player.y; // snap-to-back-layer position
        summitPostApexFrames = 0;
        // Fire the big eruption burst at the apex — the moment we swap to the back layer
        if (!player._summitBurstFired) {
          player._summitBurstFired = true;
          const lipScreenY = climbScreenY(-CLIMB_TOTAL_HEIGHT);
          for (let i = 0; i < 30; i++) {
            eruptionParticles.push({
              x: W * 0.5 + (Math.random() - 0.5) * 60,
              y: lipScreenY,
              vx: (Math.random() - 0.5) * 10,
              vy: -(10 + Math.random() * 12),
              size: 4 + Math.random() * 6,
              life: 80 + Math.random() * 40,
              maxLife: 120,
              heat: 0.9 + Math.random() * 0.1,
              type: 'spark'
            });
          }
          shakeTimer = 30;
          flashTimer = 20;
        }
      }

      // Sparks trail from the falling player (only after apex, for drama)
      if (summitJumpPastApex && summitJumpTimer % 2 === 0) {
        spawnParticles(player.x + player.w / 2, player.y + player.h * 0.6, '#ff8844', 3, 3);
      }

      // Fade out only AFTER apex — player stays fully visible on the way up
      if (summitJumpPastApex) {
        summitPostApexFrames++;
        const FADE_FRAMES = 22;
        summitPlayerAlpha = Math.max(0, 1 - summitPostApexFrames / FADE_FRAMES);
      } else {
        summitPlayerAlpha = 1;
      }

      // Only trigger level completion after the player has fully disappeared
      if (!summitConfirmed && summitJumpPastApex && summitPlayerAlpha <= 0.01) {
        summitConfirmed = true;
      }
    }

    // Spawn eruption particles from the volcano lip
    // Lip width at summit: taperAmount = 0.15, so lip spans ~85% of screen
    const eruptLipLeft = 0.15 * W * 0.5;
    const eruptLipRight = W - 0.15 * W * 0.5;
    const eruptLipWidth = (eruptLipRight - eruptLipLeft) * 0.9; // 90% of lip
    const eruptLipCenter = (eruptLipLeft + eruptLipRight) / 2;
    const eruptY = climbScreenY(-CLIMB_TOTAL_HEIGHT);

    // Burst of sparks initially, then steady stream (original behavior)
    const spawnCount = summitTimer < 30 ? 8 : 3;
    for (let i = 0; i < spawnCount; i++) {
      eruptionParticles.push({
        x: eruptLipCenter + (Math.random() - 0.5) * eruptLipWidth,
        y: eruptY,
        vx: (Math.random() - 0.5) * 4,
        vy: -(6 + Math.random() * 10),
        size: 3 + Math.random() * 5,
        life: 60 + Math.random() * 60,
        maxLife: 60 + Math.random() * 60,
        heat: 0.5 + Math.random() * 0.5,
        type: 'spark'
      });
    }

    // THICK LAVA FLARES — sparse, from INSIDE the volcano, shooting up out of the frame
    // Spawn well below the visible lip so they appear to rise from within the crater
    const flareY = Math.min(H - 20, (player.y + player.h) + 60);
    const flareCenter = W * 0.5;
    const flareWidth = W * 0.22;
    // Sparse: one flare every few frames
    if (frameCount % 12 === 0) {
      eruptionParticles.push({
        x: flareCenter + (Math.random() - 0.5) * flareWidth,
        y: flareY,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -(16 + Math.random() * 6), // FAST — shoots up out of frame
        size: 12 + Math.random() * 14,
        life: 120,
        maxLife: 120,
        heat: 0.9 + Math.random() * 0.1,
        type: 'flare'
      });
    }
    // Occasional huge blob — even rarer
    if (frameCount % 35 === 0) {
      eruptionParticles.push({
        x: flareCenter + (Math.random() - 0.5) * (flareWidth * 0.5),
        y: flareY,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -(18 + Math.random() * 5),
        size: 20 + Math.random() * 10,
        life: 140,
        maxLife: 140,
        heat: 1.0,
        type: 'drop'
      });
    }
  }

  // Update eruption particles (always, so they finish even after confirm)
  for (let i = eruptionParticles.length - 1; i >= 0; i--) {
    const p = eruptionParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // gravity pulls them back down
    p.vx *= 0.99;  // slight air drag
    p.life--;
    if (p.life <= 0 || p.y > H + 20) {
      eruptionParticles.splice(i, 1);
    }
  }

  const levelComplete = verticalMode
    ? (summitReached && summitWaitingForInput && summitConfirmed)
    : (levelTimer >= levelDuration);
  if (levelComplete) {
    if (!konamiUsed) score += level * 1000;
    if (level >= 6) {
      // Stop all gameplay audio
      stopAllLevelMusic();
      stopSiren();
      stopPoliceSiren();
      stopBusScream();
      stopBuzz();
      // Life bonus: 1000 per life, 10000 if all 5
      const lifeBonus = konamiUsed ? 0 : (lives >= MAX_LIVES ? 10000 : lives * 1000);
      if (!konamiUsed) score += lifeBonus;
      // Beat the game — show emerald story scroll
      gameState = 'victory';
      storyScrollY = 0;
      storyScrollDone = false;
      deathTimer = 0;
      victoryMusic.currentTime = 0;
      victoryMusic.play().catch(() => {});
    } else {
      // Skip straight to next level
      gameState = 'levelComplete';
      startGame();
    }
    return;
  }

  // Score — timer-based for all modes
  score = konamiUsed ? 0 : Math.floor(levelTimer / 3) + (level - 1) * 1000;

  // Spawn lava drops - rate increases with level and time
  // Taper off during village transition (lava stops near the village)
  const levelProgress = levelTimer / levelDuration;
  // Level 2-1: no drops in 2nd half. Level 2-2: no drops in last third
  const noDrops = (level === 6 && cliffTransition > 0) || (level === 4 && levelProgress >= 0.5) || (level === 5 && levelProgress >= 0.67);
  const dropRate = level === 6
    ? Math.max(100, 180 - levelTimer * 0.005) // 2-3: random drops, moderate rate
    : level === 5
    ? Math.max(180, 300 - levelTimer * 0.004) // 2-2: very few drops
    : isVolcanoLevel()
    ? Math.max(120, 200 - levelTimer * 0.005) // 2-1: fewer drops
    : Math.max(15, 60 - level * 8 - levelTimer * 0.005);
  const lavaChance = villageProgress > 0.5 ? Math.max(0, 1 - (villageProgress - 0.5) * 2) : 1;
  if (!noDrops && frameCount % Math.floor(dropRate) === 0 && Math.random() < lavaChance) {
    spawnLavaDrop();
  }

  // Handle jump — uncrouch first if needed
  if (jumpBuffered) {
    if (player.crouching && !verticalMode) {
      player.crouching = false;
      player.h = SPRITE_H;
      player.y = getGroundY(player.x + scrollOffset) - player.h;
    }
    if (player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      player.jumping = true;
      player.doubleJumped = false;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#44bbff', 6, 3);
    } else if (!player.doubleJumped) {
      player.vy = JUMP_FORCE * 0.82;
      player.doubleJumped = true;
      player.spinAngle = 0;
      player.spinTimer = 0;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#66ddff', 10, 5);
    }
    jumpBuffered = false;
  }

  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // Horizontal movement
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = PLAYER_SPEED;
  player.x += moveX;
  player.x = Math.max(10, Math.min(W - player.w - 10, player.x));

  // Track facing direction
  if (moveX > 0) player.facingRight = true;
  else if (moveX < 0) player.facingRight = false;

  // Crouch — down arrow or S while grounded (disabled in vertical climb)
  const wantCrouch = !verticalMode && player.grounded && (keys['ArrowDown'] || keys['KeyS']);
  if (wantCrouch && !player.crouching) {
    player.crouching = true;
    player.h = Math.floor(SPRITE_H * 0.5);
    player.y = GROUND_Y - player.h; // stay on ground
  } else if (!wantCrouch && player.crouching) {
    player.crouching = false;
    player.h = SPRITE_H;
    player.y = GROUND_Y - player.h;
  }

  // Idle detection — drop lava on player if they don't move for ~1 second (not in vertical)
  const isMoving = verticalMode || moveX !== 0 || !player.grounded || player.kicking;
  if (isMoving) {
    player.idleTimer = 0;
  } else {
    player.idleTimer++;
    if (player.idleTimer === 60) { // ~1 second at 60fps
      // Target lava drop right at the player's position
      const playerWorldX = player.x + player.w / 2 + scrollOffset;
      warningMarkers.push({ worldX: playerWorldX, life: 40, maxLife: 40 });
      setTimeout(() => {
        if (gameState !== 'playing') return;
        lavaDrops.push({
          worldX: playerWorldX + (Math.random() - 0.5) * 10,
          y: -20,
          vy: 5 + level * 0.3,
          size: 8
        });
      }, 500);
      player.idleTimer = -30; // cooldown before next idle drop
    }
  }

  // Kick: pressing forward while grounded
  if (player.grounded && moveX !== 0 && !player.kicking) {
    // Kick triggers on double-tap forward (or just holding forward + press shift)
  }
  // Update kick timer
  if (player.kicking) {
    player.kickTimer++;
    if (player.kickTimer > 20) { // kick lasts ~20 frames
      player.kicking = false;
      player.kickTimer = 0;
    }
  }

  // Spin only during double jump — eased: fast wind-up, smooth ease-out
  if (!player.grounded && player.doubleJumped) {
    player.spinTimer++;
    const t = player.spinTimer;
    const spinDuration = 24; // frames for full 360
    if (t <= spinDuration) {
      // Ease-out cubic: starts fast, decelerates
      const progress = t / spinDuration;
      const eased = 1 - Math.pow(1 - progress, 3);
      player.spinAngle = eased * Math.PI * 2;
    } else {
      player.spinAngle = Math.PI * 2; // locked at full rotation
    }
  } else if (player.grounded) {
    player.spinAngle = 0;
    player.spinTimer = 0;
  }

  // Street lamp platform collision (check before ground so lamps take priority)
  if (!isVolcanoLevel() && !verticalMode) {
    for (const lamp of streetLamps) {
      const lsx = lamp.worldX - scrollOffset; // screen x of lamp center
      const platLeft = lsx - lamp.lampW / 2;
      const platRight = lsx + lamp.lampW / 2;
      const platTop = GROUND_Y - lamp.poleH - lamp.lampH;
      const platBot = GROUND_Y - lamp.poleH;

      // Player is above the platform and falling onto it
      if (
        player.vy >= 0 &&
        player.x + player.w > platLeft &&
        player.x < platRight &&
        player.y + player.h >= platTop &&
        player.y + player.h <= platBot + player.vy + 4
      ) {
        player.y = platTop - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
      }
    }
  }

  // Tree platform collision (volcano horizontal only)
  if (isVolcanoLevel() && !verticalMode) {
    let onTree = false;
    for (const t of trees) {
      if (t.collapsed || t.layer === 'back') continue; // mid + front trees have platforms
      const tsx = t.worldX - scrollOffset;
      if (tsx < -100 || tsx > W + 100) continue;
      const baseY = getGroundY(t.worldX);
      const layerScale = t.layer === 'front' ? 1.15 : 1.0;
      const totalH = (t.height + t.canopyH) * layerScale;
      const platTop = baseY - totalH * 0.6; // platform at 60% of tree height
      const platBot = platTop + t.canopyH * layerScale * 0.3;
      const halfW = (t.canopyW * layerScale) / 2;
      if (
        player.vy >= 0 &&
        player.x + player.w > tsx - halfW &&
        player.x < tsx + halfW &&
        player.y + player.h >= platTop &&
        player.y + player.h <= platBot + player.vy + 4
      ) {
        player.y = platTop - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
        // Scale player based on tree layer
        player.depthScale = t.layer === 'front' ? 1.12 : 1.0;
        onTree = true;
      }
    }
    // Reset scale when back on ground
    if (!onTree && player.grounded) {
      player.depthScale += (1 - player.depthScale) * 0.15; // smooth lerp back
    }
  } else {
    player.depthScale = 1;
  }

  // Firetruck ladder platform collision (extended ladder trucks only)
  for (const v of vehicles) {
    if (!v.ladderExtended) continue;
    // Ladder geometry matches draw code: base at vehicle-local (bx+10, by-1)*P, angle -1.1 rad, length 18*P
    const VP = 8; // vehicle pixel size
    const bw = 22, bh = 7;
    const bx = -bw / 2, by = -bh / 2 - 1;
    const ladderBaseX = v.x + v.w / 2 + (bx + 10) * VP;
    const ladderBaseY = v.y + v.h / 2 + (by - 1) * VP;
    const ladderAngle = -1.1;
    const ladderLen = 18 * VP; // 144px
    const cosA = Math.cos(ladderAngle);
    const sinA = Math.sin(ladderAngle);

    // Check several points along the ladder as mini-platforms (top = stand, side = hurt)
    let landedOnLadder = false;
    for (let t = 0.15; t <= 1.0; t += 0.1) {
      const px = ladderBaseX + cosA * ladderLen * t;
      const py = ladderBaseY + sinA * ladderLen * t;
      const platW = 16; // hitbox width at each sample point
      const platH = 8;  // hitbox thickness

      // Platform (top) — land on it when falling
      if (
        player.vy >= 0 &&
        player.x + player.w > px - platW / 2 &&
        player.x < px + platW / 2 &&
        player.y + player.h >= py - platH / 2 &&
        player.y + player.h <= py + platH / 2 + player.vy + 4
      ) {
        player.y = py - platH / 2 - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
        // Move player with the truck
        player.x += v.speed * v.dir;
        landedOnLadder = true;
        break;
      }
    }

    // Side hurtbox — running into the ladder from the side kills you
    if (!landedOnLadder) {
      for (let t = 0.2; t <= 0.9; t += 0.15) {
        const px = ladderBaseX + cosA * ladderLen * t;
        const py = ladderBaseY + sinA * ladderLen * t;
        const hurtW = 10;
        const hurtH = 14;
        // Check horizontal overlap + vertical overlap (player center vs ladder point)
        if (
          player.x + player.w > px - hurtW / 2 &&
          player.x < px + hurtW / 2 &&
          player.y + player.h > py - hurtH / 2 &&
          player.y < py + hurtH / 2
        ) {
          die();
          return;
        }
      }
    }
  }

  // Generate more lamps ahead as player progresses (evenly spaced)
  if (streetLamps.length > 0) {
    const lastLamp = streetLamps[streetLamps.length - 1];
    if (lastLamp.worldX - scrollOffset < W + 500) {
      const wx = lastLamp.worldX + LAMP_SPACING;
      streetLamps.push({
        worldX: wx,
        poleH: 135,
        lampW: 28,
        lampH: 8,
        glowColor: Math.random() > 0.3 ? '#ffcc44' : '#ff8833',
        flickerPhase: Math.random() * 6.28,
        flickering: Math.random() < 0.45
      });
    }
  }

  // Remove lamps that scrolled far off screen left
  while (streetLamps.length > 0 && streetLamps[0].worldX - scrollOffset < -200) {
    streetLamps.shift();
  }

  // Ground collision
  if (verticalMode) {
    // Skip all surface collisions while diving into the volcano
    if (summitJumping) {
      // No ledge/ground collisions — player falls freely through everything
    } else {
    // Solid ground at worldY=0
    const groundScreenY = climbScreenY(0);
    let onSurface = false;

    // Check ledge collisions
    for (const ledge of climbLedges) {
      const ly = climbScreenY(ledge.worldY);
      if (ly < -50 || ly > H + 50) continue;
      // Player landing on ledge (falling down, feet at ledge top)
      if (
        player.vy >= 0 &&
        player.x + player.w > ledge.worldX + 4 &&
        player.x < ledge.worldX + ledge.w - 4 &&
        player.y + player.h >= ly &&
        player.y + player.h <= ly + ledge.h + player.vy + 4
      ) {
        player.y = ly - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
        onSurface = true;
        // Player reached the summit ledge — trigger level completion
        if (ledge.isSummit && !summitReached) {
          summitReached = true;
          summitTimer = 0;
        }
        break;
      }
    }

    // Ground collision — solid rocky ground at bottom
    if (!onSurface && player.vy >= 0 && player.y + player.h >= groundScreenY) {
      player.y = groundScreenY - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumping = false;
      player.doubleJumped = false;
      onSurface = true;
    }

    // Fall off bottom of screen (ground has scrolled away) = death
    if (player.y > H + 50) {
      die();
      return;
    }
    // Fall off top (scrolled past) — push player down
    if (player.y < -SPRITE_H * 2) {
      player.y = -SPRITE_H;
    }

    // Gas cloud exposure
    let inGas = false;
    const pcx = player.x + player.w / 2;
    const pcy = player.y + player.h / 2;
    for (const cloud of gasClouds) {
      const sy = climbScreenY(cloud.worldY);
      if (sy + cloud.h < 0 || sy > H) continue;
      const cx = cloud.worldX + (cloud.offsetX || 0) + cloud.w * 0.5;
      const cy = sy + cloud.h * 0.5;
      // Elliptical hit test
      const dx = (pcx - cx) / (cloud.w * 0.45);
      const dy = (pcy - cy) / (cloud.h * 0.4);
      if (dx * dx + dy * dy < 1) {
        inGas = true;
        break;
      }
    }
    if (inGas) {
      const prevQuarter = Math.floor(gasExposure / (GAS_KILL_THRESHOLD * 0.25));
      gasExposure += 0.2;
      const newQuarter = Math.floor(gasExposure / (GAS_KILL_THRESHOLD * 0.25));
      if (newQuarter > prevQuarter && newQuarter >= 1 && newQuarter <= 3) {
        playCough();
        shakeTimer = 6 + newQuarter * 2;
        player.knockbackTimer = 15;
        // Double cough at 75%
        if (newQuarter === 3) {
          setTimeout(() => { try { playCough(); } catch(e) {} }, 200);
        }
        // Knockback — stumble in a random direction, stronger at higher exposure
        const knockDir = Math.random() < 0.5 ? -1 : 1;
        player.x += knockDir * (10 + newQuarter * 6);
        player.x = Math.max(10, Math.min(W - player.w - 10, player.x));
        player.vy = -4;
        player.grounded = false;
        spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#88cc44', 6, 3);
      }
      if (gasExposure >= GAS_KILL_THRESHOLD) {
        die();
        return;
      }
    } else {
      // Recover when outside gas (but slowly)
      gasExposure = Math.max(0, gasExposure - 2);
    }
    } // end if !summitJumping

    // ── Camera update — driven by progress bar ──
    // Progress through the vertical section: 0 at transition start, 1 at level end
    const verticalProgress = Math.min(1, (levelTimer / levelDuration - CLIFF_TRANSITION_PROGRESS) / (1 - CLIFF_TRANSITION_PROGRESS));
    // Target scroll based on progress bar — smoothly scroll to summit
    const progressTargetScroll = -CLIMB_TOTAL_HEIGHT * verticalProgress;

    // Also follow player if they're above the progress target (jumped ahead)
    playerWorldY = (player.y + player.h) - (H - CLIMB_GROUND_Y) + scrollOffsetY;
    const playerTargetScroll = Math.min(0, playerWorldY + H * 0.4);

    // Use whichever is higher (more scrolled up)
    const targetScrollY = Math.min(progressTargetScroll, playerTargetScroll);

    const prevScrollY = scrollOffsetY;
    // Smooth lerp toward target
    scrollOffsetY += (targetScrollY - scrollOffsetY) * 0.08;
    if (scrollOffsetY > 0) scrollOffsetY = 0;

    // Shift player and birds by camera delta so they stay at their relative height
    const scrollDelta = scrollOffsetY - prevScrollY;
    player.y -= scrollDelta;
    // Regular birds stay at fixed world height (scroll with camera)
    // Eagles don't — they swoop at angles independent of camera
    for (const b of climbBirds) {
      if (!b.isEagle) {
        b.y -= scrollDelta;
        b.baseY -= scrollDelta;
      }
    }

    // Update climb birds (fly across, knockback only)
    updateClimbBirds();
  } else {
    const playerGroundY = getGroundY(player.x + scrollOffset);
    if (player.y + player.h >= playerGroundY) {
      player.y = playerGroundY - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumping = false;
      player.doubleJumped = false;
    }
  }

  // Run animation
  if (player.grounded && (moveX !== 0 || true)) {
    player.runTimer++;
    if (player.runTimer > 5) {
      player.runFrame = (player.runFrame + 1) % 4;
      player.runTimer = 0;
    }
  }

  // Trail
  player.trail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, life: 12 });
  if (player.trail.length > 15) player.trail.shift();
  player.trail.forEach(t => t.life--);

  // Update lava drops (world coords)
  for (let i = lavaDrops.length - 1; i >= 0; i--) {
    const d = lavaDrops[i];
    d.vy += 0.15;
    d.y += d.vy;
    const screenX = d.worldX - scrollOffset;

    // Hit ground
    const dropGroundY = getGroundY(d.worldX);
    if (d.y >= dropGroundY - 4) {
      spawnParticles(screenX, dropGroundY, '#ff4400', 8, 4);
      spawnParticles(screenX, dropGroundY, '#ffaa00', 5, 3);
      spawnLavaPool(d.worldX);
      playLavaHit();
      lavaDrops.splice(i, 1);
      shakeTimer = 4;
      continue;
    }

    // Hit player while falling (compare in screen space)
    if (
      screenX > player.x && screenX < player.x + player.w &&
      d.y + d.size > player.y && d.y < player.y + player.h
    ) {
      die();
      return;
    }

    // Remove if scrolled way off screen
    if (screenX < -100 || screenX > W + 100) {
      lavaDrops.splice(i, 1);
    }
  }

  // Update lava pools (world coords)
  for (let i = lavaPools.length - 1; i >= 0; i--) {
    const p = lavaPools[i];
    p.life--;
    const screenX = p.worldX - scrollOffset;

    // Remove if expired or scrolled off left
    if (p.life <= 0 || screenX + p.w < -200) {
      lavaPools.splice(i, 1);
      continue;
    }

    // Player collision with pool (only when grounded or falling into it)
    if (player.grounded || player.vy > 0) {
      const px = player.x + player.w / 2;
      const py = player.y + player.h;
      const poolGroundY = getGroundY(p.worldX);
      if (px > screenX - p.w / 2 + 6 && px < screenX + p.w / 2 - 6 && py >= poolGroundY - 8) {
        die();
        return;
      }
    }
  }

  // Lava crack collision (level 2-2) — only pool-type cracks kill
  if (level === 5) {
    const px = player.x + player.w / 2;
    const py = player.y + player.h;
    for (const pit of lavaPits) {
      if (!pit.isPool) continue; // narrow cracks are visual only
      const pitSX = pit.worldX - scrollOffset;
      const pitGY = getGroundY(pit.worldX);
      if (px > pitSX + 6 && px < pitSX + pit.w - 6 && py >= pitGY - 6 && (player.grounded || player.vy > 0)) {
        die();
        return;
      }
    }
  }

  // Lava-tree contact detection
  if (isVolcanoLevel()) {
    for (const t of trees) {
      if (t.burning || t.collapsed) continue;
      const tsx = t.worldX - scrollOffset;
      const baseY = getGroundY(t.worldX);
      const treeTop = baseY - t.height - t.canopyH;
      // Check lava drops
      for (const d of lavaDrops) {
        const dsx = d.worldX - scrollOffset;
        if (Math.abs(dsx - tsx) < t.canopyW / 2 + 10 && d.y >= treeTop && d.y <= baseY) {
          t.burning = true;
          playTreeBurn();
          break;
        }
      }
      // Check lava pools under the tree
      if (!t.burning) {
        for (const p of lavaPools) {
          const psx = p.worldX - scrollOffset;
          if (Math.abs(psx - tsx) < (p.w / 2 + t.trunkW / 2)) {
            t.burning = true;
            playTreeBurn();
            break;
          }
        }
      }
    }
  }

  // Burn timer update (level 4)
  if (isVolcanoLevel()) {
    for (const t of trees) {
      if (t.burning && !t.collapsed) {
        t.burnTimer++;
        if (t.burnTimer >= 210) {
          t.collapsed = true;
          playTreeCollapse();
          // Ember particles
          const tsx = t.worldX - scrollOffset;
          const baseY = getGroundY(t.worldX);
          for (let i = 0; i < 8; i++) {
            particles.push({
              x: tsx + (Math.random() - 0.5) * t.canopyW,
              y: baseY - t.height - Math.random() * t.canopyH,
              vx: (Math.random() - 0.5) * 2,
              vy: -1 - Math.random() * 2,
              life: 60 + Math.random() * 40,
              maxLife: 100,
              color: `rgb(255, ${100 + Math.random() * 100 | 0}, 0)`
            });
          }
        }
      }
    }
  }

  // Rolling rocks (volcano horizontal only)
  // Spawn new rocks only before cliff transition
  if (isVolcanoLevel() && !verticalMode && !(level === 6 && cliffTransition > 0)) {
    const progress = levelTimer / levelDuration;
    let rockRate;
    if (level === 6) {
      // Level 2-3: rocks from random directions, moderate rate
      if (progress < 0.33) rockRate = 160;
      else if (progress < 0.5) rockRate = 120;
      else rockRate = 180;
    } else if (level === 5) {
      // Level 2-2: moderate early, taper off in 2nd half
      if (progress < 0.33) rockRate = 200;
      else if (progress < 0.5) rockRate = 150;
      else if (progress < 0.75) rockRate = 250;
      else rockRate = 400;
    } else {
      // Level 2-1: similar taper in 2nd half
      if (progress < 0.33) rockRate = 200;
      else if (progress < 0.5) rockRate = 140;
      else if (progress < 0.75) rockRate = 220;
      else rockRate = 300;
    }
    if (levelTimer % rockRate === 0) {
      if (level === 6) {
        // 2-3: rocks from BOTH directions randomly
        const fromLeft = Math.random() < 0.4;
        const sizeRoll = Math.random();
        let size, radius, speed;
        if (sizeRoll < 0.55) {
          size = 'medium'; radius = 22; speed = 1.8 + Math.random() * 0.8;
        } else {
          size = 'large'; radius = 35; speed = 1.2 + Math.random() * 0.6;
        }
        const knockback = { medium: 50, large: 80 };
        const spawnX = fromLeft ? scrollOffset - 50 : scrollOffset + W + 50;
        rocks.push({
          worldX: spawnX,
          originX: spawnX,
          radius: radius,
          speed: fromLeft ? -speed : speed, // negative = rolls right (from left)
          size: size,
          knockback: knockback[size],
          rotation: 0,
          rotationSpeed: fromLeft ? (0.018 + Math.random() * 0.012) : -(0.018 + Math.random() * 0.012),
          vy: -(3.5 + Math.random() * 3),
          bounceY: 0,
          bounceDamping: 0.55 + Math.random() * 0.2,
          fromLeft: fromLeft
        });
      } else {
        spawnRock();
      }
    }
  }
  // Update existing rolling rocks (let them finish rolling during transition)
  if (isVolcanoLevel() && !verticalMode) {
    for (let i = rocks.length - 1; i >= 0; i--) {
      const r = rocks[i];
      r.worldX -= r.speed;
      r.rotation += r.rotationSpeed;
      // Bounce physics
      r.vy += 0.3;
      r.bounceY += r.vy;
      if (r.bounceY >= 0) {
        r.bounceY = 0;
        if (Math.abs(r.vy) > 0.8) {
          r.vy = -Math.abs(r.vy) * r.bounceDamping;
          playRockBounce(r.size);
        } else {
          r.vy = 0;
        }
      }
      // Remove if off screen (either side)
      if (r.worldX < scrollOffset - 100 || r.worldX > scrollOffset + W + 100) {
        rocks.splice(i, 1);
        continue;
      }
      // Player collision — knockback only, no kill, no invincibility
      if (!r.hitCooldown) {
        const sx = r.worldX - scrollOffset;
        const cy = getGroundY(r.worldX) - r.radius + (r.bounceY || 0);
        const px = player.x + player.w / 2;
        const py = player.y + player.h / 2;
        const dx = px - sx;
        const dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < r.radius + player.w / 3) {
          // Knockback direction depends on which side the rock comes from
          const knockDir = r.fromLeft ? 1 : -1; // push away from rock's origin
          player.x += knockDir * r.knockback;
          if (player.x < 0) player.x = 0;
          if (player.x > W - player.w) player.x = W - player.w;
          r.hitCooldown = 15; // prevent same rock multi-hitting
          shakeTimer = 8;
          player.knockbackTimer = 20;
          spawnParticles(sx, cy, '#8b7355', 8, 4);
          playRockHit();
        }
      } else {
        r.hitCooldown--;
      }
    }
  }

  // Molten rocks (volcano horizontal only)
  // Spawn new molten rocks only before cliff transition
  if (isVolcanoLevel() && !verticalMode && !(level === 6 && cliffTransition > 0)) {
    const progress = levelTimer / levelDuration;
    let moltenSpawn = false;
    if (level === 5) {
      // Level 2-2: molten rocks from the start, taper in 2nd half
      let moltenRate;
      if (progress < 0.33) moltenRate = 200;
      else if (progress < 0.5) moltenRate = 150;
      else if (progress < 0.75) moltenRate = 280;
      else moltenRate = 400;
      moltenSpawn = (levelTimer + 50) % moltenRate === 0;
    } else {
      // Level 2-1: molten rocks only in 2nd half, taper near end
      if (progress >= 0.5) {
        let moltenRate;
        if (progress < 0.75) moltenRate = 200;
        else moltenRate = 300;
        moltenSpawn = (levelTimer + 50) % moltenRate === 0;
      }
    }
    if (moltenSpawn) spawnMoltenRock();
  }
  // Update existing molten rocks (let them finish rolling during transition)
  if (isVolcanoLevel() && !verticalMode) {
    // Periodic sizzle SFX for molten rocks
    if (moltenRocks.length > 0 && frameCount % 30 === 0) {
      playMoltenSizzle();
    }

    for (let i = moltenRocks.length - 1; i >= 0; i--) {
      const mr = moltenRocks[i];
      mr.worldX -= mr.speed;
      mr.rotation += mr.rotationSpeed;
      mr.glowPhase += 0.1;
      // Remove if off screen left
      if (mr.worldX < scrollOffset - 100) {
        moltenRocks.splice(i, 1);
        continue;
      }
      // No lava trail — molten rocks roll clean
      if (false) {
        spawnLavaPool(mr.worldX, true);
      }
      // Player collision — INSTANT KILL
      const sx = mr.worldX - scrollOffset;
      const cy = getGroundY(mr.worldX) - mr.radius;
      const px = player.x + player.w / 2;
      const py = player.y + player.h / 2;
      const dx = px - sx;
      const dy = py - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < mr.radius + player.w / 3) {
        die();
        return;
      }
    }
  }

  // Update warning markers (world coords)
  for (let i = warningMarkers.length - 1; i >= 0; i--) {
    warningMarkers[i].life--;
    if (warningMarkers[i].life <= 0) warningMarkers.splice(i, 1);
  }

  // Update particles (screen space, also drift left with scroll)
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx - RUN_SPEED; // drift with world scroll
    p.y += p.vy;
    p.vy += 0.12;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update neon sign blinking
  for (let si = 0; si < neonSigns.length; si++) neonSigns[si].blink += neonSigns[si].blinkSpeed;

  // Spawn emergency vehicles (no vehicles in level 4 — destroyed wasteland):
  if (!isVolcanoLevel()) {
    // 0) Level 1: school bus right away — sets the tone
    // 1) School bus at exactly 1/3 mark
    // 2) Regular vehicle shortly after
    // 3) More frequent random spawns in second half, biased from right
    if (level === 1 && levelTimer === 60) {
      spawnVehicle('schoolbus');
    }
    // Guaranteed ladder truck early in level 2
    if (level === 2 && levelTimer === 90) {
      spawnVehicle('firetruck', true);
    }
    const thirdMark = Math.floor(levelDuration / 3);
    if (levelTimer === thirdMark) {
      spawnVehicle('schoolbus');
    }
    if (levelTimer === thirdMark + 60) {
      spawnVehicle(); // follow-up emergency vehicle
    }
    if (levelTimer > levelDuration / 2 && villageProgress < 0.3 && Math.random() < 0.006 + level * 0.0015) {
      spawnVehicle();
    }
  }

  // Update vehicles + siren audio
  let closestVehicleDist = Infinity;
  for (let i = vehicles.length - 1; i >= 0; i--) {
    const v = vehicles[i];
    v.x += v.speed * v.dir;
    v.sirenPhase += 0.15;
    // Track closest vehicle for siren volume
    const vcx = v.x + v.w / 2;
    const dist = Math.abs(vcx - (player.x + player.w / 2));
    if (dist < closestVehicleDist) closestVehicleDist = dist;

    // Collision with player
    if (
      player.x + player.w > v.x + 10 &&
      player.x < v.x + v.w - 10 &&
      player.y + player.h > v.y + 4 &&
      player.y + player.h < v.y + v.h + 10 &&
      player.grounded
    ) {
      die();
      return;
    }

    // Check if lava drop hits vehicle → EXPLODE
    for (let j = lavaDrops.length - 1; j >= 0; j--) {
      const d = lavaDrops[j];
      const dsx = d.worldX - scrollOffset;
      if (
        dsx > v.x && dsx < v.x + v.w &&
        d.y > v.y - 5 && d.y < v.y + v.h
      ) {
        // Explosion + break apart!
        const ecx = v.x + v.w / 2;
        const ecy = v.y + v.h / 2;
        const expSize = v.type === 'schoolbus' ? 90 : 70;
        spawnExplosion(ecx, ecy, expSize);
        spawnVehicleDebris(ecx, ecy, v.w, v.h, v.type);
        spawnParticles(ecx, ecy, '#ff6600', 30, 10);
        spawnParticles(ecx, ecy, '#ffcc00', 20, 8);
        spawnParticles(ecx, ecy, '#ff2200', 15, 12);
        spawnParticles(ecx, ecy, '#333333', 12, 6);
        // Leave a lava pool where the vehicle was
        spawnLavaPool(v.x + v.w / 2 + scrollOffset);
        shakeTimer = 25;
        flashTimer = 14;
        if (!konamiUsed) score += 200; // bonus for lava-vehicle explosion
        lavaDrops.splice(j, 1);
        vehicles.splice(i, 1);
        i--; // adjust index since we removed vehicle
        break;
      }
    }
    if (i < 0) continue;

    // Check if vehicle drives into a lava pool → EXPLODE
    for (let j = lavaPools.length - 1; j >= 0; j--) {
      const p = lavaPools[j];
      const psx = p.worldX - scrollOffset;
      const vcx = v.x + v.w / 2;
      if (vcx > psx - p.w / 2 + 5 && vcx < psx + p.w / 2 - 5) {
        const ecx = v.x + v.w / 2;
        const ecy = v.y + v.h / 2;
        const expSize = v.type === 'schoolbus' ? 90 : 70;
        spawnExplosion(ecx, ecy, expSize);
        spawnVehicleDebris(ecx, ecy, v.w, v.h, v.type);
        spawnParticles(ecx, ecy, '#ff6600', 30, 10);
        spawnParticles(ecx, ecy, '#ffcc00', 20, 8);
        spawnParticles(ecx, ecy, '#ff2200', 15, 12);
        spawnParticles(ecx, ecy, '#333333', 12, 6);
        shakeTimer = 22;
        flashTimer = 12;
        if (!konamiUsed) score += 150;
        vehicles.splice(i, 1);
        i--;
        break;
      }
    }
    if (i < 0) continue;

    // Remove if far off screen (wider threshold since they spawn further out)
    if ((v.dir === -1 && v.x < -500) || (v.dir === 1 && v.x > W + 500)) {
      vehicles.splice(i, 1);
    }
  }

  // Siren audio — audible from far off, gets louder as vehicles approach
  const sirenRange = W + 400; // hear siren well before vehicle is visible
  let hasEmergency = false;
  let hasBus = false;
  let closestBusDist = Infinity;
  let closestEmergencyDist = Infinity;
  let hasPolice = false;
  let closestPoliceDist = Infinity;
  for (const v of vehicles) {
    const vdist = Math.abs((v.x + v.w / 2) - (player.x + player.w / 2));
    if (v.type === 'schoolbus') {
      hasBus = true;
      if (vdist < closestBusDist) closestBusDist = vdist;
    } else if (v.type === 'police') {
      hasPolice = true;
      if (vdist < closestPoliceDist) closestPoliceDist = vdist;
    } else {
      hasEmergency = true;
      if (vdist < closestEmergencyDist) closestEmergencyDist = vdist;
    }
  }
  if (hasEmergency && closestEmergencyDist < sirenRange) {
    startSiren();
    const vol = Math.max(0, 1 - closestEmergencyDist / sirenRange) * 0.3;
    updateSiren(vol);
  } else {
    stopSiren();
  }
  if (hasPolice && closestPoliceDist < sirenRange) {
    startPoliceSiren();
    const vol = Math.max(0, 1 - closestPoliceDist / sirenRange) * 0.35;
    updatePoliceSiren(vol);
  } else {
    stopPoliceSiren();
  }
  if (hasBus && closestBusDist < sirenRange) {
    startBusScream();
    const vol = Math.max(0, 1 - closestBusDist / sirenRange) * 0.55;
    updateBusScream(vol);
  } else {
    stopBusScream();
  }

  // Flickering lamp buzz — louder when near a flickering lamp
  let buzzVol = 0;
  for (const lamp of streetLamps) {
    if (!lamp.flickering) continue;
    const lsx = lamp.worldX - scrollOffset;
    const dist = Math.abs(lsx - (player.x + player.w / 2));
    if (dist < 150) {
      // Check if lamp is currently in "off" state (flickering low)
      const raw = Math.sin(frameCount * 0.15 + lamp.flickerPhase) +
                  Math.sin(frameCount * 0.37 + lamp.flickerPhase * 2.1) +
                  Math.sin(frameCount * 0.07 + lamp.flickerPhase * 0.5);
      if (raw <= 0.3) { // lamp is dim or off — buzz is louder
        buzzVol = Math.max(buzzVol, (1 - dist / 150) * 0.03);
      } else {
        buzzVol = Math.max(buzzVol, (1 - dist / 150) * 0.008);
      }
    }
  }
  if (buzzVol > 0.001) {
    startBuzz();
    updateBuzz(buzzVol);
  } else {
    stopBuzz();
  }

  updateExplosions();
  updateVehicleDebris();
  if (shakeTimer > 0) shakeTimer--;
  if (flashTimer > 0) flashTimer--;
}

// Death animation state
let deathAnimX = 0, deathAnimY = 0;
let deathAnimVY = 0, deathAnimSpin = 0;
let deathAnimActive = false;

function die() {
  if (player.invincible > 0) return; // invincibility frames active
  player.crouching = false;
  player.h = SPRITE_H;
  lives--;
  player.alive = false;
  stopSiren();
  stopPoliceSiren();
  stopBusScream();
  stopBuzz();
  playDeathSound();
  if (score > highScore) highScore = score;
  shakeTimer = 0; // no shake on death
  flashTimer = 15;

  // Launch death animation — sprite flies up spinning then falls
  deathAnimX = player.x + player.w / 2;
  deathAnimY = player.y + player.h / 2;
  deathAnimVY = -12; // launch upward
  deathAnimSpin = 0;
  deathAnimActive = true;

  // Big particle burst
  spawnParticles(deathAnimX, deathAnimY, '#ff4400', 30, 9);
  spawnParticles(deathAnimX, deathAnimY, '#ffcc00', 20, 7);
  spawnParticles(deathAnimX, deathAnimY, '#44ccff', 15, 8);
  spawnParticles(deathAnimX, deathAnimY, '#ffffff', 8, 4);

  if (lives <= 0) {
    // True game over — show scrolling legend
    gameState = 'gameover';
    gameOverScrollDone = false;
    getCurrentMusic().pause();
    gameOverMusic.currentTime = 0;
    gameOverMusic.play().catch(() => {});
  } else {
    // Still have lives — brief death, then respawn
    gameState = 'dead';
    getCurrentMusic().volume = 0.25 * (muted ? 0 : masterVolume); // dim music during death
  }
}

function drawSfxScreen() {

  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6600';
  ctx.font = `bold 20px ${GAME_FONT}`;
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 20;
  ctx.fillText('SFX PREVIEW', W / 2, 45);
  ctx.shadowBlur = 0;

  // "Now playing" banner — shows name of selected SFX
  const currentName = SFX_LIST[sfxSelectedIndex].name;
  if (sfxPlayingTimer > 0) {
    // Pulsing glow when actively playing
    const pulse = Math.sin(sfxPlayingTimer * 0.3) * 0.3 + 0.7;

    ctx.fillStyle = '#ff4400';

  } else {

  // Subtitle controls
  ctx.fillStyle = '#556677';
  ctx.font = `8px ${GAME_FONT}`;
  ctx.fillText('↑↓ Select  ·  SPACE Play  ·  ESC Exit', W / 2, 95);

  // List of SFX
  const startY = 115;
  const rowH = 26;
