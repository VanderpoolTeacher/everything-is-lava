function drawMenu() {
  // Dissolve factor: 0 during pause, ramps to 1 slowly as scroll starts
  const dissolve = menuScrollY <= 0 ? 0 : Math.min(1, menuScrollY / 250);

  // Draw the city background — fades to black as legend scrolls
  // Always start with the solid dark base to prevent flicker
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  if (dissolve < 1) {
    ctx.globalAlpha = 1 - dissolve;
    drawNeoTokyoSky();
    drawBuildingLayer(buildings_far, 0.05, 0);
    drawBuildingLayer(buildings_mid, 0.15, 0.3);
    drawNeonSigns();
    drawBuildingLayer(buildings_near, 0.3, 0.1);
    drawStreet();
    // Darken overlay on top of city
    ctx.globalAlpha = 1;
    ctx.fillStyle = `rgba(0,0,0,${0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.textAlign = 'center';

  // Title image/text — fades out as dissolve increases
  const titleAlpha = Math.max(0, 1 - dissolve * 1.2);
  if (titleAlpha > 0.01) {
    ctx.globalAlpha = titleAlpha;
    // Slow zoom: grows ~12% over the title display duration
    const zoomTime = menuScrollY + 480; // 0 at menu start, increases over time
    const titleScale = 1 + Math.min(0.12, Math.max(0, zoomTime) * 0.00015);
    if (titleReady) {
      const maxW = W * 0.85;
      const aspect = titleImg.height / titleImg.width;
      const baseW = Math.min(maxW, titleImg.width);
      const baseH = baseW * aspect;
      const drawW = baseW * titleScale;
      const drawH = baseH * titleScale;
      const titleX = (W - drawW) / 2;
      const titleY = H / 2 - drawH / 2 - 40;
      ctx.drawImage(titleImg, titleX, titleY, drawW, drawH);
    } else {
      ctx.save();
      ctx.translate(W / 2, H / 2 - 35);
      ctx.scale(titleScale, titleScale);
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#ff6600';
      ctx.font = `bold 36px ${GAME_FONT}`;
      ctx.fillText('EVERYTHING', 0, -30);
      ctx.fillStyle = '#ffcc00';
      ctx.font = `bold 42px ${GAME_FONT}`;
      ctx.fillText('IS LAVA', 0, 30);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    const pulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = titleAlpha * pulse;
    ctx.fillStyle = '#ffaa66';
    ctx.font = `16px ${GAME_FONT}`;
    ctx.fillText(titleMusicUnlocked ? 'Press SPACE to start' : 'Press any key', W / 2, H - 50);
    ctx.globalAlpha = titleAlpha;
    ctx.fillStyle = '#667788';
    ctx.font = `10px ${GAME_FONT}`;
    ctx.fillText('A/D  ·  Space  ·  Double jump  ·  Dodge the lava!', W / 2, H - 25);
    ctx.fillStyle = '#556677';
    ctx.font = `9px ${GAME_FONT}`;
    ctx.fillText('Type GGD to enter the Dojo  ·  Type OG for the original  ·  Type SFX', W / 2, H - 10);
    ctx.globalAlpha = 1;
  }

  // ── Scrolling legend crawl ──
  // Only draw when scroll has started (menuScrollY > 0)
  if (menuScrollY > 0) {
    // Use pre-computed legend arrays (hoisted to module scope)

    // Scroll zone — smoothly expands as title fades
    const scrollZoneTopStart = H / 2 + 100;
    const scrollZoneTopEnd = 30;
    const scrollZoneTop = scrollZoneTopStart + (scrollZoneTopEnd - scrollZoneTopStart) * dissolve;
    const scrollZoneH = H - scrollZoneTop - 10;
    const fadeH = 35;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, scrollZoneTop, W, scrollZoneH);
    ctx.clip();

    let yPos = scrollZoneTop + scrollZoneH - menuScrollY;
    // Loop the scroll
    if (yPos + MENU_LEGEND_TOTAL_H < scrollZoneTop) {
      menuScrollY = -60; // brief pause before repeating
      yPos = scrollZoneTop + scrollZoneH;
    }

    ctx.textAlign = 'center';
    for (let li = 0; li < MENU_LEGEND_LINES.length; li++) {
      const line = MENU_LEGEND_LINES[li];
      yPos += line.size + MENU_LEGEND_LINE_GAP * 0.5;
      if (yPos < scrollZoneTop - 20 || yPos > scrollZoneTop + scrollZoneH + 20) continue;
      if (!line.text) continue;

      let alpha = 0.8;
      const distFromBottom = (scrollZoneTop + scrollZoneH) - yPos;
      if (distFromBottom < fadeH) alpha *= distFromBottom / fadeH;
      alpha = Math.max(0, Math.min(0.8, alpha));

      ctx.globalAlpha = alpha;
      ctx.fillStyle = line.color;
      ctx.font = MENU_LEGEND_FONTS[li];
      ctx.fillText(line.text, W / 2, yPos);
    }

    ctx.globalAlpha = 1;
    ctx.restore();

  }
}

function storyLineHeight(l) {
  if (l.text === '__IMAGE__') return STORY_IMG_SIZE + 20;
  if (l.text === '__GGD__') return STORY_GGD_SIZE + 20;
  if (l.text === '__SCORE__') return STORY_SCORE_H;
  if (l.text === '__BREAK__') return STORY_BREAK_H;
  return STORY_LINE_H;
}

function drawStoryScroll() {
  // Black background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Scroll zone with edge fade
  const scrollZoneTop = 40;
  const scrollZoneBot = H - 40;
  const fadeZone = 40; // pixels over which text fades at edges

  // Compute where each line sits — all content scrolls together
  let drawY = H + 60 - storyScrollY * STORY_LINE_H;

  // Check if scroll should stop ("EVERYTHING IS LAVA" + credits centered on screen)
  // Find the "EVERYTHING IS LAVA" line position
  let eilY = drawY;
  for (let i = 0; i < STORY_LINES.length; i++) {
    if (STORY_LINES[i].text === 'EVERYTHING IS LAVA') break;
    eilY += storyLineHeight(STORY_LINES[i]);
  }
  // Block from "EVERYTHING IS LAVA" through "March 2026" is ~5 lines (140px)
  // Center that block on screen
  const creditsBlockH = STORY_LINE_H * 5;
  if (eilY + creditsBlockH / 2 < H / 2) {
    storyScrollDone = true;
  }

  // Draw all lines
  for (let i = 0; i < STORY_LINES.length; i++) {
    const l = STORY_LINES[i];
    const lineH = storyLineHeight(l);

    // __BREAK__ — just advance position, draw nothing
    if (l.text === '__BREAK__') {
      drawY += lineH;
      continue;
    }

    // __IMAGE__ — emerald figure, scrolls with text
    if (l.text === '__IMAGE__') {
      if (emeraldReady) {
        const imgX = W / 2 - STORY_IMG_SIZE / 2;
        const imgMid = drawY + STORY_IMG_SIZE / 2;
        if (imgMid > scrollZoneTop - STORY_IMG_SIZE && imgMid < scrollZoneBot + STORY_IMG_SIZE) {
          const fadeTop = Math.min(1, (imgMid - scrollZoneTop) / fadeZone);
          const fadeBot = Math.min(1, (scrollZoneBot - imgMid) / fadeZone);
          ctx.globalAlpha = Math.max(0, Math.min(fadeTop, fadeBot));
          ctx.drawImage(emeraldImg, imgX, drawY, STORY_IMG_SIZE, STORY_IMG_SIZE);
        }
      }
      drawY += lineH;
      continue;
    }

    // __GGD__ — ggd sprite, scrolls with text
    if (l.text === '__GGD__') {
      if (ggdReady) {
        const imgX = W / 2 - STORY_GGD_SIZE / 2;
        const imgMid = drawY + STORY_GGD_SIZE / 2;
        if (imgMid > scrollZoneTop - STORY_GGD_SIZE && imgMid < scrollZoneBot + STORY_GGD_SIZE) {
          const fadeTop = Math.min(1, (imgMid - scrollZoneTop) / fadeZone);
          const fadeBot = Math.min(1, (scrollZoneBot - imgMid) / fadeZone);
          ctx.globalAlpha = Math.max(0, Math.min(fadeTop, fadeBot));
          ctx.drawImage(ggdImg, imgX, drawY, STORY_GGD_SIZE, STORY_GGD_SIZE);
        }
      }
      drawY += lineH;
      continue;
    }

    // __SCORE__ — score block
    if (l.text === '__SCORE__') {
      const blockTop = drawY;
      const blockMid = blockTop + STORY_SCORE_H / 2;
      drawY += lineH;
      if (blockMid < scrollZoneTop - 20 || blockMid > scrollZoneBot + 20) continue;
      const fadeTop = Math.min(1, (blockMid - scrollZoneTop) / fadeZone);
      const fadeBot = Math.min(1, (scrollZoneBot - blockMid) / fadeZone);
      const blockAlpha = Math.max(0, Math.min(fadeTop, fadeBot));
      if (blockAlpha <= 0) continue;
      ctx.globalAlpha = blockAlpha;
      // Compute life bonus (same formula as level complete)
      const lifeBonus = konamiUsed ? 0 : (lives >= MAX_LIVES ? 10000 : lives * 1000);
      const baseScore = score - lifeBonus;
      // Line 1: SCORE
      ctx.fillStyle = '#ffcc88';
      ctx.font = 'bold 14px ' + GAME_FONT;
      ctx.fillText('SCORE: ' + (konamiUsed ? 0 : baseScore).toLocaleString(), W / 2, blockTop + 10);
      // Line 2: Lives remaining
      ctx.fillStyle = '#aaddff';
      ctx.font = '12px ' + GAME_FONT;
      ctx.fillText(lives + (lives === 1 ? ' life' : ' lives') + ' remaining', W / 2, blockTop + 36);
      // Line 3: Life bonus
      ctx.fillStyle = lives >= MAX_LIVES ? '#ffcc00' : '#88ddff';
      ctx.font = 'bold 12px ' + GAME_FONT;
      ctx.fillText('LIFE BONUS: +' + lifeBonus.toLocaleString(), W / 2, blockTop + 58);
      // Line 4: Total score (larger, gold)
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 18px ' + GAME_FONT;
      ctx.fillText('TOTAL: ' + score.toLocaleString(), W / 2, blockTop + 88);
      continue;
    }

    // Regular text line
    drawY += lineH;
    if (drawY < scrollZoneTop - 20 || drawY > scrollZoneBot + 20) continue;

    // Fade at edges
    const fadeTop = Math.min(1, (drawY - scrollZoneTop) / fadeZone);
    const fadeBot = Math.min(1, (scrollZoneBot - drawY) / fadeZone);
    const lineAlpha = Math.max(0, Math.min(fadeTop, fadeBot));
    if (lineAlpha <= 0) continue;

    ctx.globalAlpha = lineAlpha;
    ctx.fillStyle = l.color || '#ffffff';
    ctx.font = `${l.bold ? 'bold ' : ''}${l.size}px ${GAME_FONT}`;
    ctx.fillText(l.text, W / 2, drawY);
  }

  ctx.globalAlpha = 1;

  // Edge vignettes (top and bottom fade to black)
  const vigGrad = ctx.createLinearGradient(0, 0, 0, scrollZoneTop + 20);
  vigGrad.addColorStop(0, 'rgba(0,0,0,1)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, W, scrollZoneTop + 20);
  const vigBot = ctx.createLinearGradient(0, scrollZoneBot - 20, 0, H);
  vigBot.addColorStop(0, 'rgba(0,0,0,0)');
  vigBot.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = vigBot;
  ctx.fillRect(0, scrollZoneBot - 20, W, H - scrollZoneBot + 20);

  // "Press SPACE" prompt once scroll is done
  if (storyScrollDone) {
    const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffaa66';
    ctx.font = FONT_12;
    ctx.textAlign = 'center';
    ctx.fillText('Press SPACE to continue', W / 2, H - 18);
    ctx.globalAlpha = 1;
  }
}

function drawRespawnScreen() {
  const t = deathTimer;

  // ── Death sprite animation (flies up spinning, then falls off screen) ──
  if (deathAnimActive && spriteReady) {
    deathAnimVY += 0.4; // gravity
    deathAnimY += deathAnimVY;
    deathAnimSpin += 0.25;

    // Spawn trailing particles while falling
    if (t % 3 === 0) {
      spawnParticles(deathAnimX, deathAnimY, '#ff6600', 2, 3);
    }

    if (deathAnimY < H + 100) {
      const fadeOut = deathAnimY > H - 50 ? Math.max(0, 1 - (deathAnimY - (H - 50)) / 100) : 1;
      ctx.save();
      ctx.globalAlpha = fadeOut;
      ctx.translate(deathAnimX, deathAnimY);
      ctx.rotate(deathAnimSpin);
      ctx.drawImage(ninjaSprite, -SPRITE_W / 2, -SPRITE_H / 2, SPRITE_W, SPRITE_H);
      ctx.restore();
      ctx.globalAlpha = 1;
    } else {
      deathAnimActive = false;
    }
  }

  // Darken background
  const bgAlpha = Math.min(0.5, t * 0.015);
  ctx.fillStyle = `rgba(0,0,0,${bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  if (t > 20) {
    const textAlpha = Math.min(1, (t - 20) / 20);
    ctx.globalAlpha = textAlpha;
    ctx.textAlign = 'center';

    // "GET GOOD!" text
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff4400';
    ctx.font = `bold 28px ${GAME_FONT}`;
    ctx.fillText('GET GOOD!', W / 2, H / 2 - 50);
    ctx.shadowBlur = 0;

    // Lives remaining — character icons
    const iconSize = 28;
    const iconGap = 6;
    const totalW = lives * (iconSize + iconGap) - iconGap;
    const startX = W / 2 - totalW / 2;

    ctx.fillStyle = '#ccbbaa';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillText('LIVES REMAINING', W / 2, H / 2 - 10);

    if (lives > MAX_LIVES) {
      const iy = H / 2 + 5;
      const singleW = iconSize + 40;
      const sx = W / 2 - singleW / 2;
      if (spriteReady) {
        ctx.drawImage(ninjaSprite, sx, iy, iconSize, iconSize);
      } else {
        ctx.fillStyle = '#3399dd';
        ctx.fillRect(sx, iy, iconSize, iconSize);
      }
      ctx.font = `bold 22px ${GAME_FONT}`;
      ctx.fillStyle = '#ffcc00';
      ctx.textAlign = 'left';
      ctx.fillText('x' + lives, sx + iconSize + 6, iy + 22);
      ctx.textAlign = 'center';
    } else {
      for (let i = 0; i < lives; i++) {
        const ix = startX + i * (iconSize + iconGap);
        const iy = H / 2 + 5;
        if (spriteReady) {
          ctx.drawImage(ninjaSprite, ix, iy, iconSize, iconSize);
        } else {
          ctx.fillStyle = '#3399dd';
          ctx.fillRect(ix, iy, iconSize, iconSize);
        }
      }
    }

    ctx.globalAlpha = 1;
  }

  // Respawn prompt after delay
  if (t >= DEATH_RESTART_DELAY) {
    const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffaa66';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillText('Press SPACE or TAP to continue', W / 2, H / 2 + 60);
    ctx.globalAlpha = 1;
  }
}

function drawDeathScreen() {
  const P = 4;
  const t = deathTimer; // frames since death

  // Darken background gradually
  const bgAlpha = Math.min(0.7, t * 0.01);
  ctx.fillStyle = `rgba(0,0,0,${bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // ── LAVA POOL (center of screen, 32-bit style) ──
  const poolCX = W / 2;
  const poolY = H / 2 + 40;
  const poolW = 160;
  const poolH = P * 4;
  const poolLX = poolCX - poolW / 2;

  // Pool glow
  ctx.globalAlpha = 0.2;
  const glow = ctx.createRadialGradient(poolCX, poolY, 10, poolCX, poolY, poolW * 0.8);
  glow.addColorStop(0, 'rgba(255, 80, 0, 0.4)');
  glow.addColorStop(1, 'rgba(255, 40, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(poolCX - poolW, poolY - 30, poolW * 2, 60);
  ctx.globalAlpha = 1;

  // Pixel lava pool body
  const lavaColors = ['#ff6600', '#ff4400', '#ee2200', '#cc1100', '#ffaa00', '#ff8800'];
  for (let row = 0; row < poolH / P; row++) {
    for (let col = 0; col < poolW / P; col++) {
      const hash = ((col * 7 + row * 13 + Math.floor(frameCount * 0.08)) & 0xFF);
      ctx.fillStyle = lavaColors[hash % lavaColors.length];
      ctx.fillRect(poolLX + col * P, poolY + row * P, P, P);
    }
  }
  // Surface crust
  for (let col = 0; col < poolW / P; col++) {
    const s = Math.sin((col + frameCount * 0.05) * 0.8);
    ctx.fillStyle = s > 0.2 ? '#ff8800' : '#dd4400';
    ctx.fillRect(poolLX + col * P, poolY - P, P, P);
  }
  // Pool outline
  ctx.fillStyle = 'rgba(100,20,0,0.6)';
  ctx.fillRect(poolLX - P, poolY - P, P, poolH + P * 2);
  ctx.fillRect(poolLX + poolW, poolY - P, P, poolH + P * 2);
  ctx.fillRect(poolLX, poolY + poolH, poolW, P);

  // ── BLUE HAND reaching out of lava then sinking ──
  // Quick rise (0-50), desperate hold + tremble (50-110), slow dramatic sink (110+)
  let handY;
  let fingersCurl = 0; // 0 = open, 1 = fully curled/closed
  if (t < 50) {
    // Quick rise — hand bursts out
    const rise = t / 50;
    handY = poolY - rise * 60;
  } else if (t < 110) {
    // Desperate hold — trembling, fingers start curling
    const holdT = (t - 50) / 60;
    handY = poolY - 60 + Math.sin(t * 0.4) * 3 + holdT * 5;
    fingersCurl = holdT * 0.3; // fingers start closing
  } else {
    // Slow sink — hand gives up, fingers curl closed
    const sinkT = t - 110;
    const sinkEase = 1 - Math.exp(-sinkT * 0.012); // eases in slowly
    handY = poolY - 55 + sinkEase * 80 + Math.sin(t * 0.2) * (1 - sinkEase) * 2;
    fingersCurl = Math.min(1, 0.3 + sinkT * 0.008);
  }

  // Only draw hand if it's above the pool bottom
  if (handY < poolY + poolH) {
    const handX = poolCX;

    // Clip to pool area (hand disappears into lava)
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, poolY + P);
    ctx.clip();

    // Arm (pixel blocks)
    const armColor = '#2277bb';
    const armHi = '#44aadd';
    const armDk = '#1a5588';
    // Forearm
    ctx.fillStyle = armColor;
    ctx.fillRect(handX - P * 2, handY + P * 4, P * 4, P * 8);
    ctx.fillStyle = armHi;
    ctx.fillRect(handX - P * 2, handY + P * 4, P, P * 8); // left highlight
    ctx.fillStyle = armDk;
    ctx.fillRect(handX + P, handY + P * 4, P, P * 8); // right shadow

    // Palm
    ctx.fillStyle = armColor;
    ctx.fillRect(handX - P * 3, handY + P, P * 6, P * 4);
    ctx.fillStyle = armHi;
    ctx.fillRect(handX - P * 3, handY + P, P, P * 4);

    // Fingers (5 blocky pixel fingers — curl closed as hand sinks)
    const baseFingerH = P * 3;
    const curl = fingersCurl; // 0=open, 1=closed
    const fH = Math.max(P, baseFingerH * (1 - curl * 0.7)); // fingers shorten
    const curlInward = Math.floor(curl * P * 2); // fingers bend inward

    // Thumb (out to the side, curls in)
    ctx.fillStyle = armHi;
    ctx.fillRect(handX - P * 4 + curlInward, handY + P * 2, P, fH * 0.8);
    ctx.fillStyle = armColor;
    ctx.fillRect(handX - P * 4 + curlInward, handY + P, P, P);
    // Index
    ctx.fillStyle = armColor;
    ctx.fillRect(handX - P * 2 + curlInward * 0.5, handY - P * 2 + curl * P * 2, P, fH + P);
    ctx.fillStyle = armHi;
    ctx.fillRect(handX - P * 2 + curlInward * 0.5, handY - P * 2 + curl * P * 2, P, P);
    // Middle (tallest)
    ctx.fillStyle = armColor;
    ctx.fillRect(handX - P, handY - P * 3 + curl * P * 3, P, fH + P * 2 * (1 - curl));
    ctx.fillStyle = armHi;
    ctx.fillRect(handX - P, handY - P * 3 + curl * P * 3, P, P);
    // Ring
    ctx.fillStyle = armColor;
    ctx.fillRect(handX - curlInward * 0.5, handY - P * 2 + curl * P * 2, P, fH + P);
    ctx.fillStyle = armDk;
    ctx.fillRect(handX - curlInward * 0.5, handY - P * 2 + curl * P * 2, P, P);
    // Pinky
    ctx.fillStyle = armDk;
    ctx.fillRect(handX + P - curlInward, handY - P + curl * P, P, fH);
    ctx.fillStyle = armColor;
    ctx.fillRect(handX + P - curlInward, handY - P + curl * P, P, P);

    // Lava dripping off hand (orange pixels falling)
    if (t > 15 && t < 130) {
      for (let d = 0; d < 3; d++) {
        const dripX = handX - P * 2 + d * P * 2;
        const dripY = handY + P + ((t * 2 + d * 30) % 40);
        if (dripY < poolY) {
          ctx.fillStyle = '#ff6600';
          ctx.fillRect(dripX, dripY, P, P);
          ctx.fillStyle = '#ffaa00';
          ctx.fillRect(dripX, dripY + P, P, P);
        }
      }
    }

    ctx.restore();
  }

  // ── Lava bubbles where hand sinks ──
  if (t > 110) {
    const bubbleIntensity = Math.min(1, (t - 110) / 40);
    for (let b = 0; b < 4; b++) {
      const bubblePhase = (t * 0.05 + b * 1.5) % 3;
      if (bubblePhase < 1.5) {
        const bx = poolCX + Math.sin(b * 2.7 + t * 0.04) * 20;
        const by = poolY - bubblePhase * 8;
        const br = P * (0.5 + bubblePhase * 0.3);
        ctx.globalAlpha = (1 - bubblePhase / 1.5) * 0.6 * bubbleIntensity;
        ctx.fillStyle = '#ff8800';
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // ── Score display (fades in early) ──
  if (t > 30 && t < 180) {
    const textAlpha = Math.min(1, (t - 30) / 30) * Math.max(0, 1 - (t - 140) / 40);
    ctx.globalAlpha = textAlpha;
    ctx.textAlign = 'center';

    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#ff4400';
    ctx.font = `bold 34px ${GAME_FONT}`;
    ctx.fillText('GET GOOD!', W / 2, H / 2 - 80);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffcc88';
    ctx.font = `bold 14px ${GAME_FONT}`;
    ctx.fillText(`${score} pts`, W / 2, H / 2 - 45);

    if (score >= highScore && highScore > 0) {
      ctx.fillStyle = '#ffdd00';
      ctx.font = `11px ${GAME_FONT}`;
      ctx.fillText('NEW BEST!', W / 2, H / 2 - 25);
    }
    ctx.globalAlpha = 1;
  }

  // ── SCROLLING LEGEND TEXT (starts after hand sinks ~180 frames) ──
  const scrollStart = 200; // frames before scroll begins
  if (t > scrollStart) {
    // Full black bg by now
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);

    const scrollSpeed = 0.6;
    const scrollY = (t - scrollStart) * scrollSpeed;
    const lineH = 22; // line height
    const gapH = 14;  // extra gap between paragraphs
    ctx.textAlign = 'center';

    const legendLines = GAMEOVER_LEGEND_LINES;

    // Calculate positions and draw
    let yPos = H + 40 - scrollY; // start below screen, scroll up
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 35, W, H - 70); // clip to avoid text at very top/bottom edges
    ctx.clip();

    for (const line of legendLines) {
      if (line.text === 'SPRITE') {
        // Draw the ninja sprite centered
        if (spriteReady) {
          const sprW = 100;
          const sprH = 100;
          ctx.drawImage(ninjaSprite, W / 2 - sprW / 2, yPos, sprW, sprH);
        }
        yPos += line.gap;
        continue;
      }

      if (line.text === '') {
        yPos += line.gap;
        continue;
      }

      // Only draw if on screen
      if (yPos > -30 && yPos < H + 30) {
        // Fade at top and bottom edges
        const fadeTop = Math.min(1, (yPos - 35) / 50);
        const fadeBot = Math.min(1, (H - 35 - yPos) / 50);
        ctx.globalAlpha = Math.max(0, Math.min(fadeTop, fadeBot));

        ctx.font = line.font;
        ctx.fillStyle = line.color;
        ctx.fillText(line.text, W / 2, yPos);
      }
      yPos += lineH + line.gap;
    }

    ctx.restore();
    ctx.globalAlpha = 1;

    // The "PRESS START" line position — check if scroll reached end
    // Calculate total height of all lines
    let totalH = 0;
    for (const line of legendLines) {
      if (line.text === '' || line.text === 'SPRITE') { totalH += line.gap; }
      else { totalH += lineH + line.gap; }
    }
    const endScrollY = totalH + 40 - H / 2; // when last line is centered
    if (scrollY > endScrollY) {
      gameOverScrollDone = true;
      // Stop scrolling, show pulsing restart prompt
      const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff6644';
      ctx.font = `bold 14px ${GAME_FONT}`;
      ctx.fillText('PRESS START TO GET GOOD', W / 2, H / 2 + 60);
      ctx.globalAlpha = 1;
    }
  } else if (t >= DEATH_RESTART_DELAY && t <= scrollStart) {
    // Brief restart prompt before scroll begins
    const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffaa66';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.fillText('Press SPACE or TAP to retry', W / 2, H / 2 + 90);
    ctx.globalAlpha = 1;
  }
}

// ── MOVIE CREDITS OVERLAY (during level 1 gameplay) ──
function drawCreditsOverlay() {
  if (creditsTimer <= 0) return;

  const credits = [
    { role: 'STARRING', name: 'GET GOOD DAD' },
    { role: 'DIRECTED BY', name: 'MICHAEL VANDERPOOL' },
    { role: 'MUSIC BY', name: 'SUNO' },
  ];

  const creditDuration = 150; // frames per credit (~2.5 sec each)
  const fadeDuration = 35; // frames for fade in/out
  const totalDuration = credits.length * creditDuration;

  const t = creditsTimer - 1; // offset since we start at 1
  const idx = Math.floor(t / creditDuration);
  const localT = t % creditDuration;

  if (idx < credits.length) {
    // Fade in, hold, fade out
    let alpha;
    if (localT < fadeDuration) {
      alpha = localT / fadeDuration;
    } else if (localT > creditDuration - fadeDuration) {
      alpha = (creditDuration - localT) / fadeDuration;
    } else {
      alpha = 1;
    }

    // Position in lower-left, movie style
    ctx.globalAlpha = alpha * 0.85;
    ctx.textAlign = 'left';

    // Subtle text shadow for readability
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 8;

    // Role label (small, dim)
    ctx.fillStyle = '#aabbcc';
    ctx.font = `8px ${GAME_FONT}`;
    ctx.fillText(credits[idx].role, 30, H - 80);

    // Name (larger, white)
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold 12px ${GAME_FONT}`;
    ctx.fillText(credits[idx].name, 30, H - 55);

    ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    ctx.globalAlpha = 1;
  }

  // Credits done
  if (t >= totalDuration) {
    creditsTimer = 0;
  }
}

function drawTransition() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  const t = 150 - transitionTimer; // frames elapsed
  const fadeIn = Math.min(1, t / 30);
  const fadeOut = Math.min(1, transitionTimer / 30);
  const alpha = Math.min(fadeIn, fadeOut);

  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  // Level number
  ctx.fillStyle = '#33ccff';
  ctx.shadowColor = '#33ccff';
  ctx.shadowBlur = 20;
  ctx.font = `bold 20px ${GAME_FONT}`;
  const levelDisplay = !isVolcanoLevel() ? `LEVEL 1-${level}` : `LEVEL ${Math.ceil(level/3)}-${((level-1)%3)+1}`;
  ctx.fillText(levelDisplay, W / 2, H / 2 - 20);
  ctx.shadowBlur = 0;

  // Location name
  ctx.fillStyle = '#ffcc88';
  ctx.font = `12px ${GAME_FONT}`;
  const locationName = !isVolcanoLevel() ? 'NEO TOKYO' : level === 6 ? 'THE SUMMIT' : 'THE VOLCANO';
  ctx.fillText(locationName, W / 2, H / 2 + 20);

  ctx.globalAlpha = 1;
}

function drawSingleRock(r) {
  const P = 4;
  const sx = r.worldX - scrollOffset;
  const baseY = getGroundY(r.worldX);
  const rad = r.radius;
  const cx = Math.floor(sx / P) * P;
  const cy = Math.floor((baseY - rad + rad * 0.1 + (r.bounceY || 0)) / P) * P;
  const seed = (((r.originX || r.worldX) * 2654435761) >>> 0);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(r.rotation);

  const gridRad = Math.ceil(rad / P);
  for (let gy = -gridRad; gy <= gridRad; gy++) {
    for (let gx = -gridRad; gx <= gridRad; gx++) {
      const dist = Math.sqrt(gx * gx + gy * gy);
      if (dist > gridRad) continue;
      const px = gx * P;
      const py = gy * P;
      const distNorm = dist / gridRad;
      const ph = ((gx * 7919 + gy * 4813 + seed) >>> 0) & 0xFFFF;

      let color;
      if (distNorm > 0.85) color = '#1a1210';
      else if (distNorm > 0.65) color = (ph & 1) ? '#2a1e18' : '#241a14';
      else if (distNorm > 0.4) color = (ph & 1) ? '#3a2a20' : '#342418';
      else color = (ph & 1) ? '#443022' : '#3e2c1e';

      let isLavaCrack = false;
      const angle = Math.atan2(gy, gx);
      const crackCount = 3 + (seed % 3);
      for (let c = 0; c < crackCount; c++) {
        const crackAngle = ((seed >> (c * 4)) & 15) / 15 * Math.PI * 2;
        const angleDiff = Math.abs(((angle - crackAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        if (angleDiff < 0.12 + (ph % 3) * 0.02 && distNorm > 0.15 && distNorm < 0.9) { isLavaCrack = true; break; }
        const branchAngle = crackAngle + 0.5 + c * 0.3;
        const bDiff = Math.abs(((angle - branchAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        if (bDiff < 0.08 && distNorm > 0.3 && distNorm < 0.65) { isLavaCrack = true; break; }
      }

      if (isLavaCrack) {
        const pulse = (((r.originX || r.worldX) * 7 | 0) + gx + gy) & 1;
        color = pulse ? '#ff6600' : '#cc4400';
        if ((ph & 7) < 2) color = pulse ? '#ffaa22' : '#ff6600';
      }
      if (!isLavaCrack && (ph & 31) < 3) color = distNorm > 0.5 ? '#140e0a' : '#4a3628';

      ctx.fillStyle = color;
      ctx.fillRect(px, py, P, P);
    }
  }

  const hlOff = Math.floor(gridRad * 0.3);
  for (let hy = -hlOff - 1; hy <= -hlOff + 1; hy++) {
    for (let hx = -hlOff - 1; hx <= -hlOff + 1; hx++) {
      const hd = Math.sqrt(hx * hx + hy * hy);
      if (hd > 2 || hd > gridRad * 0.7) continue;
      ctx.fillStyle = 'rgba(80, 65, 50, 0.35)';
      ctx.fillRect(hx * P, hy * P, P, P);
    }
  }
  ctx.restore();

}

function drawRocks() {
  for (const r of rocks) {
    const sx = r.worldX - scrollOffset;
    if (sx < -50 || sx > W + 50) continue;
    drawSingleRock(r);
  }
}

function drawSingleMoltenRock(mr) {
  const P = 4;
  const sx = mr.worldX - scrollOffset;
  const baseY = getGroundY(mr.worldX);
  const rad = mr.radius;
  const cx = Math.floor(sx / P) * P;
  const cy = Math.floor((baseY - rad + rad * 0.1 + (mr.bounceY || 0)) / P) * P;
  const seed = (((mr.originX || mr.worldX) * 2654435761) >>> 0);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(mr.rotation);

  const gridRad = Math.ceil(rad / P);
  for (let gy = -gridRad; gy <= gridRad; gy++) {
    for (let gx = -gridRad; gx <= gridRad; gx++) {
      const dist = Math.sqrt(gx * gx + gy * gy);
      if (dist > gridRad) continue;
      const px = gx * P;
      const py = gy * P;
      const distNorm = dist / gridRad;
      const ph = ((gx * 7919 + gy * 4813 + seed) >>> 0) & 0xFFFF;

      // INVERTED: lava is the base, rock is the cracks
      let color;
      if (distNorm > 0.85) color = '#661100'; // dark molten rim
      else if (distNorm > 0.65) color = (ph & 1) ? '#cc4400' : '#aa3300';
      else if (distNorm > 0.4) color = (ph & 1) ? '#ff6600' : '#dd5500';
      else color = (ph & 1) ? '#ffaa22' : '#ff8811'; // hot bright core

      let isCrack = false;
      const angle = Math.atan2(gy, gx);
      const crackCount = 3 + (seed % 3);
      for (let c = 0; c < crackCount; c++) {
        const crackAngle = ((seed >> (c * 4)) & 15) / 15 * Math.PI * 2;
        const angleDiff = Math.abs(((angle - crackAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        if (angleDiff < 0.12 + (ph % 3) * 0.02 && distNorm > 0.15 && distNorm < 0.9) { isCrack = true; break; }
        const branchAngle = crackAngle + 0.5 + c * 0.3;
        const bDiff = Math.abs(((angle - branchAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        if (bDiff < 0.08 && distNorm > 0.3 && distNorm < 0.65) { isCrack = true; break; }
      }

      // Cracks are dark rock instead of lava
      if (isCrack) {
        const pulse = ((seed * 7 | 0) + gx + gy) & 1;
        color = pulse ? '#2a1e18' : '#1a1210';
        if ((ph & 7) < 2) color = pulse ? '#3a2a20' : '#241a14';
      }
      if (!isCrack && (ph & 31) < 3) color = distNorm > 0.5 ? '#551100' : '#ffcc44'; // speckle

      ctx.fillStyle = color;
      ctx.fillRect(px, py, P, P);
    }
  }

  // Hot highlight — top-left glow
  const hlOff = Math.floor(gridRad * 0.3);
  for (let hy = -hlOff - 1; hy <= -hlOff + 1; hy++) {
    for (let hx = -hlOff - 1; hx <= -hlOff + 1; hx++) {
      const hd = Math.sqrt(hx * hx + hy * hy);
      if (hd > 2 || hd > gridRad * 0.7) continue;
      ctx.fillStyle = 'rgba(255, 220, 100, 0.35)';
      ctx.fillRect(hx * P, hy * P, P, P);
    }
  }
  ctx.restore();

}

function drawMoltenRocks() {
  for (const mr of moltenRocks) {
    const sx = mr.worldX - scrollOffset;
    if (sx < -50 || sx > W + 50) continue;
    drawSingleMoltenRock(mr);
  }
}

// ── MAIN DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();

  if (shakeTimer > 0) {
    const i = shakeTimer * 0.7;
    ctx.translate((Math.random() - 0.5) * i, (Math.random() - 0.5) * i);
  }

  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255, 68, 0, ${flashTimer / 10 * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (gameState === 'menu') {
    drawMenu();
  } else if (gameState === 'transition') {
    drawTransition();
  } else if (gameState === 'dojo') {
    drawDojo();
  } else if (gameState === 'sfx') {
    drawSfxScreen();
  } else {
    // Draw city background — destroyed ruins for level 4, neon city otherwise
    if (isVolcanoLevel()) {
      if (level === 6 && volcanoBg23Ready) {
        // Level 2-3: use the volcano-bg-2-3 image for the whole level
        const imgAspect = volcanoBg23.width / volcanoBg23.height;
        const drawW = W;
        const drawH = W / imgAspect;
        // Slow parallax shift based on horizontal scroll
        const maxShift = Math.max(1, (drawW - W) / 2);
        const rawShift = (scrollOffset * 0.008) % (maxShift * 2);
        const shiftX = rawShift <= maxShift ? -rawShift : -(maxShift * 2 - rawShift);
        ctx.drawImage(volcanoBg23, shiftX, (H - drawH) / 2, drawW, drawH);
      } else {
        drawDestroyedCitySky();
      }
      if (level !== 6 && !level2BgReady) {
        drawRuinsLayer(ruins_far, 0.1, 0, false);
        drawRuinsLayer(ruins_mid, 0.35, 0.3, false);
      }
      if (level !== 6) {
        drawMidgroundForest();
        drawBurningVillage();
        drawRuinsLayer(ruins_near, 0.8, 0.1, true);
      }
    } else {
      drawNeoTokyoSky();
      drawBuildingLayer(buildings_far, 0.1, 0);
      drawBuildingLayer(buildings_mid, 0.3, 0.3);
      drawNeonSigns();
      drawBuildingLayer(buildings_near, 0.5, 0.1);
    }
    let playerDrawnInDepth = false;

    // ── VERTICAL CLIMB MODE (Level 2-3) ──
    if (verticalMode) {
      // ── CLIFF FACE — world-space mountain that scrolls with the camera ──
      const P = 4;
      const WPAL = {
        deep: '#0c0604', dark: '#160d08', mid: '#24160e',
        surface: '#362010', light: '#4a2e1a', edge: '#5c3820',
        shadow: '#080402', lavaD: '#882200', lava: '#cc4400', lavaH: '#ffaa22'
      };

      // Base fill — ensure no bg bleeds through anywhere
      ctx.fillStyle = '#020001';
      ctx.fillRect(0, 0, W, H);

      // ── 1. SKY + CITY BACKGROUND — using volcano-bg-2-3 image ──
      // Background is clipped to only show below the volcano lip
      const climbProgress = Math.min(1, Math.abs(scrollOffsetY) / CLIMB_TOTAL_HEIGHT);
      const lipScreenYForBg = climbScreenY(-CLIMB_TOTAL_HEIGHT);
      // The bg image should only be visible below the lip
      const bgClipTop = Math.max(0, Math.floor(lipScreenYForBg));

      // ── BACKGROUND: city skyline below the lip ──
      if (volcanoBg23Ready) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, bgClipTop, W, H - bgClipTop);
        ctx.clip();
        const imgAspect = volcanoBg23.width / volcanoBg23.height;
        const drawW = W;
        const drawH = W / imgAspect;
        const bgShift = climbProgress * H * 0.5;
        ctx.drawImage(volcanoBg23, 0, bgShift, drawW, drawH);
        ctx.restore();
      } else {
        const skyGrad = ctx.createLinearGradient(0, bgClipTop, 0, H);
        skyGrad.addColorStop(0, '#1a0e20');
        skyGrad.addColorStop(0.4, '#3a1520');
        skyGrad.addColorStop(0.75, '#6a2810');
        skyGrad.addColorStop(1, '#cc5520');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, bgClipTop, W, H - bgClipTop);
      }

      // Above the lip is already covered by the base fill (#020001)
      // No additional fill needed — mountain texture and smoke clouds provide the visuals

      // Smoke cloud region — centered on the mountain top, extends above and below
      const smokeTopY = Math.max(-200, climbScreenY(-CLIMB_TOTAL_HEIGHT) - 250);
      const smokeBotY = Math.min(H, climbScreenY(-CLIMB_TOTAL_HEIGHT) + 350);

      // ── BACKGROUND SMOKE LAYER — behind the mountain, hovers in place ──
      drawSummitSmokeLayer(smokeTopY, smokeBotY, P, 0);

      // ── ERUPTION FLARES (BEHIND MOUNTAIN) — thick lava shooting up from inside the crater ──
      // Only flares and drops render here so the mountain graphic occludes their lower trails
      if (eruptionParticles.length > 0) {
        for (const p of eruptionParticles) {
          if (p.type !== 'flare' && p.type !== 'drop') continue;
          if (p.x < -40 || p.x > W + 40 || p.y > H + 20) continue;
          const lifeFrac = p.life / p.maxLife;
          const alpha = Math.min(1, lifeFrac * 2);
          ctx.globalAlpha = alpha;

          let r, g, b;
          if (p.heat > 0.7 && lifeFrac > 0.6) {
            r = 255; g = 220 + Math.floor(Math.random() * 35); b = 100 + Math.floor(Math.random() * 80);
          } else if (lifeFrac > 0.4) {
            r = 255; g = 120 + Math.floor(lifeFrac * 100); b = 20 + Math.floor(Math.random() * 30);
          } else {
            r = 180 + Math.floor(lifeFrac * 75); g = 40 + Math.floor(lifeFrac * 60); b = 10;
          }

          const drawY = Math.max(-20, p.y);
          const px = Math.floor(p.x / P) * P;
          const py = Math.floor(drawY / P) * P;

          if (p.type === 'flare') {
            const sz = Math.max(P * 3, Math.floor(p.size / P) * P);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px - sz / 2, py, sz, sz);
            ctx.fillRect(px - sz / 2 + P, py - P, sz - P * 2, P);
            ctx.fillRect(px - sz / 2 + P, py + sz, sz - P * 2, P);

            const coreAlpha = Math.min(1, lifeFrac * 1.2) * 0.85;
            ctx.fillStyle = `rgba(255,250,200,${coreAlpha.toFixed(2)})`;
            ctx.fillRect(px - sz / 2 + P * 2, py + P, sz - P * 4 || P, sz - P * 2 || P);

            // Long trailing streak below — will be occluded by the mountain
            const trailLen = Math.floor(10 + lifeFrac * 14);
            for (let t = 1; t <= trailLen; t++) {
              const ty = py + t * P * 2;
              if (ty > H + 10) break;
              const ta = alpha * (1 - t / (trailLen + 2)) * 0.8;
              ctx.globalAlpha = ta;
              const trailR = Math.min(255, r + 10);
              const trailG = Math.max(0, g - 20);
              ctx.fillStyle = `rgb(${trailR},${trailG},${b})`;
              const trailW = Math.max(P, sz - Math.floor(t / 2) * P);
              ctx.fillRect(px - trailW / 2, ty, trailW, P * 2);
            }
            ctx.globalAlpha = alpha;
          } else if (p.type === 'drop') {
            const sz = Math.max(P * 4, Math.floor(p.size / P) * P);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px - sz / 2, py, sz, sz);
            ctx.fillRect(px - sz / 2 + P, py - P, sz - P * 2, P);
            ctx.fillRect(px - sz / 2 + P, py + sz, sz - P * 2, P);
            ctx.fillRect(px - sz / 2 - P, py + P, P, sz - P * 2);
            ctx.fillRect(px - sz / 2 + sz, py + P, P, sz - P * 2);

            const coreAlpha = Math.min(1, lifeFrac * 1.3) * 0.9;
            ctx.fillStyle = `rgba(255,255,220,${coreAlpha.toFixed(2)})`;
            ctx.fillRect(px - sz / 2 + P * 2, py + P * 2, sz - P * 4, sz - P * 4);

            const trailLen = 8;
            for (let t = 1; t <= trailLen; t++) {
              const ty = py + sz + t * P * 3;
              if (ty > H + 10) break;
              const ta = alpha * (1 - t / (trailLen + 1)) * 0.7;
              ctx.globalAlpha = ta;
              ctx.fillStyle = `rgb(${Math.min(255, r + 20)},${Math.max(0, g - 30)},${b})`;
              const dripW = Math.max(P, P * (3 - Math.floor(t / 2)));
              ctx.fillRect(px - dripW / 2, ty, dripW, P * 2);
            }
            ctx.globalAlpha = alpha;
          }
        }
        ctx.globalAlpha = 1;
      }

      // ── PLAYER (BEHIND MOUNTAIN) — only after the apex of the summit jump ──
      // While the player is going UP, they're drawn normally in front of the mountain.
      // The moment they reach the top of their jump, they get redrawn here (behind the mountain)
      // so the cliff face occludes them as they fall into the crater.
      if (summitJumping && summitJumpPastApex) {
        drawPlayer();
      }

      // ── 2. MOUNTAIN — world-space object, scrolls with camera ──
      // Mountain spans worldY = 0 (base) to worldY = -CLIMB_TOTAL_HEIGHT (summit)
      // It tapers from full width at base to ~20% width at summit
      const mountainTopScreenY = climbScreenY(-CLIMB_TOTAL_HEIGHT);
      const mountainBaseScreenY = climbScreenY(0);

      // Only draw rows that are on screen
      const drawTop = Math.max(0, Math.floor(mountainTopScreenY / P) * P - P * 8);
      const drawBot = Math.min(H, Math.ceil(mountainBaseScreenY / P) * P + P * 8);

      for (let y = drawTop; y < drawBot; y += P) {
        // Convert screen Y to world Y for this row
        const rowWorldY = (y - (H - CLIMB_GROUND_Y) + scrollOffsetY);
        // How far up the mountain is this row? 0 = base, 1 = summit. NOT CLAMPED —
        // the > 1 and < 0 checks below skip rows that are actually sky or ground.
        const heightFrac = -rowWorldY / CLIMB_TOTAL_HEIGHT;
        const worldRow = Math.floor(rowWorldY / P);

        // Above the mountain summit = sky (skip)
        if (heightFrac > 1) continue;
        // Below the mountain base = ground (handled separately)
        if (heightFrac < 0) continue;

        // Taper: mountain narrows toward the summit, but bulges out just below the lip
        const taperStart = 0.8;
        const taperFrac = heightFrac > taperStart ? (heightFrac - taperStart) / (1 - taperStart) : 0;
        let taperAmount = taperFrac * taperFrac * 0.15; // very gentle taper — stays wide
        // Lip thickness: make the very top (last 8% of mountain) bulge outward before tapering
        // This creates a thicker "rim" effect at the bottom of the lip
        // Bulge band spans heightFrac [0.92, 1.0] — symmetric sine peak at 0.96
        if (heightFrac > 0.92 && heightFrac <= 1.0) {
          const lipBulge = (heightFrac - 0.92) / 0.08; // 0→1 across the bulge band
          const bulgeCurve = Math.sin(lipBulge * Math.PI); // peaks in middle, zero at both ends
          taperAmount -= bulgeCurve * 0.06; // push edges outward by up to 6% of W
        }
        // Cliff-like edge noise — use absolute worldRow for consistent hashing at the top
        // (negative worldRow produces skewed distribution with bitwise ops)
        const absRow = Math.abs(worldRow);
        const edgeNoiseA = ((absRow * 2654435761 >>> 16) % 5) * P;
        const edgeNoiseB = ((absRow * 1597463007 >>> 12) % 3) * P;
        const leftEdgeJag = edgeNoiseA + edgeNoiseB;
        const rightEdgeJag = ((absRow * 3266489917 >>> 14) % 5) * P + ((absRow * 1099511628 >>> 18) % 3) * P;
        const rockLeftEdge = taperAmount * W * 0.5 + leftEdgeJag;
        const rockRightEdge = W - taperAmount * W * 0.5 - rightEdgeJag;

        if (rockLeftEdge >= rockRightEdge) continue; // too narrow, skip

        for (let x = 0; x < W; x += P) {
          if (x < rockLeftEdge - P * 4 || x > rockRightEdge + P * 4) continue;

          const h = ((x * 7919 + worldRow * 4813 + 31337) >>> 0) & 0xFFFF;

          // Edge fringe — jagged rocky falloff like a real cliff
          const distFromLeft = x - rockLeftEdge;
          const distFromRight = rockRightEdge - x;
          const edgeDist = Math.min(distFromLeft, distFromRight);
          if (edgeDist < 0) {
            // Irregular chunk beyond the main edge
            if (h % 3 === 0 && edgeDist > -P * 4) {
              ctx.fillStyle = h % 5 === 0 ? WPAL.dark : WPAL.deep;
              ctx.fillRect(x, y, P, P);
            } else if (h % 7 === 0 && edgeDist > -P * 2) {
              ctx.fillStyle = WPAL.shadow;
              ctx.fillRect(x, y, P, P);
            }
            continue;
          }
          if (edgeDist < P * 4) {
            // Dark shadow band near the edges — more pronounced shading
            if (edgeDist < P) {
              ctx.fillStyle = WPAL.shadow;
            } else if (edgeDist < P * 2) {
              ctx.fillStyle = h % 2 === 0 ? WPAL.deep : WPAL.shadow;
            } else {
              ctx.fillStyle = h % 2 === 0 ? WPAL.dark : WPAL.deep;
            }
            ctx.fillRect(x, y, P, P);
            continue;
          }

          // Rock texture with diagonal stratified bands — matches bottom cliff face
          // Ensure positive modulo since worldRow is negative at the summit
          const rawPhase = (worldRow + x * 0.3) * 0.08;
          const bandPhase = ((rawPhase % 1) + 1) % 1;
          let color;
          if (bandPhase < 0.05) color = h % 2 === 0 ? WPAL.edge : WPAL.light;
          else if (bandPhase < 0.2) color = h % 3 === 0 ? WPAL.light : WPAL.surface;
          else if (bandPhase < 0.55) color = h % 3 === 0 ? WPAL.surface : h % 2 === 0 ? WPAL.mid : WPAL.light;
          else if (bandPhase < 0.8) color = h % 3 === 0 ? WPAL.mid : WPAL.dark;
          else color = h % 2 === 0 ? WPAL.dark : WPAL.deep;

          ctx.fillStyle = color;
          ctx.fillRect(x, y, P, P);
        }

        // Crevice cracks
        if ((worldRow & 3) === 0) {
          for (let cx = Math.ceil(rockLeftEdge / P) * P; cx < rockRightEdge; cx += P * 7) {
            const ch = ((cx * 16807 + worldRow * 48271) >>> 0) & 0xFFFF;
            if ((ch & 7) !== 0) continue;
            ctx.fillStyle = WPAL.shadow;
            ctx.fillRect(cx, y, P, P);
          }
        }

        // Rocky bumps
        if ((worldRow & 7) === 0) {
          for (let bx = Math.ceil(rockLeftEdge / P) * P; bx < rockRightEdge; bx += P * 5) {
            const bh = ((bx * 48271 + worldRow * 7919) >>> 0) & 0xFFFF;
            if ((bh & 15) > 2) continue;
            ctx.fillStyle = bh % 2 === 0 ? WPAL.edge : WPAL.light;
            ctx.fillRect(bx, y, P * 2, P);
            ctx.fillStyle = WPAL.shadow;
            ctx.fillRect(bx, y + P, P * 2, P);
          }
        }

        // Lava veins
        if ((worldRow & 31) < 2) {
          const lh = ((worldRow * 48271) >>> 0) & 0xFF;
          const veinPulse = Math.sin(frameCount * 0.03 + worldRow * 0.1) * 0.3 + 0.5;
          ctx.globalAlpha = veinPulse * 0.35;
          ctx.fillStyle = lh % 2 === 0 ? WPAL.lavaD : WPAL.lava;
          const span = rockRightEdge - rockLeftEdge;
          if (span > 0) {
            const vx1 = rockLeftEdge + (lh * 7) % span;
            const vx2 = rockLeftEdge + ((lh * 13) + 100) % span;
            ctx.fillRect(Math.floor(vx1 / P) * P, y, P * 3, P);
            ctx.fillRect(Math.floor(vx2 / P) * P, y, P * 2, P);
          }
          ctx.globalAlpha = 1;
        }
      }

      // ── 2b. VOLCANO LIP / CRATER RIM at summit ──
      // Lip matches the mountain taper width at heightFrac = 1.0
      const lipWorldY = -CLIMB_TOTAL_HEIGHT;
      const lipScreenY = climbScreenY(lipWorldY);
      const lipTaperFrac = 1.0; // summit
      const lipTaperAmt = lipTaperFrac > 0.8 ? ((lipTaperFrac - 0.8) / 0.2) : 0;
      const lipTaper = lipTaperAmt * lipTaperAmt * 0.15;
      const lipLeft = lipTaper * W * 0.5;
      const lipRight = W - lipTaper * W * 0.5;

      // Lip edge variables kept for eruption positioning
      // No side fills — base fill + mountain texture + smoke handle the sky

      // ── 3. SOLID GROUND at bottom ──
      const groundScreenY = climbScreenY(0);
      if (groundScreenY < H + 20) {
        const groundTop = Math.max(0, Math.floor(groundScreenY / P) * P);
        // Fill everything below ground level solid first to prevent bg bleed
        if (groundTop < H) {
          ctx.fillStyle = WPAL.deep;
          ctx.fillRect(0, groundTop, W, H - groundTop);
        }
        for (let sx = 0; sx < W; sx += P) {
          if (groundTop >= H) continue;
          const h = ((sx * 2654435761) >>> 0);
          const peakBlocks = h % 5;
          for (let b = 0; b < peakBlocks; b++) {
            ctx.fillStyle = b === 0 ? WPAL.surface : (b < 2 ? WPAL.mid : WPAL.dark);
            ctx.fillRect(sx, groundTop - (b + 1) * P, P, P);
          }
          ctx.fillStyle = WPAL.surface; ctx.fillRect(sx, groundTop, P, P * 2);
          ctx.fillStyle = WPAL.mid;     ctx.fillRect(sx, groundTop + P * 2, P, P * 3);
          ctx.fillStyle = WPAL.dark;    ctx.fillRect(sx, groundTop + P * 5, P, P * 3);
        }
      }

      // Bottom edge seal — fill any sub-pixel gap at the very bottom
      ctx.fillStyle = WPAL.deep;
      ctx.fillRect(0, H - P * 2, W, P * 2);

      // ── 4. EMBER PARTICLES ──
      for (let i = 0; i < 10; i++) {
        const eseed = ((Math.floor(frameCount / 4) * 3 + i * 1931) >>> 0) & 0xFFFF;
        const life = ((Math.floor(frameCount / 3) + i * 17) % 20);
        const ey = H - life * P * 2;
        if (ey < 0 || ey > H) continue;
        const ex = Math.floor(((eseed * 7 + i * 137) % W) / P) * P;
        ctx.globalAlpha = Math.max(0, 1 - life / 20) * 0.4;
        ctx.fillStyle = life < 5 ? WPAL.lavaH : '#ff8844';
        ctx.fillRect(ex, ey, P, P);
      }
      ctx.globalAlpha = 1;

      // ── MID SMOKE LAYER — in front of mountain, behind ledges/player, drifts left ──
      drawSummitSmokeLayer(smokeTopY, smokeBotY, P, 1);

      // ── ERUPTION SPARKS (IN FRONT OF MOUNTAIN) — flares/drops already drawn behind ──
      if (eruptionParticles.length > 0) {
        for (const p of eruptionParticles) {
          if (p.type === 'flare' || p.type === 'drop') continue;
          if (p.x < -40 || p.x > W + 40 || p.y > H + 20) continue;
          const lifeFrac = p.life / p.maxLife;
          const alpha = Math.min(1, lifeFrac * 2);
          ctx.globalAlpha = alpha;

          // Color: bright yellow/white → orange → dark red as it cools
          let r, g, b;
          if (p.heat > 0.7 && lifeFrac > 0.6) {
            r = 255; g = 220 + Math.floor(Math.random() * 35); b = 100 + Math.floor(Math.random() * 80);
          } else if (lifeFrac > 0.4) {
            r = 255; g = 120 + Math.floor(lifeFrac * 100); b = 20 + Math.floor(Math.random() * 30);
          } else {
            r = 180 + Math.floor(lifeFrac * 75); g = 40 + Math.floor(lifeFrac * 60); b = 10;
          }

          // Clamp draw position so particles above screen still render as tall streaks
          const drawY = Math.max(-20, p.y);
          const px = Math.floor(p.x / P) * P;
          const py = Math.floor(drawY / P) * P;

          if (p.type === 'flare') {
            // THICK LAVA FLARE — chunky molten blob with trailing column
            const sz = Math.max(P * 3, Math.floor(p.size / P) * P);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            // Main chunky blob
            ctx.fillRect(px - sz / 2, py, sz, sz);
            ctx.fillRect(px - sz / 2 + P, py - P, sz - P * 2, P);
            ctx.fillRect(px - sz / 2 + P, py + sz, sz - P * 2, P);

            // Molten white-hot core
            const coreAlpha = Math.min(1, lifeFrac * 1.2) * 0.85;
            ctx.fillStyle = `rgba(255,250,200,${coreAlpha.toFixed(2)})`;
            ctx.fillRect(px - sz / 2 + P * 2, py + P, sz - P * 4 || P, sz - P * 2 || P);

            // Long trailing streak below (the flare column it came from)
            const trailLen = Math.floor(8 + lifeFrac * 10);
            for (let t = 1; t <= trailLen; t++) {
              const ty = py + t * P * 2;
              if (ty > H + 10) break;
              const ta = alpha * (1 - t / (trailLen + 2)) * 0.75;
              ctx.globalAlpha = ta;
              const trailR = Math.min(255, r + 10);
              const trailG = Math.max(0, g - 20);
              ctx.fillStyle = `rgb(${trailR},${trailG},${b})`;
              const trailW = Math.max(P, sz - Math.floor(t / 2) * P);
              ctx.fillRect(px - trailW / 2, ty, trailW, P * 2);
            }
            ctx.globalAlpha = alpha;
          } else if (p.type === 'drop') {
            // Huge reverse lava drops — massive chunky blobs
            const sz = Math.max(P * 4, Math.floor(p.size / P) * P);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px - sz / 2, py, sz, sz);
            ctx.fillRect(px - sz / 2 + P, py - P, sz - P * 2, P);
            ctx.fillRect(px - sz / 2 + P, py + sz, sz - P * 2, P);
            ctx.fillRect(px - sz / 2 - P, py + P, P, sz - P * 2);
            ctx.fillRect(px - sz / 2 + sz, py + P, P, sz - P * 2);

            // Bright white-hot core
            const coreAlpha = Math.min(1, lifeFrac * 1.3) * 0.9;
            ctx.fillStyle = `rgba(255,255,220,${coreAlpha.toFixed(2)})`;
            ctx.fillRect(px - sz / 2 + P * 2, py + P * 2, sz - P * 4, sz - P * 4);

            // Dripping trail behind
            const trailLen = 6;
            for (let t = 1; t <= trailLen; t++) {
              const ty = py + sz + t * P * 3;
              if (ty > H + 10) break;
              const ta = alpha * (1 - t / (trailLen + 1)) * 0.7;
              ctx.globalAlpha = ta;
              ctx.fillStyle = `rgb(${Math.min(255, r + 20)},${Math.max(0, g - 30)},${b})`;
              const dripW = Math.max(P, P * (3 - Math.floor(t / 2)));
              ctx.fillRect(px - dripW / 2, ty, dripW, P * 2);
            }
            ctx.globalAlpha = alpha;
          } else {
            // Sparks — small fast pixels
            const sz = Math.max(P, Math.floor(p.size * (0.5 + lifeFrac * 0.5) / P) * P);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px, py, sz, sz);

            if (lifeFrac > 0.7 && p.heat > 0.6) {
              ctx.fillStyle = `rgba(255,255,200,${(alpha * 0.5).toFixed(2)})`;
              ctx.fillRect(px, py, P, P);
            }
          }
        }
        ctx.globalAlpha = 1;
      }

      // Draw ledges, gas clouds, birds, player
      drawClimbLedges();
      drawGasClouds();
      drawClimbBirds();
      // Front-layer player draw — skipped only once we've swapped to the back layer (past jump apex)
      if (!(summitJumping && summitJumpPastApex)) drawPlayer();

      // ── FOREGROUND SMOKE LAYER — in front of everything, drifts right ──
      drawSummitSmokeLayer(smokeTopY, smokeBotY, P, 2);

      // Gas tint overlay
      if (gasExposure > 10) {
        const gasAlpha = Math.min(0.3, (gasExposure / GAS_KILL_THRESHOLD) * 0.35);
        ctx.fillStyle = `rgba(100, 180, 40, ${gasAlpha})`;
        ctx.fillRect(0, 0, W, H);
      }

      // Summit — "Press SPACE" prompt when waiting for input
      if (summitWaitingForInput && !summitConfirmed) {
        // Darken screen slightly
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, W, H);

        ctx.textAlign = 'center';
        ctx.shadowColor = '#ffcc44';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ffcc44';
        ctx.font = FONT_14B;
        ctx.fillText('THE SUMMIT', W / 2, H / 2 - 30);
        ctx.shadowBlur = 0;

        const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ffaa66';
        ctx.font = FONT_12;
        ctx.fillText('Press SPACE to continue', W / 2, H / 2 + 10);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      playerDrawnInDepth = true;
    } else if (isVolcanoLevel()) {
      // ── LAYER 1: BACK TREES (behind ground + player) ──
      _updateTreeConsts();
      for (const t of trees) {
        if (t.layer !== 'back') continue;
        const sx = t.worldX - scrollOffset;
        if (sx < -200 || sx > W + 200) continue;
        drawSingleTree(t);
      }
      // ── CLIFF TRANSITION: cliff wall scrolls in from the right — draw BEFORE ground so ground stays in front ──
      if (level === 6 && cliffTransition > 0 && !verticalMode) {
        const P = 4;
        const WPAL = {
          deep: '#0c0604', dark: '#160d08', mid: '#24160e',
          surface: '#362010', light: '#4a2e1a', edge: '#5c3820',
          shadow: '#080402', lavaD: '#882200', lava: '#cc4400', lavaH: '#ffaa22'
        };
        // The cliff is a world-space wall at cliffWorldX — scrolls in naturally from the right
        const cliffScreenX = Math.floor(cliffWorldX - scrollOffset);

        // Only draw the cliff if it's on screen
        if (cliffScreenX < W) {
          const drawLeft = Math.max(0, cliffScreenX);
          const groundY = GROUND_Y; // flat ground during transition

          // Darken sky behind the cliff area
          ctx.fillStyle = 'rgba(10, 6, 4, 0.6)';
          ctx.fillRect(drawLeft, 0, W - drawLeft, groundY);

          // Rock face — from cliffScreenX to right edge of screen, top to ground
          for (let y = 0; y < groundY; y += P) {
            const worldRow = Math.floor(y / P);
            for (let x = drawLeft; x < W; x += P) {
              // Use world-space X for consistent texture as it scrolls
              const worldX = x + scrollOffset;
              const h = ((worldX * 7919 + worldRow * 4813 + 31337) >>> 0) & 0xFFFF;
              const bandPhase = ((worldRow + worldX * 0.3) * 0.08) % 1;
              let color;
              if (bandPhase < 0.05) color = h % 2 === 0 ? WPAL.edge : WPAL.light;
              else if (bandPhase < 0.2) color = h % 3 === 0 ? WPAL.light : WPAL.surface;
              else if (bandPhase < 0.55) color = h % 3 === 0 ? WPAL.surface : h % 2 === 0 ? WPAL.mid : WPAL.light;
              else if (bandPhase < 0.8) color = h % 3 === 0 ? WPAL.mid : WPAL.dark;
              else color = h % 2 === 0 ? WPAL.dark : WPAL.deep;
              ctx.fillStyle = color;
              ctx.fillRect(x, y, P, P);
            }
            // Crevice cracks
            if ((worldRow & 3) === 0) {
              for (let cx = drawLeft; cx < W; cx += P * 7) {
                const worldCX = cx + scrollOffset;
                const ch = ((worldCX * 16807 + worldRow * 48271) >>> 0) & 0xFFFF;
                if ((ch & 7) !== 0) continue;
                ctx.fillStyle = WPAL.shadow;
                ctx.fillRect(cx, y, P, P);
              }
            }
          }

          // Jagged left edge of the cliff face
          if (cliffScreenX > 0) {
            for (let y = 0; y < groundY; y += P) {
              const eh = ((y * 2654435761 >>> 16) % 6);
              for (let j = 0; j < eh; j++) {
                const edgeX = cliffScreenX - (j + 1) * P;
                if (edgeX >= 0 && edgeX < W) {
                  const h = ((y * 7919 + j * 4813) >>> 0) & 0xFFFF;
                  ctx.fillStyle = h % 3 === 0 ? WPAL.dark : WPAL.deep;
                  ctx.fillRect(edgeX, y, P, P);
                }
              }
            }
          }

          // Ledge previews on the cliff face
          const cliffWidth = W - drawLeft;
          if (cliffWidth > 60) {
            for (const ledge of climbLedges) {
              const ledgeProgress = Math.abs(ledge.worldY) / CLIMB_TOTAL_HEIGHT;
              if (ledgeProgress > 0.15) continue;
              // Map ledge worldY onto the visible cliff height
              const previewY = groundY - 30 + (ledge.worldY * (groundY - 40) / (CLIMB_TOTAL_HEIGHT * 0.15));
              if (previewY < 0 || previewY > groundY) continue;
              // Map ledge worldX into the cliff area on screen
              const ledgeScreenX = drawLeft + (ledge.worldX / W) * cliffWidth;
              const lw = Math.max(4, ledge.w * cliffWidth / W);
              if (ledgeScreenX + lw < drawLeft || ledgeScreenX > W) continue;
              ctx.fillStyle = WPAL.surface;
              ctx.fillRect(ledgeScreenX, previewY, lw, P * 2);
              ctx.fillStyle = WPAL.light;
              ctx.fillRect(ledgeScreenX, previewY, lw, P);
              ctx.fillStyle = WPAL.shadow;
              ctx.fillRect(ledgeScreenX, previewY + P * 2, lw, P);
            }
          }
        }
      }
      drawVolcanicGround(); // draws after cliff so ground stays in front
    } else {
      drawStreet();
    }
    if (isVolcanoLevel()) {
      // ── LAYER 2: GROUND LAYER — lava pits, lava pools, mid trees, rocks, player ──
      if (level === 5) drawLavaPits();
      drawLavaPools();
      for (const t of trees) {
        if (t.layer !== 'mid') continue;
        const sx = t.worldX - scrollOffset;
        if (sx < -200 || sx > W + 200) continue;
        drawSingleTree(t);
      }
      for (const r of rocks) {
        const sx = r.worldX - scrollOffset;
        if (sx < -50 || sx > W + 50) continue;
        drawSingleRock(r);
      }
      for (const mr of moltenRocks) {
        const sx = mr.worldX - scrollOffset;
        if (sx < -50 || sx > W + 50) continue;
        drawSingleMoltenRock(mr);
      }
      drawPlayer();
      playerDrawnInDepth = true;

      // ── LAYER 3: FRONT TREES (in front of player, rocks, and pools) ──
      for (const t of trees) {
        if (t.layer !== 'front') continue;
        const sx = t.worldX - scrollOffset;
        if (sx < -200 || sx > W + 200) continue;
        drawSingleTree(t);
      }
    } else {
      drawStreetLamps();
    }

    // Shadow overlay — everything falls into darkness near end of level 3
    if (villageProgress > 0) {
      const shadowDepth = Math.min(0.85, villageProgress * 0.9);
      ctx.fillStyle = `rgba(0, 0, 0, ${shadowDepth})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Village environment draws on top of the shadow
    drawVillage();
    if (!isVolcanoLevel()) drawLavaPools(); // volcano levels draw pools in ground layer
    drawVehicles();
    drawLavaDrops();
    drawExplosions();
    drawVehicleDebris();
    if (!playerDrawnInDepth) drawPlayer();

    // Particles — use fillRect instead of arc for performance
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) continue;
      const alpha = p.life / p.maxLife;
      const sz = p.size * alpha;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - sz * 0.5, p.y - sz * 0.5, sz, sz);
    }
    ctx.globalAlpha = 1;

    drawHUD();
    if (creditsTimer > 0) drawCreditsOverlay();
    if (gameState === 'levelComplete') drawLevelComplete();
    if (gameState === 'dead') drawRespawnScreen();
    if (gameState === 'gameover') drawDeathScreen();
    if (gameState === 'victory') drawVictory();
  }

  ctx.restore();

  // Volume indicator (shows briefly when adjusted)
  if (volumeDisplayTimer > 0) {
    volumeDisplayTimer--;
    const vAlpha = Math.min(1, volumeDisplayTimer / 30);
    ctx.globalAlpha = vAlpha * 0.8;
    ctx.fillStyle = '#000000';
    ctx.fillRect(W - 120, 10, 110, 28);
    ctx.globalAlpha = vAlpha;
    ctx.fillStyle = '#ffffff';
    ctx.font = `12px ${GAME_FONT}`;
    ctx.textAlign = 'left';
    if (muted) {
      ctx.fillText('MUTED', W - 112, 29);
    } else {
      ctx.fillText('VOL', W - 112, 29);
      // Volume bar
      ctx.fillStyle = '#333333';
      ctx.fillRect(W - 80, 19, 60, 8);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(W - 80, 19, 60 * masterVolume, 8);
    }
    ctx.textAlign = 'center';
    ctx.globalAlpha = 1;
  }

  // Help overlay (draws on top of everything)
  if (showHelpOverlay) drawHelpOverlay();
}

// ── GAME LOOP (fixed 60fps timestep) ──
const FRAME_TIME = 1000 / 60; // 16.667ms per game tick
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  const elapsed = timestamp - lastTime;
  lastTime = timestamp;
  // Clamp to prevent spiral of death after tab switch or lag spike
  accumulator += Math.min(elapsed, 200);

  // Run fixed-step updates (may run 0, 1, or 2 ticks per frame)
  while (accumulator >= FRAME_TIME) {
    accumulator -= FRAME_TIME;
    gameTick();
  }

  // Draw once per display frame
  draw();
  requestAnimationFrame(gameLoop);
}

function gameTick() {
  frameCount++;
  if (gameState === 'dead' || gameState === 'gameover' || gameState === 'victory') deathTimer++;
  // Reset dojo key buffer on timeout
  if (dojoKeyTimer > 0) {
    dojoKeyTimer--;
    if (dojoKeyTimer === 0) dojoKeyBuffer = '';
  }
  if (gameState === 'menu') {
    // Pause before starting scroll (180 frames = 3 seconds)
    if (menuScrollY < 0) {
      menuScrollY++;
    } else {
      menuScrollY += 0.35; // slow crawl
    }
  }
  if (gameState === 'playing' && creditsTimer > 0) {
    creditsTimer++;
  }
  // Advance story scroll on victory screen
  if (gameState === 'victory' && !storyScrollDone) {
    if (deathTimer > 120) { // 2 second pause before scroll starts
      storyScrollY += 0.025; // ~0.7 px/frame (0.025 * STORY_LINE_H 28)
    }
  }
  if (gameState === 'transition') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      gameState = 'playing';
      // Switch music if the track changed for this level
      const curM = getCurrentMusic();
      // Stop any other level music that shouldn't be playing
      if (curM !== levelMusic) { levelMusic.pause(); levelMusic.currentTime = 0; }
      if (curM !== volcanoMusic) { volcanoMusic.pause(); volcanoMusic.currentTime = 0; }
      if (curM !== volcanoDescentMusic) { volcanoDescentMusic.pause(); volcanoDescentMusic.currentTime = 0; }
      if (curM.paused) {
        playCurrentMusic();
      }
    }
  }
  if (gameState === 'dojo') {
    updateDojo();
  } else {
    update();
  }
}

generateBuildings();
generateStreetLamps();
requestAnimationFrame(gameLoop);

</script>
