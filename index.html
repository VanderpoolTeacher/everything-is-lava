<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width = Math.min(900, window.innerWidth - 20);
const H = canvas.height = Math.min(550, window.innerHeight - 20);

// ── CONSTANTS ──
const GAME_FONT = "'Press Start 2P', monospace";
// Pre-computed font strings to avoid template literal allocation each frame
const FONT_7B = `bold 7px ${GAME_FONT}`;
const FONT_8B = `bold 8px ${GAME_FONT}`;
const FONT_10 = `10px ${GAME_FONT}`;
const FONT_10B = `bold 10px ${GAME_FONT}`;
const FONT_12 = `12px ${GAME_FONT}`;
const FONT_12B = `bold 12px ${GAME_FONT}`;
const FONT_13B = `bold 13px ${GAME_FONT}`;
const FONT_14B = `bold 14px ${GAME_FONT}`;
const FONT_16 = `16px ${GAME_FONT}`;
const FONT_16B = `bold 16px ${GAME_FONT}`;
const FONT_18B = `bold 18px ${GAME_FONT}`;
const FONT_20B = `bold 20px ${GAME_FONT}`;
const FONT_24B = `bold 24px ${GAME_FONT}`;
const FONT_28B = `bold 28px ${GAME_FONT}`;
const FONT_36B = `bold 36px ${GAME_FONT}`;
const FONT_42B = `bold 42px ${GAME_FONT}`;
const MAX_PARTICLES = 150;
const GRAVITY = 0.55;
const JUMP_FORCE = -11.5;
const GROUND_Y = H - 60; // street level

function getGroundY(worldX) {
  if (level !== 4) return GROUND_Y;
  // Level 4 (2-1): ground slopes upward from left to right (climbing the volcano)
  const progress = Math.min(1, levelTimer / levelDuration); // 0→1 over the level
  const startAngle = 15 * Math.PI / 180; // 15° at level start
  const endAngle = 25 * Math.PI / 180;   // 25° at level end
  const angle = startAngle + (endAngle - startAngle) * progress;
  // Rise from left to right: higher worldX = higher ground (lower Y)
  const rise = Math.tan(angle) * worldX;
  const rawY = GROUND_Y - rise;
  // Smooth flattening: ground never goes above H * 0.4
  const minY = H * 0.4;
  if (rawY < minY) {
    // Soft asymptotic approach instead of hard clamp
    const overshoot = minY - rawY;
    return minY + overshoot * 0.15; // smoothly flattens near the ceiling
  }
  return rawY;
}

const PLAYER_SPEED = 4.5;
const RUN_SPEED = 2.5; // world scroll speed

ninjaSprite.src = 'assets/ggd-clean.png';

ninjaSprite.onload = function() { spriteReady = true; };

// ── MASTER VOLUME ──
let masterVolume = 0.5;
let muted = false;
let volumeDisplayTimer = 0;

function applyMasterVolume() {
  const v = muted ? 0 : masterVolume;
  levelMusic.volume = 0.5 * v;
  dojoTracks.forEach(t => { t.volume = 0.4 * v; });
  titleMusic.volume = 0.4 * v;
  gameOverMusic.volume = 0.6 * v;
  victoryMusic.volume = 0.6 * v;
  // Web Audio nodes scale via their own gain limits * masterVolume handled in update functions
}
// applyMasterVolume() called after audio elements are created below

// ── MUSIC ──
const levelMusic = new Audio('assets/music/neo-tokyo-level-1.mp3');
levelMusic.loop = true;
levelMusic.volume = 0.5;
let musicStarted = false;

const dojoTracks = [
  new Audio('assets/music/dojo-training.mp3'),
  new Audio('assets/music/dojo-training-2.mp3')
];
dojoTracks.forEach(t => { t.loop = true; t.volume = 0.4; });
let dojoTrackIdx = 0;
function getDojoMusic() { return dojoTracks[dojoTrackIdx]; }

const titleMusic = new Audio('assets/music/title-screen.mp3');
titleMusic.loop = true;
titleMusic.volume = 0.4;

gameOverMusic.loop = false;
gameOverMusic.volume = 0.6;

const victoryMusic = new Audio('assets/music/congratulations-01.mp3');

victoryMusic.volume = 0.6;

// ── SOUND EFFECTS (Web Audio API) ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Cached noise buffers — created once, reused forever
let _splashBuf = null, _slopBuf = null, _crunchBuf = null, _crackBuf = null, _deathNoiseBuf = null;
function getSplashBuf(ac) {
  if (_splashBuf) return _splashBuf;
  const bufSize = Math.floor(ac.sampleRate * 0.35);
  _splashBuf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = _splashBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / bufSize;
    const env = (1 - t) * (1 - t);
    data[i] = ((Math.random() * 2 - 1) * 0.7 + Math.sin(i * 0.02) * 0.3) * env;
  }
  return _splashBuf;
}
function getSlopBuf(ac) {
  if (_slopBuf) return _slopBuf;
  const slopLen = Math.floor(ac.sampleRate * 0.12);
  _slopBuf = ac.createBuffer(1, slopLen, ac.sampleRate);
  const data = _slopBuf.getChannelData(0);
  for (let i = 0; i < slopLen; i++) {
    const env = Math.pow(1 - i / slopLen, 1.5);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  return _slopBuf;
}
function getCrunchBuf(ac) {
  if (_crunchBuf) return _crunchBuf;
  const len = Math.floor(ac.sampleRate * 0.25);
  _crunchBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _crunchBuf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const env = Math.pow(1 - i / len, 2);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  return _crunchBuf;
}
function getCrackBuf(ac) {
  if (_crackBuf) return _crackBuf;
  const len = Math.floor(ac.sampleRate * 0.15);
  _crackBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _crackBuf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const env = Math.pow(1 - i / len, 3);
    data[i] = (Math.random() > 0.5 ? 1 : -1) * env * (Math.random() > 0.7 ? 1 : 0.2);
  }
  return _crackBuf;
}
function getDeathNoiseBuf(ac) {
  if (_deathNoiseBuf) return _deathNoiseBuf;
  const len = Math.floor(ac.sampleRate * 0.8);
  _deathNoiseBuf = ac.createBuffer(1, len, ac.sampleRate);
  const data = _deathNoiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1);
  return _deathNoiseBuf;
}

// Auto-cleanup helper: disconnects all nodes when source ends
function autoCleanup(srcNode, allNodes) {
  srcNode.onended = () => {
    for (let i = 0; i < allNodes.length; i++) {
      try { allNodes[i].disconnect(); } catch(e) {}
    }
  };
}

// Fire/ambulance siren — slow warble between two tones
let sirenOsc = null;
let sirenGain = null;
function startSiren() {
  if (sirenOsc) return;
  const ac = getAudioCtx();
  sirenOsc = ac.createOscillator();
  sirenGain = ac.createGain();
  sirenOsc.type = 'sawtooth';
  sirenOsc.frequency.value = 600;
  sirenGain.gain.value = 0;
  sirenOsc.connect(sirenGain);
  sirenGain.connect(ac.destination);
  sirenOsc.start();
}
function updateSiren(volume, time) {
  if (!sirenOsc) return;
  const t = time || performance.now() / 1000;
  sirenOsc.frequency.value = 750 + Math.sin(t * 8) * 150;
  sirenGain.gain.value = Math.min(0.17, volume) * (muted ? 0 : masterVolume);
}
function stopSiren() {
  if (sirenOsc) {
    sirenOsc.stop();
    sirenOsc.disconnect();
    sirenOsc = null;
    sirenGain = null;
  }
}

// Police siren — fast hi-lo "woop woop"
let policeOsc1 = null, policeOsc2 = null;
let policeGain = null;
function startPoliceSiren() {
  if (policeOsc1) return;
  try {
    const ac = getAudioCtx();
    policeGain = ac.createGain();
    policeGain.gain.value = 0;
    policeGain.connect(ac.destination);

    // Primary tone — fast switching between hi and lo
    policeOsc1 = ac.createOscillator();
    policeOsc1.type = 'square';
    policeOsc1.frequency.value = 800;
    const pf1 = ac.createBiquadFilter();
    pf1.type = 'bandpass'; pf1.frequency.value = 1000; pf1.Q.value = 3;
    policeOsc1.connect(pf1);
    pf1.connect(policeGain);
    policeOsc1.start();

    // Second tone — slight detune for thickness
    policeOsc2 = ac.createOscillator();
    policeOsc2.type = 'square';
    policeOsc2.frequency.value = 810;
    const pf2 = ac.createBiquadFilter();
    pf2.type = 'bandpass'; pf2.frequency.value = 1050; pf2.Q.value = 2;
    policeOsc2.connect(pf2);
    pf2.connect(policeGain);
    policeOsc2.start();
  } catch(e) {}
}
function updatePoliceSiren(volume) {
  if (!policeOsc1) return;
  const t = performance.now() / 1000;
  // Fast hi-lo toggle (~3Hz) — 660Hz to 960Hz
  const hiLo = Math.sin(t * 18) > 0 ? 960 : 660;
  policeOsc1.frequency.value = hiLo;
  policeOsc2.frequency.value = hiLo + 12;
  policeGain.gain.value = Math.min(0.14, volume) * (muted ? 0 : masterVolume);
}
function stopPoliceSiren() {
  if (policeOsc1) { policeOsc1.stop(); policeOsc1.disconnect(); policeOsc1 = null; }
  if (policeOsc2) { policeOsc2.stop(); policeOsc2.disconnect(); policeOsc2 = null; }
  if (policeGain) { policeGain.disconnect(); policeGain = null; }
}

// School bus screaming kids — voiced yells (high and low) chopped into bursts
let busScreamNodes = null;
function startBusScream() {
  if (busScreamNodes) return;
  try {
    const ac = getAudioCtx();
    const masterGain = ac.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(ac.destination);

    // Noise buffer for breath texture
    const nBuf = ac.createBuffer(1, ac.sampleRate * 2, ac.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1);

    // HIGH YELL — child voice, triangle wave (softer than sawtooth)
    // Amplitude-modulated to chop into stuttered yelling bursts
    const hiOsc = ac.createOscillator();
    hiOsc.type = 'triangle';
    hiOsc.frequency.value = 620;
    const hiGain = ac.createGain(); hiGain.gain.value = 0;
    const hiAM = ac.createOscillator();
    hiAM.type = 'square';
    hiAM.frequency.value = 6;
    const hiAMGain = ac.createGain(); hiAMGain.gain.value = 0.4;
    const hiBP = ac.createBiquadFilter();
    hiBP.type = 'bandpass'; hiBP.frequency.value = 1800; hiBP.Q.value = 1.5;
    hiOsc.connect(hiGain); hiGain.connect(hiBP); hiBP.connect(masterGain);
    hiAM.connect(hiAMGain); hiAMGain.connect(hiGain.gain);
    hiOsc.start(); hiAM.start();

    // LOW YELL — deeper voice
    const loOsc = ac.createOscillator();
    loOsc.type = 'triangle';
    loOsc.frequency.value = 340;
    const loGain = ac.createGain(); loGain.gain.value = 0;
    const loAM = ac.createOscillator();
    loAM.type = 'square';
    loAM.frequency.value = 4.5;
    const loAMGain = ac.createGain(); loAMGain.gain.value = 0.35;
    const loBP = ac.createBiquadFilter();
    loBP.type = 'bandpass'; loBP.frequency.value = 900; loBP.Q.value = 1.2;
    loOsc.connect(loGain); loGain.connect(loBP); loBP.connect(masterGain);
    loAM.connect(loAMGain); loAMGain.connect(loGain.gain);
    loOsc.start(); loAM.start();

    // MID SHRIEK — panicked yelp
    const midOsc = ac.createOscillator();
    midOsc.type = 'triangle';
    midOsc.frequency.value = 480;
    const midGain = ac.createGain(); midGain.gain.value = 0;
    const midAM = ac.createOscillator();
    midAM.type = 'square';
    midAM.frequency.value = 7;
    const midAMGain = ac.createGain(); midAMGain.gain.value = 0.45;
    const midBP = ac.createBiquadFilter();
    midBP.type = 'bandpass'; midBP.frequency.value = 1400; midBP.Q.value = 1.3;
    midOsc.connect(midGain); midGain.connect(midBP); midBP.connect(masterGain);
    midAM.connect(midAMGain); midAMGain.connect(midGain.gain);
    midOsc.start(); midAM.start();

    // BREATH NOISE — adds realism between yells
    const noiseSrc = ac.createBufferSource();
    noiseSrc.buffer = nBuf; noiseSrc.loop = true;
    const noiseGain = ac.createGain(); noiseGain.gain.value = 0;
    const noiseBP = ac.createBiquadFilter();
    noiseBP.type = 'bandpass'; noiseBP.frequency.value = 2200; noiseBP.Q.value = 0.8;
    noiseSrc.connect(noiseBP); noiseBP.connect(noiseGain); noiseGain.connect(masterGain);
    noiseSrc.start();

    busScreamNodes = {
      masterGain,
      hi: { osc: hiOsc, gain: hiGain, am: hiAM, amGain: hiAMGain, bp: hiBP },
      lo: { osc: loOsc, gain: loGain, am: loAM, amGain: loAMGain, bp: loBP },
      mid: { osc: midOsc, gain: midGain, am: midAM, amGain: midAMGain, bp: midBP },
      noise: { src: noiseSrc, gain: noiseGain, bp: noiseBP }
    };
  } catch(e) {}
}
function updateBusScream(volume) {
  if (!busScreamNodes) return;
  const t = performance.now();
  const n = busScreamNodes;
  n.masterGain.gain.value = Math.min(0.35, volume * 0.65) * (muted ? 0 : masterVolume);

  // High yell — pitch jumps erratically like a kid screaming
  const hiPitch = 620 + Math.sin(t / 120) * 80 + (Math.sin(t / 31) > 0.5 ? 150 : 0);
  n.hi.osc.frequency.value = hiPitch;
  n.hi.am.frequency.value = 5 + Math.sin(t / 200) * 3;
  n.hi.gain.gain.value = 0.5 + (Math.sin(t / 180) > 0 ? 0.3 : 0);

  // Low yell — slower, deeper, groaning panic
  const loPitch = 340 + Math.sin(t / 170) * 60 + (Math.sin(t / 47) > 0.3 ? -80 : 40);
  n.lo.osc.frequency.value = loPitch;
  n.lo.am.frequency.value = 3.5 + Math.sin(t / 300) * 2;
  n.lo.gain.gain.value = 0.45 + (Math.sin(t / 230) > 0 ? 0.25 : 0);

  // Mid shriek — fills in gaps
  const midPitch = 480 + Math.sin(t / 90) * 100 + (Math.sin(t / 61) > 0.6 ? 120 : 0);
  n.mid.osc.frequency.value = midPitch;
  n.mid.am.frequency.value = 6 + Math.sin(t / 150) * 2.5;
  n.mid.gain.gain.value = 0.35 + (Math.sin(t / 140) > 0.2 ? 0.3 : 0);

  // Breath noise — rises when voices yell
  n.noise.gain.gain.value = 0.15 + Math.max(0, Math.sin(t / 100)) * 0.15;
  n.noise.bp.frequency.value = 2200 + Math.sin(t / 70) * 600;
}
function stopBusScream() {
  if (!busScreamNodes) return;
  const n = busScreamNodes;
  [n.hi, n.lo, n.mid].forEach(v => {
    try { v.osc.stop(); v.osc.disconnect(); } catch(e) {}
    try { v.am.stop(); v.am.disconnect(); } catch(e) {}
  });
  try { n.noise.src.stop(); n.noise.src.disconnect(); } catch(e) {}
  n.masterGain.disconnect();
  busScreamNodes = null;
}

function playLavaSplash() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const src = ac.createBufferSource();
    src.buffer = getSplashBuf(ac);
    const lpf = ac.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 1200;
    lpf.Q.value = 2;
    const bpf = ac.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = 600 + Math.random() * 400;
    bpf.Q.value = 1.2;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.45, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
    src.connect(lpf);
    lpf.connect(bpf);
    bpf.connect(gain);
    gain.connect(ac.destination);
    autoCleanup(src, [src, lpf, bpf, gain]);
    src.start();
  } catch(e) {}
}

// Flickering light buzz — soft electrical hum
let buzzOsc = null;
let buzzGain = null;
function startBuzz() {
  if (buzzOsc) return;
  const ac = getAudioCtx();
  buzzOsc = ac.createOscillator();
  buzzGain = ac.createGain();
  buzzOsc.type = 'square';
  buzzOsc.frequency.value = 120; // 120Hz electrical hum
  buzzGain.gain.value = 0;
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 300;
  buzzOsc.connect(filter);
  filter.connect(buzzGain);
  buzzGain.connect(ac.destination);
  buzzOsc.start();
}
function updateBuzz(volume) {
  if (buzzGain) buzzGain.gain.value = Math.min(0.02, volume) * (muted ? 0 : masterVolume);
}
function stopBuzz() {
  if (buzzOsc) { buzzOsc.stop(); buzzOsc.disconnect(); buzzOsc = null; buzzGain = null; }
}

// Lava drop hit ground — heavy thud + wet slop + sizzle
function playLavaHit() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Deep impact thud
    const thud = ac.createOscillator();
    thud.type = 'sine';
    thud.frequency.setValueAtTime(150, now);
    thud.frequency.exponentialRampToValueAtTime(30, now + 0.2);
    const thudGain = ac.createGain();
    thudGain.gain.setValueAtTime(0.5, now);
    thudGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    thud.connect(thudGain);
    thudGain.connect(ac.destination);
    autoCleanup(thud, [thud, thudGain]);
    thud.start(now);
    thud.stop(now + 0.25);
    // Slop layer
    const slopSrc = ac.createBufferSource();
    slopSrc.buffer = getSlopBuf(ac);
    const slopFilter = ac.createBiquadFilter();
    slopFilter.type = 'lowpass';
    slopFilter.frequency.value = 400 + Math.random() * 200;
    slopFilter.Q.value = 3;
    const slopGain = ac.createGain();
    slopGain.gain.setValueAtTime(0.4, now);
    slopGain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
    slopSrc.connect(slopFilter);
    slopFilter.connect(slopGain);
    slopGain.connect(ac.destination);
    autoCleanup(slopSrc, [slopSrc, slopFilter, slopGain]);
    slopSrc.start(now);
    // Sizzle tail
    playLavaSplash();
  } catch(e) {}
}

// Death scream — descending "arghh" with wavering pitch
function playDeathSound() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Voice-like "argh"
    const voice = ac.createOscillator();
    voice.type = 'sawtooth';
    voice.frequency.setValueAtTime(400, now);
    voice.frequency.linearRampToValueAtTime(350, now + 0.1);
    voice.frequency.linearRampToValueAtTime(180, now + 0.6);
    voice.frequency.linearRampToValueAtTime(80, now + 1.0);
    // Vibrato LFO
    const vibrato = ac.createOscillator();
    vibrato.frequency.value = 6;
    const vibratoGain = ac.createGain();
    vibratoGain.gain.value = 15;
    vibrato.connect(vibratoGain);
    vibratoGain.connect(voice.frequency);
    vibrato.start(now);
    vibrato.stop(now + 1.0);
    // Formants
    const formant = ac.createBiquadFilter();
    formant.type = 'bandpass';
    formant.frequency.setValueAtTime(800, now);
    formant.frequency.linearRampToValueAtTime(400, now + 0.8);
    formant.Q.value = 2;
    const formant2 = ac.createBiquadFilter();
    formant2.type = 'bandpass';
    formant2.frequency.setValueAtTime(1200, now);
    formant2.frequency.linearRampToValueAtTime(600, now + 0.8);
    formant2.Q.value = 1.5;
    // Envelope
    const env = ac.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.15, now + 0.05);
    env.gain.setValueAtTime(0.15, now + 0.3);
    env.gain.linearRampToValueAtTime(0.08, now + 0.6);
    env.gain.linearRampToValueAtTime(0, now + 1.0);
    // Noise layer for breathiness (cached buffer)
    const noise = ac.createBufferSource();
    noise.buffer = getDeathNoiseBuf(ac);
    const noiseGain = ac.createGain();
    noiseGain.gain.setValueAtTime(0.04, now);
    noiseGain.gain.linearRampToValueAtTime(0, now + 0.8);
    const noiseFilter = ac.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 1000;
    noiseFilter.Q.value = 0.8;
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ac.destination);
    noise.start(now);
    // Connect voice chain
    voice.connect(formant);
    voice.connect(formant2);
    formant.connect(env);
    formant2.connect(env);
    env.connect(ac.destination);
    // Auto-cleanup when voice ends (longest sound)
    autoCleanup(voice, [voice, vibrato, vibratoGain, formant, formant2, env, noise, noiseGain, noiseFilter]);
    voice.start(now);
    voice.stop(now + 1.0);
  } catch(e) {}
}

// ── EXPLOSION ANIMATION SYSTEM ──
let explosions = [];

function playExplosionSound() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Deep boom
    const boom = ac.createOscillator();
    boom.type = 'sine';
    boom.frequency.setValueAtTime(200, now);
    boom.frequency.exponentialRampToValueAtTime(20, now + 0.4);
    const boomGain = ac.createGain();
    boomGain.gain.setValueAtTime(0.6, now);
    boomGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    boom.connect(boomGain);
    boomGain.connect(ac.destination);
    autoCleanup(boom, [boom, boomGain]);
    boom.start(now);
    boom.stop(now + 0.5);
    // Crunch (cached buffer)
    const crunchSrc = ac.createBufferSource();
    crunchSrc.buffer = getCrunchBuf(ac);
    const crunchFilter = ac.createBiquadFilter();
    crunchFilter.type = 'lowpass';
    crunchFilter.frequency.setValueAtTime(2000, now);
    crunchFilter.frequency.exponentialRampToValueAtTime(200, now + 0.25);
    const crunchGain = ac.createGain();
    crunchGain.gain.setValueAtTime(0.5, now);
    crunchGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    crunchSrc.connect(crunchFilter);
    crunchFilter.connect(crunchGain);
    crunchGain.connect(ac.destination);
    autoCleanup(crunchSrc, [crunchSrc, crunchFilter, crunchGain]);
    crunchSrc.start(now);
    // High crackle (cached buffer)
    const crackSrc = ac.createBufferSource();
    crackSrc.buffer = getCrackBuf(ac);
    const crackFilter = ac.createBiquadFilter();
    crackFilter.type = 'bandpass';
    crackFilter.frequency.value = 3000;
    crackFilter.Q.value = 1;
    const crackGain = ac.createGain();
    crackGain.gain.setValueAtTime(0.25, now);
    crackGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    crackSrc.connect(crackFilter);
    crackFilter.connect(crackGain);
    crackGain.connect(ac.destination);
    autoCleanup(crackSrc, [crackSrc, crackFilter, crackGain]);
    crackSrc.start(now);
  } catch(e) {}
}

function spawnExplosion(x, y, size) {
  explosions.push({
    x, y,
    radius: 4,
    maxRadius: size || 60,
    life: 40,
    maxLife: 40,
    // Debris chunks
    debris: Array.from({ length: 12 }, () => ({
      x, y,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 10 - 2,
      size: 3 + Math.random() * 6,
      color: ['#ff6600', '#ffcc00', '#ff2200', '#333333', '#666666'][Math.random() * 5 | 0],
      rot: Math.random() * 6.28,
      rotV: (Math.random() - 0.5) * 0.4
    }))
  });
  playExplosionSound();
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.life--;
    const progress = 1 - e.life / e.maxLife;
    e.radius = e.maxRadius * Math.pow(progress, 0.4); // fast expand, slow end
    // Update debris
    for (const d of e.debris) {
      d.vy += 0.3; // gravity
      d.x += d.vx;
      d.y += d.vy;
      d.rot += d.rotV;
      d.vx *= 0.97; // drag
    }
    if (e.life <= 0) explosions.splice(i, 1);
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const progress = 1 - e.life / e.maxLife;
    const alpha = e.life / e.maxLife;

    // Expanding fireball — bright core fading to smoke
    if (progress < 0.6) {
      // Inner bright flash
      const innerAlpha = alpha * (1 - progress / 0.6);
      const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
      grad.addColorStop(0, `rgba(255, 255, 200, ${innerAlpha * 0.9})`);
      grad.addColorStop(0.3, `rgba(255, 150, 0, ${innerAlpha * 0.7})`);
      grad.addColorStop(0.6, `rgba(255, 50, 0, ${innerAlpha * 0.4})`);
      grad.addColorStop(1, `rgba(100, 20, 0, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Smoke ring (later phase)
    if (progress > 0.2) {
      const smokeAlpha = alpha * 0.4;
      ctx.globalAlpha = smokeAlpha;
      const smokeGrad = ctx.createRadialGradient(e.x, e.y, e.radius * 0.5, e.x, e.y, e.radius * 1.3);
      smokeGrad.addColorStop(0, 'rgba(60, 40, 20, 0)');
      smokeGrad.addColorStop(0.5, `rgba(40, 30, 15, ${smokeAlpha})`);
      smokeGrad.addColorStop(1, 'rgba(20, 15, 10, 0)');
      ctx.fillStyle = smokeGrad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius * 1.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Debris chunks
    for (const d of e.debris) {
      if (d.y > GROUND_Y + 20) continue;
      ctx.globalAlpha = alpha * 0.9;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.fillStyle = d.color;
      ctx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

// ── VEHICLE DEBRIS SYSTEM ──
let vehicleDebris = [];

function spawnVehicleDebris(x, y, w, h, type) {
  // Color palettes per vehicle type
  let colors;
  if (type === 'schoolbus') {
    colors = ['#ddaa00', '#aa7700', '#ffcc22', '#111111', '#666666', '#88ccff', '#ddaa00', '#aa7700'];
  } else if (type === 'firetruck') {
    colors = ['#cc2222', '#881111', '#ee4444', '#ffcc00', '#666666', '#88ccff', '#cc2222', '#881111'];
  } else if (type === 'ambulance') {
    colors = ['#dddddd', '#999999', '#ff3333', '#2266cc', '#666666', '#88ccff', '#dddddd', '#999999'];
  } else {
    colors = ['#1133aa', '#0a2277', '#ffffff', '#333333', '#666666', '#88ccff', '#1133aa', '#0a2277'];
  }

  const numChunks = 16 + Math.floor(Math.random() * 8);
  for (let i = 0; i < numChunks; i++) {
    // Spawn from random positions within the vehicle bounds
    const sx = x + (Math.random() - 0.5) * w * 0.8;
    const sy = y + (Math.random() - 0.5) * h * 0.6;
    const isWheel = i < 4;
    const isGlass = i >= 4 && i < 7;
    vehicleDebris.push({
      x: sx, y: sy,
      vx: (Math.random() - 0.5) * 18,
      vy: -Math.random() * 14 - 4,
      w: isWheel ? 12 + Math.random() * 6 : (isGlass ? 10 + Math.random() * 12 : 8 + Math.random() * 16),
      h: isWheel ? 12 + Math.random() * 6 : (isGlass ? 8 + Math.random() * 6 : 6 + Math.random() * 10),
      color: isWheel ? '#222222' : (isGlass ? 'rgba(120,200,255,0.7)' : colors[Math.random() * colors.length | 0]),
      rot: Math.random() * 6.28,
      rotV: (Math.random() - 0.5) * 0.5,
      life: 60 + Math.floor(Math.random() * 40),
      maxLife: 100,
      bounced: false
    });
  }
}

function updateVehicleDebris() {
  for (let i = vehicleDebris.length - 1; i >= 0; i--) {
    const d = vehicleDebris[i];
    d.vy += 0.45; // gravity
    d.x += d.vx;
    d.y += d.vy;
    d.rot += d.rotV;
    d.vx *= 0.98; // air drag
    d.life--;

    // Bounce off ground
    if (d.y > GROUND_Y - 5 && !d.bounced) {
      d.vy = -Math.abs(d.vy) * 0.35;
      d.vx *= 0.6;
      d.rotV *= 1.5;
      d.y = GROUND_Y - 5;
      d.bounced = true;
    }

    if (d.life <= 0 || d.y > H + 50) {
      vehicleDebris.splice(i, 1);
    }
  }
}

function drawVehicleDebris() {
  for (const d of vehicleDebris) {
    if (d.x < -50 || d.x > W + 50 || d.y < -50 || d.y > H + 50) continue;
    const alpha = Math.min(1, d.life / 30);
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    // Add a dark edge for depth
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-d.w / 2, -d.h / 2, d.w, d.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ── INPUT ──
const keys = {};
let jumpBuffered = false;

// ── KONAMI CODE: up up down down left right left right b a → then press 1/2/3 for level ──
const KONAMI_SEQ = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA'];
let konamiIndex = 0;
let konamiActive = false; // true after code entered, waiting for level number
let konamiUsed = false;   // true if player used konami to reach a level (score stays 0)
let showHelpOverlay = false; // toggle with ? key

window.addEventListener('keydown', e => {
  keys[e.code] = true;

  // Volume controls: M = mute, +/- = adjust
  if (e.code === 'KeyM') {
    muted = !muted;
    applyMasterVolume();
    volumeDisplayTimer = 90;
    return;
  }
  if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    masterVolume = Math.min(1.0, Math.round((masterVolume + 0.1) * 10) / 10);
    muted = false;
    applyMasterVolume();
    volumeDisplayTimer = 90;
    return;
  }
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    masterVolume = Math.max(0, Math.round((masterVolume - 0.1) * 10) / 10);
    applyMasterVolume();
    volumeDisplayTimer = 90;
    return;
  }

  // R key — open README in new tab
  if (e.code === 'KeyR' && gameState !== 'playing' && gameState !== 'dojo') {
    window.open('README.md', '_blank');
    return;
  }

  // ? key (Slash with Shift) — toggle help overlay
  if (e.code === 'Slash') {
    showHelpOverlay = !showHelpOverlay;
    return;
  }

  // Any other key dismisses help overlay
  if (showHelpOverlay) {
    showHelpOverlay = false;
    return;
  }

  // Konami code detection — enter code, then press 1/2/3 to jump to level
  if (konamiActive) {
    // Waiting for level number after code was entered
    const levelNum = e.code === 'Digit1' ? 1 : e.code === 'Digit2' ? 2 : e.code === 'Digit3' ? 3 : e.code === 'Digit4' ? 4 : 0;
    if (levelNum > 0) {
      konamiActive = false;
      konamiUsed = true;
      // Stop all audio
      levelMusic.pause(); levelMusic.currentTime = 0;
      titleMusic.pause(); titleMusic.currentTime = 0;
      gameOverMusic.pause(); gameOverMusic.currentTime = 0;
      victoryMusic.pause(); victoryMusic.currentTime = 0;
      dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
      stopSiren(); stopPoliceSiren(); stopBusScream(); stopBuzz();
      // Set up level
      level = levelNum;
      score = 0;
      lives = MAX_LIVES;
      levelDuration = 1800 + level * 300;
      levelTimer = 0;
      frameCount = 0;
      scrollOffset = 0;
      deathTimer = 0;
      villageProgress = 0;
      creditsTimer = 0;
      player.x = 150;
      player.y = GROUND_Y - SPRITE_H;
      player.vy = 0; player.vx = 0;
      player.grounded = true; player.jumping = false;
      player.doubleJumped = false; player.trail = [];
      player.alive = true; player.runFrame = 0;
      player.spinAngle = 0; player.spinTimer = 0;
      player.kicking = false; player.kickTimer = 0;
      player.facingRight = true; player.idleTimer = 0;
      player.invincible = 120;
      lavaDrops = []; lavaPools = []; particles = [];
      warningMarkers = []; vehicles = []; explosions = []; vehicleDebris = [];
      generateBuildings(); generateStreetLamps();
      gameState = 'playing';
      musicStarted = true;
      levelMusic.currentTime = 0;
      levelMusic.play().catch(() => {});
      return;
    }
    // Any non-number key cancels konami
    konamiActive = false;
    // fall through to normal input handling
  }
  if (e.code === KONAMI_SEQ[konamiIndex]) {
    konamiIndex++;
    if (konamiIndex >= KONAMI_SEQ.length) {
      konamiIndex = 0;
      konamiActive = true; // waiting for level number
      return;
    }
  } else {
    konamiIndex = e.code === KONAMI_SEQ[0] ? 1 : 0;
  }

  // First interaction on menu — unlock audio and absorb the input
  if (gameState === 'menu' && !titleMusicUnlocked) {
    titleMusicUnlocked = true;
    titleMusic.currentTime = 0;
    titleMusic.play().catch(() => {});
    return; // absorb this input — just start the music
  }

  // ── G-G-D sequence detection on menu screen ──
  if (gameState === 'menu') {
    const key = e.code;
    if (key === 'KeyG' || key === 'KeyD') {
      dojoKeyBuffer += key === 'KeyG' ? 'g' : 'd';
      dojoKeyTimer = 60; // reset timeout
      if (dojoKeyBuffer.endsWith('ggd')) {
        enterDojo();
        dojoKeyBuffer = '';
        return;
      }
      // Keep only last 3 chars
      if (dojoKeyBuffer.length > 3) dojoKeyBuffer = dojoKeyBuffer.slice(-3);
    } else if (key !== 'ShiftLeft' && key !== 'ShiftRight') {
      dojoKeyBuffer = ''; // reset on any other key
    }
  }

  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if ((gameState === 'menu' || gameState === 'levelComplete') && e.code !== 'ArrowUp') {
      startGame();
    } else if (gameState === 'dead' && deathTimer >= DEATH_RESTART_DELAY) {
      // Respawn with remaining lives (continue level)
      respawnPlayer();
    } else if (gameState === 'gameover' && gameOverScrollDone) {
      // Full restart from game over — only after scroll completes
      startGame();
    } else if (gameState === 'victory' && victoryScrollDone) {
      // Full restart after victory scroll completes
      clearGameState();
      gameState = 'menu';
      menuScrollY = -480;
      titleMusic.currentTime = 0;
      titleMusic.play().catch(() => {});
    } else if (gameState === 'dojo') {
      jumpBuffered = true;
    } else {
      jumpBuffered = true;
    }
  }

  // Escape exits dojo back to menu
  if (e.code === 'Escape' && gameState === 'dojo') {
    clearGameState();
    gameState = 'menu';
    menuScrollY = -480;
    titleMusic.currentTime = 0;
    titleMusic.play().catch(() => {});
    return;
  }

  // M key — switch dojo music track
  if (e.code === 'KeyM' && gameState === 'dojo') {
    getDojoMusic().pause();
    dojoTrackIdx = (dojoTrackIdx + 1) % dojoTracks.length;
    getDojoMusic().currentTime = 0;
    getDojoMusic().play().catch(() => {});
  }

  // Kick removed from arrow/movement keys
});

// ── GAME CONTROL ──
function clearGameState() {
  // Wipe all gameplay arrays and audio to ensure clean slate
  lavaDrops = [];
  lavaPools = [];
  particles = [];
  warningMarkers = [];
  vehicles = [];
  rocks = [];
  moltenRocks = [];
  explosions = [];
  vehicleDebris = [];
  shakeTimer = 0;
  flashTimer = 0;
  deathTimer = 0;
  levelTimer = 0;
  creditsTimer = 0;
  scrollOffset = 0;
  frameCount = 0;
  villageProgress = 0;
  stopSiren();
  stopPoliceSiren();
  stopBusScream();
  stopBuzz();
  levelMusic.pause();
  levelMusic.currentTime = 0;
  gameOverMusic.pause();
  gameOverMusic.currentTime = 0;
  victoryMusic.pause();
  victoryMusic.currentTime = 0;
  dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
}

function startGame() {
  const fromLevelComplete = gameState === 'levelComplete';
  if (fromLevelComplete) {
    level = Math.min(level + 1, 4);
    levelDuration = 1800 + level * 300;
  } else {
    level = 1;
    score = 0;
    lives = MAX_LIVES;
    levelDuration = 1800;
    konamiUsed = false; // reset cheat flag on normal game start
    totalAttempts++;
  }
  gameState = 'transition';
  transitionTimer = 150; // ~2.5 seconds
  // Fresh game: credits will overlay on level 1 gameplay
  if (!fromLevelComplete && level === 1) {
    creditsTimer = 1; // >0 means credits are active
  } else {
    creditsTimer = 0;
  }

  // Stop audio during transition (keep level music if continuing)
  titleMusic.pause();
  titleMusic.currentTime = 0;
  if (level === 1) {
    // Fresh game — silence level music
    levelMusic.pause();
    levelMusic.currentTime = 0;
  }
  // Level music keeps playing through level transitions
  gameOverMusic.pause();
  gameOverMusic.currentTime = 0;
  victoryMusic.pause();
  victoryMusic.currentTime = 0;
  dojoTracks.forEach(t => { t.pause(); t.currentTime = 0; });
  stopSiren();
  stopPoliceSiren();
  stopBusScream();
  stopBuzz();
  musicStarted = true;
  frameCount = 0;
  levelTimer = 0;
  scrollOffset = 0;
  deathTimer = 0;
  villageProgress = 0;
  player.x = 150;
  player.y = getGroundY(150 + scrollOffset) - SPRITE_H;
  player.vy = 0;
  player.vx = 0;
  player.grounded = true;
  player.jumping = false;
  player.doubleJumped = false;
  player.trail = [];
  player.alive = true;
  player.runFrame = 0;
  player.spinAngle = 0;
  player.spinTimer = 0;
  player.kicking = false;
  player.kickTimer = 0;
  player.facingRight = true;
  player.idleTimer = 0;
  player.invincible = 0;
  lavaDrops = [];
  lavaPools = [];
  particles = [];
  warningMarkers = [];
  vehicles = [];
  rocks = [];
  moltenRocks = [];
  explosions = [];
  vehicleDebris = [];
  generateBuildings();
  if (level < 4) {
    generateStreetLamps();
  }
  if (level === 4) {
    generateTrees();
    generateRuins();
  }
}

function respawnPlayer() {
  // Continue the level with one less life
  gameState = 'playing';
  deathTimer = 0;
  player.x = 150;
  player.y = getGroundY(150 + scrollOffset) - SPRITE_H;
  player.vy = 0;
  player.vx = 0;
  player.grounded = true;
  player.jumping = false;
  player.doubleJumped = false;
  player.trail = [];
  player.alive = true;
  player.runFrame = 0;
  player.spinAngle = 0;
  player.spinTimer = 0;
  player.kicking = false;
  player.kickTimer = 0;
  player.facingRight = true;
  player.idleTimer = 0;
  player.invincible = 120; // ~2 seconds of invincibility
  // Clear immediate threats near player
  lavaDrops = [];
  warningMarkers = [];
  // Restore music volume
  levelMusic.volume = 0.5;
  levelMusic.play().catch(() => {});
}

// ── UPDATE ──
function update() {
  if (gameState !== 'playing') return;

  frameCount++;
  levelTimer++;
  scrollOffset += RUN_SPEED;
  if (player.invincible > 0) player.invincible--;

  // Village transition — last 600 frames (~10 seconds) of level 3
  const VILLAGE_LEAD_IN = 600;
  if (level >= 3 && levelTimer > levelDuration - VILLAGE_LEAD_IN) {
    villageProgress = Math.min(1, (levelTimer - (levelDuration - VILLAGE_LEAD_IN)) / VILLAGE_LEAD_IN);
    // Fade music as village approaches
    const v = muted ? 0 : masterVolume;
    levelMusic.volume = 0.5 * v * (1 - villageProgress * 0.85); // fades to 15% volume
  } else {
    villageProgress = 0;
  }

  // Level complete?
  if (levelTimer >= levelDuration) {
    if (!konamiUsed) score += level * 1000;
    if (level >= 4) {
      // Stop all gameplay audio
      levelMusic.pause();
      levelMusic.currentTime = 0;
      stopSiren();
      stopPoliceSiren();
      stopBusScream();
      stopBuzz();
      // Life bonus: 1000 per life, 10000 if all 5
      const lifeBonus = konamiUsed ? 0 : (lives >= MAX_LIVES ? 10000 : lives * 1000);
      victoryBaseScore = konamiUsed ? 0 : score;
      victoryLifeBonus = lifeBonus;
      if (!konamiUsed) score += lifeBonus;
      // Beat the game!
      gameState = 'victory';
      victoryScrollDone = false;
      victoryLegendCache = buildVictoryLegend();
      deathTimer = 0;
      victoryMusic.currentTime = 0;
      victoryMusic.play().catch(() => {});
    } else {
      // Skip straight to next level
      gameState = 'levelComplete'; // set so startGame() knows to advance
      startGame();
    }
    return;
  }

  // Score (always 0 if konami code was used)
  score = konamiUsed ? 0 : Math.floor(levelTimer / 3) + (level - 1) * 1000;

  // Spawn lava drops - rate increases with level and time
  // Taper off during village transition (lava stops near the village)
  const dropRate = level === 4
    ? Math.max(20, 40 - levelTimer * 0.007)
    : Math.max(15, 60 - level * 8 - levelTimer * 0.005);
  const lavaChance = villageProgress > 0.5 ? Math.max(0, 1 - (villageProgress - 0.5) * 2) : 1;
  if (frameCount % Math.floor(dropRate) === 0 && Math.random() < lavaChance) {
    spawnLavaDrop();
  }

  // Handle jump
  if (jumpBuffered) {
    if (player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      player.jumping = true;
      player.doubleJumped = false;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#44bbff', 6, 3);
    } else if (!player.doubleJumped) {
      player.vy = JUMP_FORCE * 0.82;
      player.doubleJumped = true;
      player.spinAngle = 0;
      player.spinTimer = 0;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#66ddff', 10, 5);
    }
    jumpBuffered = false;
  }

  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // Horizontal movement
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = PLAYER_SPEED;
  player.x += moveX;
  player.x = Math.max(10, Math.min(W - player.w - 10, player.x));

  // Track facing direction
  if (moveX > 0) player.facingRight = true;
  else if (moveX < 0) player.facingRight = false;

  // Idle detection — drop lava on player if they don't move for ~1 second
  const isMoving = moveX !== 0 || !player.grounded || player.kicking;
  if (isMoving) {
    player.idleTimer = 0;
  } else {
    player.idleTimer++;
    if (player.idleTimer === 60) { // ~1 second at 60fps
      // Target lava drop right at the player's position
      const playerWorldX = player.x + player.w / 2 + scrollOffset;
      warningMarkers.push({ worldX: playerWorldX, life: 40, maxLife: 40 });
      setTimeout(() => {
        if (gameState !== 'playing') return;
        lavaDrops.push({
          worldX: playerWorldX + (Math.random() - 0.5) * 10,
          y: -20,
          vy: 5 + level * 0.3,
          size: 8
        });
      }, 500);
      player.idleTimer = -30; // cooldown before next idle drop
    }
  }

  // Kick: pressing forward while grounded
  if (player.grounded && moveX !== 0 && !player.kicking) {
    // Kick triggers on double-tap forward (or just holding forward + press shift)
  }
  // Update kick timer
  if (player.kicking) {
    player.kickTimer++;
    if (player.kickTimer > 20) { // kick lasts ~20 frames
      player.kicking = false;
      player.kickTimer = 0;
    }
  }

  // Spin only during double jump — eased: fast wind-up, smooth ease-out
  if (!player.grounded && player.doubleJumped) {
    player.spinTimer++;
    const t = player.spinTimer;
    const spinDuration = 24; // frames for full 360
    if (t <= spinDuration) {
      // Ease-out cubic: starts fast, decelerates
      const progress = t / spinDuration;
      const eased = 1 - Math.pow(1 - progress, 3);
      player.spinAngle = eased * Math.PI * 2;
    } else {
      player.spinAngle = Math.PI * 2; // locked at full rotation
    }
  } else if (player.grounded) {
    player.spinAngle = 0;
    player.spinTimer = 0;
  }

  // Street lamp platform collision (check before ground so lamps take priority)
  if (level < 4) {
    for (const lamp of streetLamps) {
      const lsx = lamp.worldX - scrollOffset; // screen x of lamp center
      const platLeft = lsx - lamp.lampW / 2;
      const platRight = lsx + lamp.lampW / 2;
      const platTop = GROUND_Y - lamp.poleH - lamp.lampH;
      const platBot = GROUND_Y - lamp.poleH;

      // Player is above the platform and falling onto it
      if (
        player.vy >= 0 &&
        player.x + player.w > platLeft &&
        player.x < platRight &&
        player.y + player.h >= platTop &&
        player.y + player.h <= platBot + player.vy + 4
      ) {
        player.y = platTop - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
      }
    }
  }

  // Tree platform collision (level 4)
  if (level === 4) {
    for (const t of trees) {
      if (t.collapsed) continue;
      const tsx = t.worldX - scrollOffset;
      if (tsx < -100 || tsx > W + 100) continue;
      const baseY = getGroundY(t.worldX);
      const platTop = baseY - t.height - t.canopyH;
      const platBot = baseY - t.height;
      const halfW = t.canopyW / 2;
      if (
        player.vy >= 0 &&
        player.x + player.w > tsx - halfW &&
        player.x < tsx + halfW &&
        player.y + player.h >= platTop &&
        player.y + player.h <= platBot + player.vy + 4
      ) {
        player.y = platTop - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
      }
    }
  }

  // Firetruck ladder platform collision (extended ladder trucks only)
  for (const v of vehicles) {
    if (!v.ladderExtended) continue;
    // Ladder geometry matches draw code: base at vehicle-local (bx+10, by-1)*P, angle -1.1 rad, length 18*P
    const VP = 8; // vehicle pixel size
    const bw = 22, bh = 7;
    const bx = -bw / 2, by = -bh / 2 - 1;
    const ladderBaseX = v.x + v.w / 2 + (bx + 10) * VP;
    const ladderBaseY = v.y + v.h / 2 + (by - 1) * VP;
    const ladderAngle = -1.1;
    const ladderLen = 18 * VP; // 144px
    const cosA = Math.cos(ladderAngle);
    const sinA = Math.sin(ladderAngle);

    // Check several points along the ladder as mini-platforms
    for (let t = 0.15; t <= 1.0; t += 0.1) {
      const px = ladderBaseX + cosA * ladderLen * t;
      const py = ladderBaseY + sinA * ladderLen * t;
      const platW = 16; // hitbox width at each sample point
      const platH = 8;  // hitbox thickness

      if (
        player.vy >= 0 &&
        player.x + player.w > px - platW / 2 &&
        player.x < px + platW / 2 &&
        player.y + player.h >= py - platH / 2 &&
        player.y + player.h <= py + platH / 2 + player.vy + 4
      ) {
        player.y = py - platH / 2 - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumping = false;
        player.doubleJumped = false;
        // Move player with the truck
        player.x += v.speed * v.dir;
        break;
      }
    }
  }

  // Generate more lamps ahead as player progresses (evenly spaced)
  if (streetLamps.length > 0) {
    const lastLamp = streetLamps[streetLamps.length - 1];
    if (lastLamp.worldX - scrollOffset < W + 500) {
      const wx = lastLamp.worldX + LAMP_SPACING;
      streetLamps.push({
        worldX: wx,
        poleH: 135,
        lampW: 28,
        lampH: 8,
        glowColor: Math.random() > 0.3 ? '#ffcc44' : '#ff8833',
        flickerPhase: Math.random() * 6.28,
        flickering: Math.random() < 0.45
      });
    }
  }

  // Remove lamps that scrolled far off screen left
  while (streetLamps.length > 0 && streetLamps[0].worldX - scrollOffset < -200) {
    streetLamps.shift();
  }

  // Ground collision
  const playerGroundY = getGroundY(player.x + scrollOffset);
  if (player.y + player.h >= playerGroundY) {
    player.y = playerGroundY - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumping = false;
    player.doubleJumped = false;
  }

  // Run animation
  if (player.grounded && (moveX !== 0 || true)) {
    player.runTimer++;
    if (player.runTimer > 5) {
      player.runFrame = (player.runFrame + 1) % 4;
      player.runTimer = 0;
    }
  }

  // Trail
  player.trail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, life: 12 });
  if (player.trail.length > 15) player.trail.shift();
  player.trail.forEach(t => t.life--);

  // Update lava drops (world coords)
  for (let i = lavaDrops.length - 1; i >= 0; i--) {
    const d = lavaDrops[i];
    d.vy += 0.15;
    d.y += d.vy;
    const screenX = d.worldX - scrollOffset;

    // Hit ground
    const dropGroundY = getGroundY(d.worldX);
    if (d.y >= dropGroundY - 4) {
      spawnParticles(screenX, dropGroundY, '#ff4400', 8, 4);
      spawnParticles(screenX, dropGroundY, '#ffaa00', 5, 3);
      spawnLavaPool(d.worldX);
      playLavaHit();
      lavaDrops.splice(i, 1);
      shakeTimer = 4;
      continue;
    }

    // Hit player while falling (compare in screen space)
    if (
      screenX > player.x && screenX < player.x + player.w &&
      d.y + d.size > player.y && d.y < player.y + player.h
    ) {
      die();
      return;
    }

    // Remove if scrolled way off screen
    if (screenX < -100 || screenX > W + 100) {
      lavaDrops.splice(i, 1);
    }
  }

  // Update lava pools (world coords)
  for (let i = lavaPools.length - 1; i >= 0; i--) {
    const p = lavaPools[i];
    p.life--;
    const screenX = p.worldX - scrollOffset;

    // Remove if expired or scrolled off left
    if (p.life <= 0 || screenX + p.w < -200) {
      lavaPools.splice(i, 1);
      continue;
    }

    // Player collision with pool (only when grounded or falling into it)
    if (player.grounded || player.vy > 0) {
      const px = player.x + player.w / 2;
      const py = player.y + player.h;
      if (px > screenX - p.w / 2 + 6 && px < screenX + p.w / 2 - 6 && py >= GROUND_Y - 4) {
        die();
        return;
      }
    }
  }

  // Lava-tree contact detection (level 4)
  if (level === 4) {
    for (const t of trees) {
      if (t.burning || t.collapsed) continue;
      const tsx = t.worldX - scrollOffset;
      const baseY = getGroundY(t.worldX);
      const treeTop = baseY - t.height - t.canopyH;
      // Check lava drops
      for (const d of lavaDrops) {
        const dsx = d.worldX - scrollOffset;
        if (Math.abs(dsx - tsx) < t.canopyW / 2 + 10 && d.y >= treeTop && d.y <= baseY) {
          t.burning = true;
          break;
        }
      }
      // Check lava pools under the tree
      if (!t.burning) {
        for (const p of lavaPools) {
          const psx = p.worldX - scrollOffset;
          if (Math.abs(psx - tsx) < (p.w / 2 + t.trunkW / 2)) {
            t.burning = true;
            break;
          }
        }
      }
    }
  }

  // Burn timer update (level 4)
  if (level === 4) {
    for (const t of trees) {
      if (t.burning && !t.collapsed) {
        t.burnTimer++;
        if (t.burnTimer >= 210) {
          t.collapsed = true;
          // Ember particles
          const tsx = t.worldX - scrollOffset;
          const baseY = getGroundY(t.worldX);
          for (let i = 0; i < 8; i++) {
            particles.push({
              x: tsx + (Math.random() - 0.5) * t.canopyW,
              y: baseY - t.height - Math.random() * t.canopyH,
              vx: (Math.random() - 0.5) * 2,
              vy: -1 - Math.random() * 2,
              life: 60 + Math.random() * 40,
              maxLife: 100,
              color: `rgb(255, ${100 + Math.random() * 100 | 0}, 0)`
            });
          }
        }
      }
    }
  }

  // Rolling rocks (level 4)
  if (level === 4) {
    const progress = levelTimer / levelDuration;
    let rockRate;
    if (progress < 0.33) rockRate = 100;
    else if (progress < 0.66) rockRate = 70;
    else rockRate = 50;
    if (levelTimer % rockRate === 0) spawnRock();

    for (let i = rocks.length - 1; i >= 0; i--) {
      const r = rocks[i];
      r.worldX -= r.speed;
      r.rotation += r.rotationSpeed;
      // Remove if off screen left
      if (r.worldX < scrollOffset - 100) {
        rocks.splice(i, 1);
        continue;
      }
      // Player collision — knockback only, no kill
      if (!player.invincible) {
        const sx = r.worldX - scrollOffset;
        const cy = getGroundY(r.worldX) - r.radius;
        const px = player.x + player.w / 2;
        const py = player.y + player.h / 2;
        const dx = px - sx;
        const dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < r.radius + player.w / 3) {
          player.x -= r.knockback;
          if (player.x < 0) player.x = 0;
          player.invincible = 20;
          shakeTimer = 8;
          spawnParticles(sx, cy, '#8b7355', 8, 4);
          rocks.splice(i, 1);
          continue;
        }
      }
    }
  }

  // Molten rocks (level 4)
  if (level === 4) {
    const progress = levelTimer / levelDuration;
    let moltenRate;
    if (progress < 0.33) moltenRate = 200;
    else if (progress < 0.66) moltenRate = 150;
    else moltenRate = 100;
    if ((levelTimer + 50) % moltenRate === 0) spawnMoltenRock();

    for (let i = moltenRocks.length - 1; i >= 0; i--) {
      const mr = moltenRocks[i];
      mr.worldX -= mr.speed;
      mr.rotation += mr.rotationSpeed;
      mr.glowPhase += 0.1;
      // Remove if off screen left
      if (mr.worldX < scrollOffset - 100) {
        moltenRocks.splice(i, 1);
        continue;
      }
      // Lava trail — 5% chance per frame
      if (Math.random() < 0.05) {
        spawnLavaPool(mr.worldX, true);
      }
      // Player collision — INSTANT KILL
      const sx = mr.worldX - scrollOffset;
      const cy = getGroundY(mr.worldX) - mr.radius;
      const px = player.x + player.w / 2;
      const py = player.y + player.h / 2;
      const dx = px - sx;
      const dy = py - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < mr.radius + player.w / 3) {
        die();
        return;
      }
    }
  }

  // Update warning markers (world coords)
  for (let i = warningMarkers.length - 1; i >= 0; i--) {
    warningMarkers[i].life--;
    if (warningMarkers[i].life <= 0) warningMarkers.splice(i, 1);
  }

  // Update particles (screen space, also drift left with scroll)
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx - RUN_SPEED; // drift with world scroll
    p.y += p.vy;
    p.vy += 0.12;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update neon sign blinking
  for (let si = 0; si < neonSigns.length; si++) neonSigns[si].blink += neonSigns[si].blinkSpeed;

  // Spawn emergency vehicles (no vehicles in level 4 — destroyed wasteland):
  if (level < 4) {
    // 0) Level 1: school bus right away — sets the tone
    // 1) School bus at exactly 1/3 mark
    // 2) Regular vehicle shortly after
    // 3) More frequent random spawns in second half, biased from right
    if (level === 1 && levelTimer === 60) {
      spawnVehicle('schoolbus');
    }
    // Guaranteed ladder truck early in level 2
    if (level === 2 && levelTimer === 90) {
      spawnVehicle('firetruck', true);
    }
    const thirdMark = Math.floor(levelDuration / 3);
    if (levelTimer === thirdMark) {
      spawnVehicle('schoolbus');
    }
    if (levelTimer === thirdMark + 60) {
      spawnVehicle(); // follow-up emergency vehicle
    }
    if (levelTimer > levelDuration / 2 && villageProgress < 0.3 && Math.random() < 0.006 + level * 0.0015) {
      spawnVehicle();
    }
  }

  // Update vehicles + siren audio
  let closestVehicleDist = Infinity;
  for (let i = vehicles.length - 1; i >= 0; i--) {
    const v = vehicles[i];
    v.x += v.speed * v.dir;
    v.sirenPhase += 0.15;
    // Track closest vehicle for siren volume
    const vcx = v.x + v.w / 2;
    const dist = Math.abs(vcx - (player.x + player.w / 2));
    if (dist < closestVehicleDist) closestVehicleDist = dist;

    // Collision with player
    if (
      player.x + player.w > v.x + 10 &&
      player.x < v.x + v.w - 10 &&
      player.y + player.h > v.y + 4 &&
      player.y + player.h < v.y + v.h + 10 &&
      player.grounded
    ) {
      die();
      return;
    }

    // Check if lava drop hits vehicle → EXPLODE
    for (let j = lavaDrops.length - 1; j >= 0; j--) {
      const d = lavaDrops[j];
      const dsx = d.worldX - scrollOffset;
      if (
        dsx > v.x && dsx < v.x + v.w &&
        d.y > v.y - 5 && d.y < v.y + v.h
      ) {
        // Explosion + break apart!
        const ecx = v.x + v.w / 2;
        const ecy = v.y + v.h / 2;
        const expSize = v.type === 'schoolbus' ? 90 : 70;
        spawnExplosion(ecx, ecy, expSize);
        spawnVehicleDebris(ecx, ecy, v.w, v.h, v.type);
        spawnParticles(ecx, ecy, '#ff6600', 30, 10);
        spawnParticles(ecx, ecy, '#ffcc00', 20, 8);
        spawnParticles(ecx, ecy, '#ff2200', 15, 12);
        spawnParticles(ecx, ecy, '#333333', 12, 6);
        // Leave a lava pool where the vehicle was
        spawnLavaPool(v.x + v.w / 2 + scrollOffset);
        shakeTimer = 25;
        flashTimer = 14;
        if (!konamiUsed) score += 200; // bonus for lava-vehicle explosion
        lavaDrops.splice(j, 1);
        vehicles.splice(i, 1);
        i--; // adjust index since we removed vehicle
        break;
      }
    }
    if (i < 0) continue;

    // Check if vehicle drives into a lava pool → EXPLODE
    for (let j = lavaPools.length - 1; j >= 0; j--) {
      const p = lavaPools[j];
      const psx = p.worldX - scrollOffset;
      const vcx = v.x + v.w / 2;
      if (vcx > psx - p.w / 2 + 5 && vcx < psx + p.w / 2 - 5) {
        const ecx = v.x + v.w / 2;
        const ecy = v.y + v.h / 2;
        const expSize = v.type === 'schoolbus' ? 90 : 70;
        spawnExplosion(ecx, ecy, expSize);
        spawnVehicleDebris(ecx, ecy, v.w, v.h, v.type);
        spawnParticles(ecx, ecy, '#ff6600', 30, 10);
        spawnParticles(ecx, ecy, '#ffcc00', 20, 8);
        spawnParticles(ecx, ecy, '#ff2200', 15, 12);
        spawnParticles(ecx, ecy, '#333333', 12, 6);
        shakeTimer = 22;
        flashTimer = 12;
        if (!konamiUsed) score += 150;
        vehicles.splice(i, 1);
        i--;
        break;
      }
    }
    if (i < 0) continue;

    // Remove if far off screen (wider threshold since they spawn further out)
    if ((v.dir === -1 && v.x < -500) || (v.dir === 1 && v.x > W + 500)) {
      vehicles.splice(i, 1);
    }
  }

  // Siren audio — audible from far off, gets louder as vehicles approach
  const sirenRange = W + 400; // hear siren well before vehicle is visible
  let hasEmergency = false;
  let hasBus = false;
  let closestBusDist = Infinity;
  let closestEmergencyDist = Infinity;
  let hasPolice = false;
  let closestPoliceDist = Infinity;
  for (const v of vehicles) {
    const vdist = Math.abs((v.x + v.w / 2) - (player.x + player.w / 2));
    if (v.type === 'schoolbus') {
      hasBus = true;
      if (vdist < closestBusDist) closestBusDist = vdist;
    } else if (v.type === 'police') {
      hasPolice = true;
      if (vdist < closestPoliceDist) closestPoliceDist = vdist;
    } else {
      hasEmergency = true;
      if (vdist < closestEmergencyDist) closestEmergencyDist = vdist;
    }
  }
  if (hasEmergency && closestEmergencyDist < sirenRange) {
    startSiren();
    const vol = Math.max(0, 1 - closestEmergencyDist / sirenRange) * 0.3;
    updateSiren(vol);
  } else {
    stopSiren();
  }
  if (hasPolice && closestPoliceDist < sirenRange) {
    startPoliceSiren();
    const vol = Math.max(0, 1 - closestPoliceDist / sirenRange) * 0.35;
    updatePoliceSiren(vol);
  } else {
    stopPoliceSiren();
  }
  if (hasBus && closestBusDist < sirenRange) {
    startBusScream();
    const vol = Math.max(0, 1 - closestBusDist / sirenRange) * 0.55;
    updateBusScream(vol);
  } else {
    stopBusScream();
  }

  // Flickering lamp buzz — louder when near a flickering lamp
  let buzzVol = 0;
  for (const lamp of streetLamps) {
    if (!lamp.flickering) continue;
    const lsx = lamp.worldX - scrollOffset;
    const dist = Math.abs(lsx - (player.x + player.w / 2));
    if (dist < 150) {
      // Check if lamp is currently in "off" state (flickering low)
      const raw = Math.sin(frameCount * 0.15 + lamp.flickerPhase) +
                  Math.sin(frameCount * 0.37 + lamp.flickerPhase * 2.1) +
                  Math.sin(frameCount * 0.07 + lamp.flickerPhase * 0.5);
      if (raw <= 0.3) { // lamp is dim or off — buzz is louder
        buzzVol = Math.max(buzzVol, (1 - dist / 150) * 0.03);
      } else {
        buzzVol = Math.max(buzzVol, (1 - dist / 150) * 0.008);
      }
    }
  }
  if (buzzVol > 0.001) {
    startBuzz();
    updateBuzz(buzzVol);
  } else {
    stopBuzz();
  }

  updateExplosions();
  updateVehicleDebris();
  if (shakeTimer > 0) shakeTimer--;
  if (flashTimer > 0) flashTimer--;
}

// Death animation state
let deathAnimX = 0, deathAnimY = 0;
let deathAnimVY = 0, deathAnimSpin = 0;
let deathAnimActive = false;

function die() {
  if (player.invincible > 0) return; // invincibility frames active
  lives--;
  player.alive = false;
  stopSiren();
  stopPoliceSiren();
  stopBusScream();
  stopBuzz();
  playDeathSound();
  if (score > highScore) highScore = score;
  shakeTimer = 0; // no shake on death
  flashTimer = 15;

  // Launch death animation — sprite flies up spinning then falls
  deathAnimX = player.x + player.w / 2;
  deathAnimY = player.y + player.h / 2;
  deathAnimVY = -12; // launch upward
  deathAnimSpin = 0;
  deathAnimActive = true;

  // Big particle burst
  spawnParticles(deathAnimX, deathAnimY, '#ff4400', 30, 9);
  spawnParticles(deathAnimX, deathAnimY, '#ffcc00', 20, 7);
  spawnParticles(deathAnimX, deathAnimY, '#44ccff', 15, 8);
  spawnParticles(deathAnimX, deathAnimY, '#ffffff', 8, 4);

  if (lives <= 0) {
    // True game over — show scrolling legend
    gameState = 'gameover';
    gameOverScrollDone = false;
    levelMusic.pause();
    gameOverMusic.currentTime = 0;
    gameOverMusic.play().catch(() => {});
  } else {
    // Still have lives — brief death, then respawn
    gameState = 'dead';
    levelMusic.volume = 0.25; // dim music during death
  }
}

// ── DOJO MODE (practice) ──
function enterDojo() {
  gameState = 'dojo';
  titleMusic.pause();
  titleMusic.currentTime = 0;
  getDojoMusic().currentTime = 0;
  getDojoMusic().play().catch(() => {});
  player.x = W / 2 - SPRITE_W / 2;
  player.y = GROUND_Y - SPRITE_H;
  player.vy = 0;
  player.vx = 0;
  player.grounded = true;
  player.jumping = false;
  player.doubleJumped = false;
  player.alive = true;
  player.trail = [];
  player.runFrame = 0;
  player.spinAngle = 0;
  player.spinTimer = 0;
  player.kicking = false;
  player.kickTimer = 0;
  player.facingRight = true;
  scrollOffset = 0;
  particles = [];
}

function updateDojo() {
  // Same movement as main game but no lava, no vehicles, no scrolling
  if (jumpBuffered) {
    if (player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      player.jumping = true;
      player.doubleJumped = false;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#44bbff', 6, 3);
    } else if (!player.doubleJumped) {
      player.vy = JUMP_FORCE * 0.82;
      player.doubleJumped = true;
      player.spinAngle = 0;
      player.spinTimer = 0;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#66ddff', 10, 5);
    }
    jumpBuffered = false;
  }

  player.vy += GRAVITY;
  player.y += player.vy;

  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = PLAYER_SPEED;
  player.x += moveX;
  player.x = Math.max(10, Math.min(W - player.w - 10, player.x));

  if (moveX > 0) player.facingRight = true;
  else if (moveX < 0) player.facingRight = false;

  if (player.kicking) {
    player.kickTimer++;
    if (player.kickTimer > 20) {
      player.kicking = false;
      player.kickTimer = 0;
    }
  }

  if (!player.grounded && player.doubleJumped) {
    player.spinTimer++;
    const t = player.spinTimer;
    const spinDuration = 24;
    if (t <= spinDuration) {
      const progress = t / spinDuration;
      const eased = 1 - Math.pow(1 - progress, 3);
      player.spinAngle = eased * Math.PI * 2;
    } else {
      player.spinAngle = Math.PI * 2;
    }
  } else if (player.grounded) {
    player.spinAngle = 0;
    player.spinTimer = 0;
  }

  // ── Dojo lamp platform collision ──
  const dojoLampX = W / 2;
  const dojoLampPlatY = GROUND_Y - 135; // top of lamp arm
  const dojoLampPlatW = 32; // P*4 each side = 32px total
  const dojoLampPlatH = 8;  // 2*P thickness
  const pLeft = dojoLampX - dojoLampPlatW / 2;
  const pRight = dojoLampX + dojoLampPlatW / 2;
  const pTop = dojoLampPlatY;
  if (
    player.vy >= 0 &&
    player.x + player.w > pLeft + 4 &&
    player.x < pRight - 4 &&
    player.y + player.h >= pTop &&
    player.y + player.h <= pTop + dojoLampPlatH + player.vy + 2
  ) {
    player.y = pTop - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumping = false;
    player.doubleJumped = false;
  }

  if (player.y + player.h >= GROUND_Y) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumping = false;
    player.doubleJumped = false;
  }

  if (player.grounded) {
    player.runTimer++;
    if (player.runTimer > 10) { // slower bob in dojo (was 5 in gameplay)
      player.runFrame = (player.runFrame + 1) % 4;
      player.runTimer = 0;
    }
  }

  player.trail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, life: 12 });
  if (player.trail.length > 15) player.trail.shift();
  player.trail.forEach(t => t.life--);

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawDojo() {
  const P = 4;

  // ── Dojo background — warm wooden interior ──
  // Dark wood wall
  const wallGrad = ctx.createLinearGradient(0, 0, 0, H);
  wallGrad.addColorStop(0, '#1a0e06');
  wallGrad.addColorStop(0.3, '#2a1a0e');
  wallGrad.addColorStop(1, '#1f1208');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, H);

  // Horizontal wood planks on wall
  for (let y = 0; y < GROUND_Y; y += P * 8) {
    // Plank body
    const shade = 30 + ((y * 7) % 20);
    ctx.fillStyle = `rgb(${shade + 15}, ${shade + 5}, ${shade - 10})`;
    ctx.fillRect(0, y, W, P * 7);
    // Plank gap (dark line)
    ctx.fillStyle = '#0e0804';
    ctx.fillRect(0, y + P * 7, W, P);
    // Wood grain highlights
    for (let x = 0; x < W; x += P * 3) {
      const grainAlpha = (Math.sin(x * 0.02 + y * 0.1) * 0.5 + 0.5) * 0.08;
      ctx.fillStyle = `rgba(180, 140, 90, ${grainAlpha})`;
      ctx.fillRect(x, y + P, P, P * 2);
    }
  }

  // ── Decorative elements ──
  // Large circle (enso) on back wall
  ctx.save();
  ctx.strokeStyle = 'rgba(180, 150, 100, 0.12)';
  ctx.lineWidth = P * 2;
  ctx.beginPath();
  ctx.arc(W / 2, GROUND_Y * 0.45, 80, -0.3, Math.PI * 1.8);
  ctx.stroke();
  ctx.restore();

  // Japanese-style vertical banners on left and right walls
  const bannerW = P * 6;
  const bannerH = P * 25;
  // Left banner
  ctx.fillStyle = '#8b1a1a';
  ctx.fillRect(P * 8, GROUND_Y * 0.15, bannerW, bannerH);
  ctx.fillStyle = '#cc9944';
  ctx.fillRect(P * 8, GROUND_Y * 0.15, bannerW, P);
  ctx.fillRect(P * 8, GROUND_Y * 0.15 + bannerH - P, bannerW, P);
  // Kanji-like marks
  ctx.fillStyle = '#ffddaa';
  ctx.fillRect(P * 10, GROUND_Y * 0.15 + P * 4, P * 2, P * 6);
  ctx.fillRect(P * 9, GROUND_Y * 0.15 + P * 6, P * 4, P * 2);
  ctx.fillRect(P * 10, GROUND_Y * 0.15 + P * 12, P * 2, P * 6);
  ctx.fillRect(P * 9, GROUND_Y * 0.15 + P * 16, P, P * 3);
  ctx.fillRect(P * 12, GROUND_Y * 0.15 + P * 14, P, P * 3);

  // Right banner
  ctx.fillStyle = '#1a3366';
  ctx.fillRect(W - P * 14, GROUND_Y * 0.15, bannerW, bannerH);
  ctx.fillStyle = '#cc9944';
  ctx.fillRect(W - P * 14, GROUND_Y * 0.15, bannerW, P);
  ctx.fillRect(W - P * 14, GROUND_Y * 0.15 + bannerH - P, bannerW, P);
  // Kanji-like marks
  ctx.fillStyle = '#aaddff';
  ctx.fillRect(W - P * 12, GROUND_Y * 0.15 + P * 4, P * 2, P * 8);
  ctx.fillRect(W - P * 13, GROUND_Y * 0.15 + P * 7, P * 4, P * 2);
  ctx.fillRect(W - P * 12, GROUND_Y * 0.15 + P * 14, P * 2, P * 5);

  // ── Wooden floor (different from wall) ──
  for (let y = GROUND_Y; y < H; y += P * 3) {
    const fShade = 45 + ((y * 3) % 15);
    ctx.fillStyle = `rgb(${fShade + 20}, ${fShade + 8}, ${fShade - 5})`;
    ctx.fillRect(0, y, W, P * 2);
    ctx.fillStyle = '#1a0e06';
    ctx.fillRect(0, y + P * 2, W, P);
    // Floor plank vertical joints
    for (let x = 0; x < W; x += P * 20 + ((y * 7) % (P * 10))) {
      ctx.fillStyle = '#1a0e06';
      ctx.fillRect(x, y, P, P * 3);
    }
  }

  // ── Floor line (ground level) ──
  ctx.fillStyle = '#3a2518';
  ctx.fillRect(0, GROUND_Y - P, W, P);
  ctx.fillStyle = '#554030';
  ctx.fillRect(0, GROUND_Y, W, P);

  // ── Training dummies (pixel art) ──
  const dummyPositions = [W * 0.2, W * 0.8];
  dummyPositions.forEach(dx => {
    // Post
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(dx - P, GROUND_Y - P * 14, P * 2, P * 14);
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(dx - P, GROUND_Y - P * 14, P, P * 14);
    // Cross arm
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(dx - P * 4, GROUND_Y - P * 10, P * 8, P * 2);
    // Head circle
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(dx - P * 2, GROUND_Y - P * 18, P * 4, P * 4);
    ctx.fillStyle = '#7a5a3a';
    ctx.fillRect(dx - P, GROUND_Y - P * 17, P * 2, P * 2);
    // Base
    ctx.fillStyle = '#4a2a15';
    ctx.fillRect(dx - P * 3, GROUND_Y - P * 2, P * 6, P * 2);
  });

  // ── Streetlight height reference post (center of dojo) ──
  const lampRefX = W / 2;
  const lampPoleH = 135; // same as real street lamps
  const lampTopY = GROUND_Y - lampPoleH;
  // Pole
  ctx.fillStyle = '#333340';
  ctx.fillRect(lampRefX - P, lampTopY + 8, P, lampPoleH);
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(lampRefX, lampTopY + 8, P, lampPoleH);
  // Highlight at top
  ctx.fillStyle = '#5a5a6a';
  ctx.fillRect(lampRefX - P, lampTopY + 8, P * 2, P);
  // Base plate
  ctx.fillStyle = '#3a3a48';
  ctx.fillRect(lampRefX - P * 2, GROUND_Y - P * 2, P * 4, P * 2);
  ctx.fillStyle = '#4a4a58';
  ctx.fillRect(lampRefX - P * 2, GROUND_Y - P * 2, P * 4, P);
  // Lamp arm extending left/right
  const armY = lampTopY;
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(lampRefX - P * 4, armY, P * 8, P);
  ctx.fillStyle = '#3a3a48';
  ctx.fillRect(lampRefX - P * 4, armY + P, P * 8, P);
  // Lamp heads on each end
  ctx.fillStyle = '#ffcc44';
  ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.06) * 0.3;
  ctx.fillRect(lampRefX - P * 4, armY - P * 2, P * 2, P * 2);
  ctx.fillRect(lampRefX + P * 2, armY - P * 2, P * 2, P * 2);
  // Ground glow
  ctx.globalAlpha = 0.06 + Math.sin(frameCount * 0.06) * 0.03;
  const dojoGlow = ctx.createRadialGradient(lampRefX, GROUND_Y, 2, lampRefX, GROUND_Y, 50);
  dojoGlow.addColorStop(0, '#ffcc44');
  dojoGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = dojoGlow;
  ctx.fillRect(lampRefX - 50, GROUND_Y - 20, 100, 40);
  ctx.globalAlpha = 1;
  // Height label
  ctx.fillStyle = 'rgba(255, 204, 136, 0.4)';
  ctx.font = `12px ${GAME_FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('LAMP HEIGHT', lampRefX, lampTopY - 6);
  ctx.textAlign = 'left';

  // ── Ambient particles (dust motes floating) ──
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 12; i++) {
    const mx = (i * 73 + frameCount * 0.3) % W;
    const my = (i * 47 + Math.sin(frameCount * 0.01 + i) * 30) % (GROUND_Y - 20);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(Math.floor(mx / P) * P, Math.floor(my / P) * P, P, P);
  }
  ctx.globalAlpha = 1;

  // ── Draw player ──
  drawPlayer();

  // ── Draw particles ──
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── HUD overlay ──
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, 35);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc88';
  ctx.font = `bold 9px ${GAME_FONT}`;
  ctx.fillText('GGD DOJO — PRACTICE MODE', W / 2, 23);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#887766';
  ctx.font = `12px ${GAME_FONT}`;
  ctx.fillText('Move: A/D  ·  Jump: Space  ·  Double Jump  ·  M: Change Music  ·  ESC: Exit', 15, H - 12);
}
