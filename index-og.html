<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything is Lava — Original Concept v0.1.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; background: #1a1a2e; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  EVERYTHING IS LAVA — Original Concept (v0.1.0)
//  This is a recreation of the very first version of the game,
//  produced from prompts 1–2 before any character art, levels,
//  vehicles, music, or lore were added.
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 480;
canvas.width = W;
canvas.height = H;

// --- Constants ---
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const DOUBLE_JUMP_FORCE = -10;
const GROUND_Y = H - 60;
const SCROLL_SPEED_START = 3;
const SCROLL_SPEED_MAX = 8;
const PLATFORM_MIN_W = 80;
const PLATFORM_MAX_W = 180;
const PLATFORM_GAP_MIN = 60;
const PLATFORM_GAP_MAX = 140;
const LAVA_HEIGHT = 60;

// --- Game State ---
let gameState = 'menu'; // menu, playing, dead
let score = 0;
let highScore = 0;
let scrollSpeed = SCROLL_SPEED_START;
let frameCount = 0;
let shakeTimer = 0;
let flashTimer = 0;

// --- Player ---
const player = {
  x: 200,
  y: 0,
  w: 28,
  h: 28,
  vy: 0,
  grounded: false,
  jumps: 0,
  maxJumps: 2,
  alive: true
};

// --- Platforms ---
let platforms = [];

// --- Lava Bubbles ---
let lavaBubbles = [];

// --- Particles ---
let particles = [];

// --- Keys ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Escape returns to the main game
  if (e.code === 'Escape') {
    window.location.href = 'index.html';
    return;
  }
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (gameState === 'menu') {
      startGame();
    } else if (gameState === 'playing') {
      tryJump();
    } else if (gameState === 'dead') {
      startGame();
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Touch Support ---
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'menu') startGame();
  else if (gameState === 'playing') tryJump();
  else if (gameState === 'dead') startGame();
});

// --- Resize ---
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- Init Platforms ---
function initPlatforms() {
  platforms = [];
  let x = 0;
  while (x < W + 400) {
    const pw = PLATFORM_MIN_W + Math.random() * (PLATFORM_MAX_W - PLATFORM_MIN_W);
    platforms.push({ x: x, y: GROUND_Y, w: pw });
    x += pw + PLATFORM_GAP_MIN + Math.random() * (PLATFORM_GAP_MAX - PLATFORM_GAP_MIN);
  }
}

// --- Start Game ---
function startGame() {
  gameState = 'playing';
  score = 0;
  scrollSpeed = SCROLL_SPEED_START;
  frameCount = 0;
  player.x = 200;
  player.y = GROUND_Y - player.h;
  player.vy = 0;
  player.grounded = true;
  player.jumps = 0;
  player.alive = true;
  shakeTimer = 0;
  flashTimer = 0;
  particles = [];
  lavaBubbles = [];
  initPlatforms();
}

// --- Jump ---
function tryJump() {
  if (player.jumps < player.maxJumps) {
    player.vy = player.jumps === 0 ? JUMP_FORCE : DOUBLE_JUMP_FORCE;
    player.grounded = false;
    player.jumps++;
    // Jump particles
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: player.x + player.w / 2,
        y: player.y + player.h,
        vx: (Math.random() - 0.5) * 4,
        vy: Math.random() * 2 + 1,
        life: 20 + Math.random() * 10,
        color: player.jumps === 2 ? '#ffaa00' : '#ffffff',
        size: 2 + Math.random() * 2
      });
    }
  }
}

// --- Die ---
function die() {
  if (!player.alive) return;
  player.alive = false;
  gameState = 'dead';
  shakeTimer = 20;
  flashTimer = 8;
  if (score > highScore) highScore = score;
  // Death particles
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h / 2,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 30 + Math.random() * 20,
      color: Math.random() > 0.5 ? '#ff4400' : '#ffcc00',
      size: 3 + Math.random() * 3
    });
  }
}

// --- Update ---
function update() {
  if (gameState !== 'playing') return;

  frameCount++;
  score = Math.floor(frameCount / 3);

  // Increase speed over time
  scrollSpeed = Math.min(SCROLL_SPEED_MAX, SCROLL_SPEED_START + frameCount * 0.001);

  // Player horizontal movement
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 4;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += 4;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;
  player.grounded = false;

  // Platform collision
  for (const p of platforms) {
    if (
      player.vy >= 0 &&
      player.x + player.w > p.x &&
      player.x < p.x + p.w &&
      player.y + player.h >= p.y &&
      player.y + player.h <= p.y + 12
    ) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumps = 0;
    }
  }

  // Fell into lava
  if (player.y + player.h > GROUND_Y + 10) {
    die();
    return;
  }

  // Scroll platforms
  for (let i = platforms.length - 1; i >= 0; i--) {
    platforms[i].x -= scrollSpeed;
    if (platforms[i].x + platforms[i].w < -50) {
      platforms.splice(i, 1);
    }
  }

  // Generate new platforms
  const last = platforms[platforms.length - 1];
  if (last && last.x + last.w < W + 200) {
    const gap = PLATFORM_GAP_MIN + Math.random() * (PLATFORM_GAP_MAX - PLATFORM_GAP_MIN);
    const pw = PLATFORM_MIN_W + Math.random() * (PLATFORM_MAX_W - PLATFORM_MIN_W);
    // Occasionally make smaller platforms at higher speeds
    const shrink = scrollSpeed > 5 ? Math.random() * 40 : 0;
    platforms.push({ x: last.x + last.w + gap, y: GROUND_Y, w: Math.max(50, pw - shrink) });
  }

  // Lava bubbles
  if (Math.random() < 0.08) {
    lavaBubbles.push({
      x: Math.random() * W,
      y: GROUND_Y + 10 + Math.random() * 30,
      r: 2 + Math.random() * 4,
      vy: -0.5 - Math.random() * 1,
      life: 30 + Math.random() * 20
    });
  }
  for (let i = lavaBubbles.length - 1; i >= 0; i--) {
    lavaBubbles[i].y += lavaBubbles[i].vy;
    lavaBubbles[i].life--;
    if (lavaBubbles[i].life <= 0) lavaBubbles.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Shake decay
  if (shakeTimer > 0) shakeTimer--;
}

// --- Draw ---
function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const s = shakeTimer * 0.8;
    ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
  }

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#0a0a1a');
  skyGrad.addColorStop(0.6, '#1a1020');
  skyGrad.addColorStop(1, '#2a1015');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137 + 50) % W;
    const sy = (i * 97 + 20) % (GROUND_Y - 40);
    const ss = ((i * 73) % 3) + 1;
    const flicker = 0.3 + 0.7 * Math.abs(Math.sin(frameCount * 0.02 + i));
    ctx.globalAlpha = flicker * 0.5;
    ctx.fillRect(sx, sy, ss, ss);
  }
  ctx.globalAlpha = 1;

  // Volcano triangles (background)
  const volcanos = [
    { cx: 120, w: 200, h: 160, color: '#1a1228' },
    { cx: 380, w: 260, h: 200, color: '#151020' },
    { cx: 600, w: 180, h: 130, color: '#1a1228' },
    { cx: 750, w: 220, h: 170, color: '#181225' },
    { cx: -30, w: 160, h: 110, color: '#181225' },
  ];
  for (const v of volcanos) {
    ctx.beginPath();
    ctx.moveTo(v.cx - v.w / 2, GROUND_Y);
    ctx.lineTo(v.cx, GROUND_Y - v.h);
    ctx.lineTo(v.cx + v.w / 2, GROUND_Y);
    ctx.closePath();
    ctx.fillStyle = v.color;
    ctx.fill();
  }
  // Glow at volcano peaks
  for (const v of volcanos) {
    const glowR = 8 + Math.sin(frameCount * 0.03 + v.cx) * 3;
    const grad = ctx.createRadialGradient(v.cx, GROUND_Y - v.h, 0, v.cx, GROUND_Y - v.h, glowR * 3);
    grad.addColorStop(0, 'rgba(255,80,0,0.3)');
    grad.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(v.cx - glowR * 3, GROUND_Y - v.h - glowR * 3, glowR * 6, glowR * 6);
  }

  // Lava (below ground)
  const lavaGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  lavaGrad.addColorStop(0, '#ff4400');
  lavaGrad.addColorStop(0.3, '#ff6600');
  lavaGrad.addColorStop(0.7, '#cc3300');
  lavaGrad.addColorStop(1, '#881100');
  ctx.fillStyle = lavaGrad;
  ctx.fillRect(0, GROUND_Y, W, LAVA_HEIGHT);

  // Lava surface wave
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 4) {
    const wave = Math.sin(x * 0.03 + frameCount * 0.08) * 3 +
                 Math.sin(x * 0.07 + frameCount * 0.05) * 2;
    ctx.lineTo(x, GROUND_Y + wave);
  }
  ctx.lineTo(W, GROUND_Y + 10);
  ctx.lineTo(0, GROUND_Y + 10);
  ctx.closePath();
  ctx.fillStyle = '#ff8800';
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Lava glow
  const glowGrad = ctx.createLinearGradient(0, GROUND_Y - 30, 0, GROUND_Y);
  glowGrad.addColorStop(0, 'rgba(255,68,0,0)');
  glowGrad.addColorStop(1, 'rgba(255,68,0,0.15)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, GROUND_Y - 30, W, 30);

  // Lava bubbles
  for (const b of lavaBubbles) {
    const a = b.life / 50;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,150,0,${a})`;
    ctx.fill();
  }

  // Platforms
  for (const p of platforms) {
    // Platform body
    ctx.fillStyle = '#444455';
    ctx.fillRect(p.x, p.y, p.w, 12);
    // Top edge highlight
    ctx.fillStyle = '#666677';
    ctx.fillRect(p.x, p.y, p.w, 3);
    // Bottom shadow
    ctx.fillStyle = '#222233';
    ctx.fillRect(p.x, p.y + 10, p.w, 2);
    // Edge marks
    ctx.fillStyle = '#555566';
    for (let ex = p.x + 8; ex < p.x + p.w - 8; ex += 16) {
      ctx.fillRect(ex, p.y + 4, 8, 2);
    }
  }

  // Player
  if (player.alive || flashTimer % 2 === 0) {
    drawPlayer();
  }

  // Particles
  for (const p of particles) {
    const a = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, a);
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Flash
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,100,0,${flashTimer * 0.08})`;
    ctx.fillRect(0, 0, W, H);
    flashTimer--;
  }

  // HUD
  if (gameState === 'playing') {
    drawHUD();
  }

  // Menu
  if (gameState === 'menu') {
    drawMenu();
  }

  // Death screen
  if (gameState === 'dead') {
    drawDeath();
  }

  ctx.restore();
}

// --- Draw Player ---
function drawPlayer() {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const r = player.w / 2;

  // Main circle
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#3388cc';
  ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.arc(cx - 3, cy - 4, r * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(cx - 5, cy - 3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 5, cy - 3, 3, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.arc(cx - 4, cy - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 6, cy - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

// --- Draw HUD ---
function drawHUD() {
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), 10, 24);

  ctx.textAlign = 'right';
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('HI: ' + String(highScore).padStart(6, '0'), W - 10, 24);
}

// --- Draw Menu ---
function drawMenu() {
  // Darken
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold 48px monospace';
  ctx.fillText('EVERYTHING', W / 2, H / 2 - 60);
  ctx.fillText('IS LAVA', W / 2, H / 2 - 10);

  // Subtitle
  ctx.fillStyle = '#ffaa44';
  ctx.font = '14px monospace';
  ctx.fillText('An endless runner where the floor is literally lava', W / 2, H / 2 + 30);

  // Start prompt
  const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.06);
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.font = 'bold 18px monospace';
  ctx.fillText('PRESS SPACE TO START', W / 2, H / 2 + 80);

  // Mobile hint
  ctx.fillStyle = '#556677';
  ctx.font = '11px monospace';
  ctx.fillText('Tap to jump  |  Arrow keys or A/D to move', W / 2, H / 2 + 110);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888888';
    ctx.font = '13px monospace';
    ctx.fillText('HIGH SCORE: ' + String(highScore).padStart(6, '0'), W / 2, H / 2 + 140);
  }

  // OG label & back hint
  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('ORIGINAL v0.1.0', W / 2, H - 28);
  ctx.fillStyle = '#556677';
  ctx.font = '9px monospace';
  ctx.fillText('Press ESC to return to the new version', W / 2, H - 12);
}

// --- Draw Death ---
function drawDeath() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4422';
  ctx.font = 'bold 40px monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 40);

  ctx.fillStyle = '#ffffff';
  ctx.font = '18px monospace';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), W / 2, H / 2 + 10);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '14px monospace';
    ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 40);
  }

  const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.06);
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.font = 'bold 16px monospace';
  ctx.fillText('PRESS SPACE TO TRY AGAIN', W / 2, H / 2 + 80);
}

// --- Game Loop ---
function loop() {
  update();
  draw();
  frameCount++;
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
